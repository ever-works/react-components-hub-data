markdown: >-
  ## Overview


  Tailark is a beautifully designed collection of marketing UI blocks and
  templates built on top of shadcn/ui. It delivers high-quality, modern website
  components with a strong focus on design, making it well-suited for building
  modern marketing websites.


  ## Key Features


  - **Partially open-source:** A comprehensive collection of components are free
  and open source, available in their public GitHub repository. Premium
  components are available as part of the "Quartz" UI kit.

  - **Great design quality:** Marketing website components and sections are
  well-designed, modern, and up-to-date with current design trends and best
  practices.

  - **shadcn/ui registry support:** If your project uses shadcn/ui, you can
  easily integrate Tailark components via the shadcn/ui CLI.

  - **Modern and clean design:** Components are crafted with attention to detail
  that sets them apart from other React libraries focused on marketing website
  components.

  - **Generous free components:** Includes a generous amount of free marketing
  blocks and components available via their public GitHub repository.


  ## Limitations


  - **Not a full React component library:** Designed specifically for marketing
  website components; does not include basic UI components like buttons, inputs,
  textareas, charts, etc. For these, you will need another React UI component
  library.

  - **Based on shadcn/ui / Radix UI:** May require migration away from Radix UI
  if maintenance concerns arise.

  - **No Figma UI kit:** Keeping design and code in sync can be more challenging
  without a Figma UI kit or design library.


  ## Pricing


  - Free open-source components available on GitHub

  - Premium components via "Quartz" UI kit starting from $179
