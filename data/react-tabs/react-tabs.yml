name: React Tabs
description: React Tabs is an accessible, flexible tab navigation component for
  React applications developed by Jed Watson (creator of React Select). It
  provides a comprehensive tabs system with full keyboard navigation, ARIA
  attributes, and customizable styling. Key features include accessible focus
  management with arrow key navigation, automatic ARIA roles and attributes for
  screen readers, controlled and uncontrolled usage modes, customizable tab and
  panel rendering, and smooth animation support. Primary use cases include
  settings panels, dashboard navigation, document viewers with multiple
  sections, data views with different perspectives, and any React application
  needing organized content switching. Compared to headless alternatives like
  Ariakit's Tabs or Radix UI's Tabs (which offer more customization hooks),
  React Tabs provides a simpler, opinionated API that works out-of-the-box with
  less boilerplate while still allowing full styling control.
