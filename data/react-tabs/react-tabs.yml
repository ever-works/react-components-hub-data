markdown: >-
  ## Overview


  React Tabs is a robust tab navigation component for React applications. It
  provides keyboard accessibility and ARIA compliance for better user
  experience.


  ## Features


  - Keyboard-navigable tab list

  - ARIA roles and attributes

  - Customizable tab styling

  - Auto-focused first tab

  - Keyboard shortcuts (Left/Right arrows)


  ## Installation


  `npm install react-tabs`


