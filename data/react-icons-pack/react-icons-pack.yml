markdown: >-
  ## Overview


  React Icons Pack provides popular icon sets as React components. It includes
  Font Awesome, Material Design, Ionicons, Feather Icons, and many more, all
  with a consistent API.


  ## Features


  - **Multiple Icon Sets**: 40+ icon libraries in one package

  - **Tree Shaking**: Only bundle icons you use

  - **Customizable**: Size, color, and style props

  - **TypeScript**: Full type definitions

  - **Zero Config**: Import and use immediately

  - **Consistent API**: Same interface across all icon sets


  ## Use Cases


  - UI design and development

  - Navigation menus

  - Buttons and actions

  - Status indicators

  - Social media links


  ## Pricing


  Free and open source (MIT License)
