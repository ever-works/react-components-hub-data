name: SWR
description: React hooks library for data fetching with support for caching,
  revalidation, and focus tracking. Implements stale-while-revalidate pattern
  for performant data fetching.
source_url: https://swr.vercel.app
category: State Management
tags:
  - data-fetching
  - hooks
