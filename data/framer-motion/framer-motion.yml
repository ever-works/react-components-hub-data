markdown: >-
  ## Overview


  Framer Motion is a popular animation library for React with an intuitive API
  for creating complex animations, gestures, and interactions with minimal code.


  ## Key Features


  - **Simple API**: Easy animation syntax

  - **Gestures**: Hover, tap, drag support

  - **Layout Animations**: Animated layout changes

  - **Shared Layouts**: Synchronized animations

  - **Variants**: Orchestrate animations

  - **Exit Animations**: AnimatePresence

  - **Server-Side Rendering**: SSR support

  - **TypeScript**: Full type support


  ## Core Components


  - motion.{element}: Animated elements

  - AnimatePresence: Exit animations

  - Variants: Animation definitions

  - Gestures: Interaction handlers


  ## Features


  - Keyframe animations

  - Spring physics

  - Gesture animations

  - Drag and drop

  - Layout animations

  - SVG animations

  - Parallax effects

  - Scroll animations

  - Shared layout animations

  - Dynamic variants


  ## Gesture Support


  - hover: Hover animations

  - tap: Click animations

  - focus: Focus animations

  - whileInView: Scroll reveal

  - drag: Drag animations

  - dragElastic: Elastic drag


  ## Animation Types


  - Transition: Keyframe animations

  - Spring: Physics-based motion

  - Inertia: Momentum-based

  - Orchestration: Staggered


  ## Use Cases


  - Page Transitions

  - Modal Animations

  - Button Interactions

  - Scroll Effects

  - Drag Interactions

  - Loading States

  - Data Visualization

  - Interactive UI


  ## Integration


  - React 17+

  - Next.js

  - TypeScript

  - CSS-in-JS


  ## Pricing


  Free and open-source under the MIT license. Commercial use available.
