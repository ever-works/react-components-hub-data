markdown: >-
  ## Overview


  Resourcerer is a declarative data-fetching framework designed for REST APIs.
  It simplifies the process of fetching, caching, and managing API data in React
  applications.


  ## Features


  - Declarative data-fetching

  - REST API integration

  - Built-in caching

  - Request deduplication

  - Loading and error state management

  - Configurable retry logic

  - Works with React components

  - Developed at Sift
