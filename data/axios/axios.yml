markdown: >-
  ## Overview


  Axios is a promise-based HTTP client for the browser and Node.js. It's the
  most popular HTTP library in the React ecosystem, providing a simple interface
  for making HTTP requests with many useful features.


  ## Features


  - **Promise-based**: Modern async/await support

  - **Interceptors**: Request and response interceptors

  - **JSON Transformation**: Automatic JSON handling

  - **Request Cancellation**: Cancel requests with AbortController

  - **CSRF Protection**: Built-in XSRF protection

  - **Progress Tracking**: Upload/download progress

  - **Timeout**: Configurable request timeouts

  - **TypeScript**: Full type definitions


  ## Use Cases


  - API communication

  - REST API integration

  - File uploads and downloads

  - Authentication flows

  - Request/response transformation

  - Any HTTP client needs


  ## Pricing


  Free and open source (MIT License)
