markdown: >-
  ## Overview


  React FAQ Accordion provides an animated accordion component for displaying
  frequently asked questions in a clean interface.


  ## Features


  - Collapsible FAQ sections

  - Smooth transition animations

  - Keyboard navigation support

  - Customizable header styling

  - Auto-open single section


  ## Installation


  `npm install react-faq-accordion`


