markdown: >-
  ## Overview


  React Context Menu is a component library for creating right-click context
  menus in React applications. It provides a flexible API for building custom
  context menus with keyboard support.


  ## Key Features


  - **Right-Click Menus**: Trigger menus on right-click

  - **Custom Triggers**: Alternative trigger mechanisms

  - **Submenu Support**: Nested menu items

  - **Keyboard Navigation**: Arrow keys and Enter support

  - **Positioning**: Smart positioning to avoid edges

  - **Icons**: Support for menu icons

  - **Disabled Items**: Disable specific menu items

  - **Separators**: Menu item dividers

  - **TypeScript**: Type definitions


  ## Components


  - ContextMenu: Menu container

  - MenuItem: Menu item

  - SubMenu: Nested menu

  - MenuDivider: Item separator


  ## Features


  - Prevent default right-click

  - Custom styling

  - Keyboard navigation

  - Mouse interactions

  - Touch support on mobile

  - Portal rendering

  - Event callbacks


  ## Use Cases


  - File Operations (Cut, Copy, Paste)

  - Editor Context Menus

  - Table Row Actions

  - Navigation Options

  - Tool Menus


  ## Accessibility


  - Keyboard navigation

  - Focus management

  - ARIA attributes

  - Screen reader support


  ## Pricing


  Free and open-source under the MIT license.
