markdown: >-
  ## Overview


  KendoReact is a professional UI component library with 100+ native React
  components built specifically for React applications. Unlike wrappers, these
  components are designed with React patterns and hooks from the ground up.


  ## Component Suite


  ### Data Management

  - Grid with advanced features

  - TreeList

  - ListView

  - Virtual Scroller

  - Spreadsheet

  - PivotGrid


  ### Scheduling & Planning

  - Scheduler with multiple views

  - Calendar

  - Gantt Chart

  - Timeline


  ### Data Visualization

  - Charts (50+ types)

  - Gauges

  - Barcodes

  - QR Code

  - TreeMap

  - Diagram


  ### Editors

  - Editor (WYSIWYG)

  - TextBox, NumericTextBox

  - DatePicker, TimePicker

  - DropDownList, MultiSelect

  - ColorPicker

  - Upload

  - Signature


  ### Layout

  - TileLayout

  - Window

  - Dialog

  - Drawer

  - Splitter

  - PanelBar

  - ExpansionPanel


  ### Navigation

  - Menu, ContextMenu

  - TabStrip

  - Breadcrumb

  - TreeView

  - Stepper

  - BottomNavigation


  ### Forms

  - Form Component

  - Validation

  - Field rendering

  - Custom validators


  ### Interactivity

  - Drag and Drop

  - Ripple effects

  - Sortable

  - Notification

  - Tooltip


  ## Key Features


  - Native React implementation

  - No jQuery dependencies

  - TypeScript support

  - Accessibility (Section 508, WCAG 2.1)

  - Globalization (75+ languages)

  - RTL support

  - Multiple themes (Bootstrap, Material, Fluent)

  - Responsive design

  - Touch support

  - Server-side rendering


  ## Advanced Features


  - Excel export

  - PDF export

  - Virtualization

  - Infinite scrolling

  - Real-time updates

  - State persistence


  ## Developer Experience


  - Comprehensive documentation

  - Sample applications

  - Live demos

  - Professional support

  - Regular updates

  - Migration guides


  ## Use Cases


  - Enterprise applications

  - Data-intensive dashboards

  - Line-of-business applications

  - Admin panels

  - Reporting tools

  - Scheduling applications


  ## Pricing


  Commercial license required. Starts at $999/year per developer. Enterprise
  licenses available.
