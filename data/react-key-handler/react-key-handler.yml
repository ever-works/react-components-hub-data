markdown: >-
  ## Overview


  React Key Handler provides a declarative approach to handling keyboard events
  in React. Instead of attaching event listeners manually, it maps key presses
  to component behaviors through a clean API.


  ## Features


  - Declarative keyboard event handling

  - Key-to-behavior mapping

  - Focus-aware event targeting

  - Clean, composable API

  - Multiple key sequence support
