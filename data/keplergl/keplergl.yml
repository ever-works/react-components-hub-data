markdown: >-
  ## Overview


  Kepler.gl is a powerful, open-source geospatial analysis tool built by Uber.
  It enables large-scale geospatial data visualization on modern web browsers,
  providing a user-friendly interface for exploring complex location datasets
  through interactive maps. Built with React and WebGL for high performance.


  ## Features


  - Support for large-scale geospatial datasets

  - Multiple map layers: points, arcs, lines, hexagons, grids, heatmaps,
  clusters

  - Time-based animation for temporal data exploration

  - Filter data by time, field, and geographic region

  - Export maps as PNG and Kepler.gl JSON

  - React-based component architecture

  - WebGL-powered rendering for smooth performance

  - Custom color palettes and styling options

  - Works with React and vanilla JS/TS


  ## Pricing


  Free and open-source under the MIT license.
