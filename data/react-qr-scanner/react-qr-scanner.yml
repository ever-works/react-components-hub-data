markdown: >-
  ## Overview


  React QR Scanner enables React applications to capture and decode QR codes
  using device cameras.


  ## Features


  - Real-time camera access

  - QR/Barcode detection

  - Camera permission handling

  - Light/dark mode switching

  - Custom scan result feedback


  ## Installation


  `npm install react-qr-scanner`


