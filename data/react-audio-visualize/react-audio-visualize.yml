name: React Audio Visualize
description: Audio visualizer for React that provides separate components to
  visualize both live audio streams and audio blobs. Perfect for recording and
  playback visualization.
source_url: https://www.npmjs.com/package/react-audio-visualize
category: Media
tags:
  - audio
  - visualization
  - waveform
markdown: >-
  ## Overview


  react-audio-visualize is an audio visualization library for React that
  provides components for visualizing both live audio (during recording) and
  pre-recorded audio blobs with waveform displays.


  ## Features


  - Live audio visualization during recording

  - Audio blob visualization for playback

  - Waveform rendering

  - Customizable visualizer appearance

  - Bar-based and waveform displays

  - Color customization

  - Size configuration

  - React component-based

  - TypeScript support

  - Web Audio API based

  - Performance optimized

  - Canvas rendering


  ## Visualization Types


  - Live audio bars (recording)

  - Audio waveform (playback)

  - Real-time frequency analysis

  - Amplitude visualization


  ## Use Cases


  - Voice recording apps

  - Audio players

  - Music applications

  - Podcast editors

  - Voice note features

  - Audio messaging

  - Sound recording tools


  ## Pricing


  Free and open-source under the MIT license.
