markdown: >-
  ## Overview


  A versatile sortable component for React that works with any child elements
  and provides broad browser compatibility.


  ## Features


  - Sort any React children via drag-and-drop

  - Touch support for mobile devices

  - IE8 compatibility for legacy browser support

  - Flexible with any component structure

  - Smooth sorting animations


  ## Pricing


  Free and open-source.
