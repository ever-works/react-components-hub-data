markdown: >-
  ## Overview


  React Shortcuts provides a centralized way to manage keyboard shortcts across
  React applications, allowing configurations to be defined in one location and
  used throughout the app.


  ## Features


  - Centralized keyboard shortcuts configuration

  - Application-wide shortcut management

  - Configurable key combinations

  - Context-aware shortcut activation

  - Easy integration with existing components
