markdown: >-
  ## Overview


  React Hotkeys provides declarative management of keyboard shortcuts and focus
  areas in React applications, using a component-based API rather than
  imperative handlers.


  ## Features



  - Declarative hotkey definitions

  - Focus area management

  - Global and component-scoped shortcuts

  - Key sequence support

  - Prevent default behavior handling

  - Accessibility considerations
