markdown: >-
  ## Overview


  React Flow enables the creation of node-based editors and flow diagrams in
  React applications.


  ## Features


  - Drag-and-drop nodes

  - Connectors with automatic routing

  - Zoom and pan support

  - Custom node components

  - React to changes in data


  ## Installation


  `npm install reactflow`


