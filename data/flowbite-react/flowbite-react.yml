name: Flowbite React
description: Flowbite React is an open-source UI component library built on
  Tailwind CSS, offering over 30+ ready-to-use React components with dark mode
  support and seamless integration with modern frameworks like Next.js. It
  emphasizes accessibility and utility-first design principles.
