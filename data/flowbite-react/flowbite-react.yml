markdown: >-
  ## Overview


  Flowbite React provides production-ready components built on Tailwind CSS and
  React, designed for rapid UI development.


  ## Key Features


  - **30+ Components**: Includes navbars, modals, cards, dropdowns, and form
  elements.

  - **Dark Mode Support**: Native integration with browser dark mode
  preferences.

  - **Tailwind CSS**: Leverages utility classes for customizable, responsive
  designs.

  - **Next.js 13 Compatibility**: Optimized for App Router and Server
  Components.

  - **Accessible**: ARIA attributes and keyboard navigation out-of-the-box.


  ## Pricing


  Free and open-source under the MIT license.
