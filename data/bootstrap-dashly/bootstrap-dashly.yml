  Bootstrap Dashly is a vibrant and responsive React admin template. It is
  packed with advanced components like charts, modals, and tables, tailored for
  building dynamic dashboards and web applications.


  ## Features


  - Vibrant UI design

  - Responsive layout

  - Advanced chart components

  - Modal components

  - Data tables

  - Tailored for dynamic dashboards and web applications


