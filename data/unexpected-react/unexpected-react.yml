markdown: >-
  ## Overview


  Unexpected React is a plugin for the Unexpected assertion library that enables
  full React virtual DOM testing and shallow renderer testing with highly
  readable error messages.


  ## Features


  - Full React virtual DOM testing

  - Shallow renderer testing

  - Readable assertion-based syntax

  - Rich error messages

  - Works with unexpected assertion library


  ## Pricing


  Free and open-source under the MIT license.
