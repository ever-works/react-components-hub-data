name: React Hot Keys
description: React component for listening to keyboard events and defining
  keyboard shortcuts. Built on hotkeys.js for declarative hotkey management with
  keydown and keyup support.
source_url: https://www.npmjs.com/package/react-hot-keys
category: Utilities
tags:
  - keyboard
  - shortcuts
  - accessibility
markdown: >-
  ## Overview


  React Hot Keys is a component-based library for handling keyboard shortcuts in
  React applications. It listens to keydown and keyup keyboard events and allows
  declarative definition and dispatching of keyboard shortcuts.


  ## Features


  - Declarative keyboard shortcut definition

  - Keydown and keyup event support

  - Built on hotkeys.js

  - Modifier key support (Ctrl, Shift, Alt, Meta)

  - Multiple key combinations

  - Event callbacks

  - Component-based API

  - Filter input fields

  - Scope support

  - KeyCode support

  - Prevent default behavior

  - Stop propagation

  - Case sensitivity options


  ## Supported Keys


  - Letter keys (a-z)

  - Number keys (0-9)

  - Function keys (F1-F12)

  - Special keys (Enter, Escape, Tab, etc.)

  - Modifier keys (Ctrl, Shift, Alt, Meta)


  ## Use Cases


  - Application shortcuts

  - Editor commands

  - Navigation hotkeys

  - Productivity tools

  - Game controls

  - Accessibility features

  - Power user features


  ## Pricing


  Free and open-source under the MIT license.
