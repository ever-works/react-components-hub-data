name: Mosaic Dashboard
description: Lightweight, customizable analytics dashboard built with React 19,
  Tailwind CSS, and Vite 6. Integrates Chart.js, Radix UI, and React Day Picker
  to deliver engaging, interactive data visualization for SaaS platforms and
  admin panels.
