markdown: >-
  ## Overview


  React Chart Library provides a flexible way to create various types of charts
  in React applications using Chart.js.


  ## Features


  - Supports Line, Bar, Pie, Doughnut, Radar, Polar charts

  - Responsive and retina-ready

  - Customizable tooltips and legends

  - Animation support

  - Type-safe configuration


  ## Installation


  `npm install react-chartjs`


