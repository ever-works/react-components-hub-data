markdown: >-
  ## Overview


  Grommet is an enterprise-grade React UI component library designed for complex
  applications with accessibility and responsiveness by default.


  ## Features

  - 40+ enterprise-focused components

  - Built-in accessibility (a11y) compliance

  - Multi-theme support (light/dark)

  - Responsive layout system

  - Internationalization support


  ## Pricing

  Free and open source under Apache 2 license.
