name: Grommet
description: Grommet is an enterprise-grade React component library developed by
  Hewlett Packard Enterprise, focused on accessibility, responsiveness, and
  theming for complex web applications. It provides over 40 production-ready UI
  components with built-in WCAG compliance and internationalization support. Key
  features include comprehensive accessibility out-of-the-box with ARIA
  attributes, a powerful theming system with light/dark mode support, responsive
  layout components, and built-in internationalization. Primary use cases
  include enterprise dashboards, internal admin panels, complex SaaS
  applications, and any project requiring strict accessibility standards.
  Compared to Material UI (which has a larger community but heavier bundle) and
  Ant Design (more opinionated), Grommet offers superior accessibility defaults,
  flexible theming, and is purpose-built for enterprise-scale applications with
  strict compliance requirements.
