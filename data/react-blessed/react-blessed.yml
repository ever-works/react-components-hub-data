markdown: >-
  ## Overview


  React Blessed enables building terminal-based user interfaces using React's
  component model. It translates React's virtual DOM into terminal-compatible
  output.


  ## Features


  - Full React lifecycle integration with terminal rendering

  - Blessed widget compatibility

  - Real-time terminal rendering

  - Terminal key events and mouse input support

  - React hooks support


  ## Pricing


  Free and open-source under the MIT license.
