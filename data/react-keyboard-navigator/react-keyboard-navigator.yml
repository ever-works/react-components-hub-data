markdown: >-
  ## Overview


  React Keyboard Navigator provides components and hooks for keyboard-driven
  selection and navigation between sibling elements.


  ## Features


  - Keyboard-driven sibling selection

  - Navigation hooks

  - Accessible navigation patterns

  - Configurable key mappings

  - Integration with lists and grids
