markdown: >-
  ## Overview


  React Table Library is a modern, headless table library that provides the
  logic for building data tables while leaving styling and rendering completely
  in your hands.


  ## Key Features


  - **Headless**: Logic without UI opinions

  - **Sorting**: Multi-column sorting

  - **Filtering**: Built-in filtering

  - **Pagination**: Page navigation

  - **Selection**: Row selection

  - **Resizing**: Column resizing

  - **Virtualization**: Optional virtual scrolling

  - **Accessibility**: ARIA attributes

  - **TypeScript**: Full type support


  ## Capabilities


  - Column sorting (single and multi)

  - Data filtering

  - Pagination

  - Row selection (single and multi)

  - Column resizing

  - Column visibility toggling

  - Custom cell rendering

  - Expandable rows

  - Grouping


  ## Customization


  - Complete styling freedom

  - Custom components

  - Custom cell renderers

  - Custom row renderers

  - Custom pagination

  - Custom header


  ## Use Cases


  - Data Tables

  - Admin Dashboards

  - Reporting Interfaces

  - Data Management

  - Content Management

  - Search Results


  ## Pricing


  Free and open-source under the MIT license.
