  - dimensions
  - container
markdown: >-
  ## Overview


  React Dimensions is a higher-order component (HOC) that wraps a React
  component and provides its container dimensions as props, enabling
  dimension-aware rendering.


  ## Features


  - Higher-order component pattern

  - Container width and height as props

  - Resize event handling

  - Debounced measurements
