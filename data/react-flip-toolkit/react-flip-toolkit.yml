markdown: >-
  ## Overview


  React FLIP Toolkit provides declarative animations for React using the FLIP
  (First, Last, Invert, Play) technique. It enables smooth, performant
  animations for layout changes, shared element transitions, and complex UI
  transformations.


  ## Features


  - FLIP animations

  - Shared element transitions

  - Layout animations

  - Enter/exit animations

  - Staggered animations

  - Spring physics

  - Scale animations

  - Route transitions

  - Declarative API

  - TypeScript support

  - Minimal bundle size

  - GPU-accelerated


  ## Core Components


  - Flipper - animation container

  - Flipped - animated element


  ## FLIP Technique


  - First - measure initial state

  - Last - measure final state

  - Invert - calculate difference

  - Play - animate transformation


  ## Animation Types


  - Scale

  - Translate

  - Opacity

  - Combined transforms

  - Custom animations

  - Spring-based


  ## Shared Elements


  - Element matching by flipId

  - Cross-component transitions

  - Route transitions

  - Modal transitions

  - List reordering

  - Grid layouts


  ## Stagger Configuration


  - Stagger by index

  - Stagger by position

  - Reverse stagger

  - Custom stagger function

  - Delay configuration


  ## Spring Physics


  - Natural motion

  - Configurable stiffness

  - Configurable damping

  - Configurable mass

  - Custom easing


  ## Advanced Features


  - onStart callbacks

  - onComplete callbacks

  - Portal compatibility

  - Transform origin

  - Scale boundaries

  - Opacity animations

  - Custom transforms


  ## Performance


  - GPU acceleration

  - FLIP optimization

  - Minimal layout thrashing

  - Efficient calculations

  - Transform-based


  ## Use Cases


  - Route transitions

  - Modal animations

  - List reordering

  - Grid layouts

  - Image galleries

  - Card expansions

  - Accordion menus

  - Tab transitions

  - Filter animations


  ## Integration


  - React Router

  - React Spring

  - Framer Motion alternative

  - State management

  - Dynamic lists


  ## Pricing


  Free and open-source under the MIT license.
