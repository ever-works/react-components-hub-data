markdown: >-
  ## Overview


  React Query DevTools is a browser-based developer tools companion for React
  Query, providing real-time visibility into query state, cache, and detailed
  debugging capabilities.


  ## Key Features


  - **Query Inspector**: View all active queries

  - **Cache Viewer**: See cached data

  - **Timeline**: Track query lifecycle

  - **Network Monitor**: Monitor API calls

  - **Error Display**: Show query errors

  - **Refetch Trigger**: Manual refetch

  - **Toggle UI**: Hide/show tools

  - **Floating Panel**: Always accessible

  - **Keyboard Shortcut**: Quick toggle


  ## Features


  - Query state inspection

  - Cache visualization

  - Timeline view

  - Error debugging

  - Manual refetch

  - Query invalidation

  - Cache clearing

  - Request logging

  - Response viewing

  - Stale detection


  ## Functionality


  - Real-time updates

  - Query filtering

  - Sort options

  - Data formatting

  - Action history

  - Export data

  - Import data


  ## Configuration


  - Position control

  - Theme selection

  - Auto-hide

  - Keyboard shortcuts

  - Custom styling


  ## Integration


  - Works with React Query

  - Browser DevTools

  - Inspector extension


  ## Use Cases


  - Query Debugging

  - Cache Monitoring

  - Error Tracking

  - Performance Analysis

  - Development

  - Troubleshooting


  ## Pricing


  Free and open-source under the MIT license.
