markdown: >-
  ## Overview


  React Cookie Consent provides a customizable cookie consent banner component
  for React applications. It helps websites comply with GDPR and other privacy
  regulations by obtaining user consent for cookies.


  ## Features


  - Cookie consent banner

  - Customizable content

  - Accept/decline buttons

  - Cookie storage

  - Expiry configuration

  - Custom styling

  - Position options

  - Overlay option

  - Debug mode

  - TypeScript support

  - Callbacks

  - Custom buttons

  - Multi-language support


  ## Configuration


  - location - banner position (top, bottom, none)

  - buttonText - accept button text

  - declineButtonText - decline button text

  - cookieName - cookie name

  - cookieValue - cookie value

  - expires - expiry days

  - debug - debug mode

  - onAccept - accept callback

  - onDecline - decline callback

  - extraCookieOptions - additional cookie options

  - sameSite - SameSite attribute

  - overlay - show overlay

  - overlayClasses - overlay styling


  ## Styling


  - containerClasses

  - contentClasses

  - buttonClasses

  - declineButtonClasses

  - Custom CSS

  - Inline styles

  - Class-based styling


  ## Cookie Options


  - Expiry date

  - Path

  - Domain

  - Secure flag

  - SameSite attribute

  - HttpOnly flag


  ## Positioning


  - Top of page

  - Bottom of page

  - No automatic positioning (custom)

  - Fixed positioning

  - Absolute positioning


  ## Callbacks


  - onAccept - user accepts

  - onDecline - user declines

  - Custom logic on consent

  - Analytics integration

  - Tag manager triggers


  ## GDPR Compliance


  - Obtain explicit consent

  - Record consent choices

  - Provide decline option

  - Clear information

  - Configurable expiry


  ## Use Cases


  - GDPR compliance

  - Cookie policy disclosure

  - Privacy regulation compliance

  - User consent management

  - Analytics consent

  - Marketing cookie consent

  - Essential vs non-essential cookies


  ## Integration


  - Google Analytics

  - Google Tag Manager

  - Facebook Pixel

  - Custom analytics

  - Cookie management platforms


  ## Pricing


  Free and open-source under the MIT license.
