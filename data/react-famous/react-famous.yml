markdown: >-
  ## Overview


  React Famous bridges React's component model with Famo.us's high-performance
  3D rendering engine, allowing developers to build 3D user interfaces using
  React.


  ## Features


  - Integrates Famo.us rendering engine with React

  - 3D CSS transforms and WebGL support

  - Physics-based animations

  - Gesture recognition

  - High-performance layout system

  - Declarative React API for animations


  ## Note


  Famo.us was discontinued as a standalone project. This library is maintained
  for archival purposes and is not recommended for new projects.
