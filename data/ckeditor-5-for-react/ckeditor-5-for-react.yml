markdown: >-
  ## Overview


  CKEditor 5 is a powerful rich text editor framework with a modular
  architecture, modern integrations, and features built for demanding
  professional use cases. The React integration provides seamless integration
  with React applications.


  ## Features


  - Modern UI with intuitive toolbar

  - Real-time collaborative editing

  - Track changes and comments

  - Revision history

  - Export to Word and PDF

  - Markdown support

  - Image upload and editing

  - Tables with advanced features

  - Custom plugins and extensions

  - Responsive design

  - Accessibility compliant (WCAG 2.1)

  - Over 60 ready-to-use features

  - TypeScript support

  - Inline and balloon editing modes


  ## Use Cases


  - Content management systems

  - Documentation platforms

  - Messaging applications

  - Email clients

  - Note-taking apps

  - Blog and article editors


  ## Pricing


  Open-source under GPL license. Commercial licenses available starting at
  $499/year for premium features including real-time collaboration, track
  changes, and export to Word/PDF.
