markdown: >-
  ## Overview


  A lightweight and accessible drag and drop library designed for vertical list
  and table reordering.


  ## Features


  - Under 4kB gzipped

  - Accessible with proper ARIA attributes and keyboard support

  - Designed for vertical drag and drop in lists and tables

  - Smooth animations

  - Customizable rendering

  - No external dependencies


  ## Pricing


  Free and open-source under the MIT license.
