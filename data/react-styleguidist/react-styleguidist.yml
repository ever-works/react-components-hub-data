markdown: >-
  ## Overview


  React Styleguidist is a tool for generating beautiful, interactive
  documentation for React components as a living style guide.


  ## Features


  - Component isolation

  - Live code editor

  - Markdown-based documentation

  - Props documentation

  - Theme customization

  - Works with Create React App
