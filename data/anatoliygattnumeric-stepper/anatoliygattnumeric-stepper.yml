featured: false
markdown: >-
  ## Overview


  A numeric stepper component for React with increment/decrement controls,
  designed for full customization and accessibility.


  ## Features


  - Increment and decrement controls for numeric values

  - Fully themeable to match any design system

  - Accessible with proper keyboard navigation and ARIA attributes

  - Configurable step, min, and max values

  - Minimal dependencies


  ## Pricing


  Free and open-source under the MIT license.
