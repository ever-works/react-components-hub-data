markdown: >-
  ## Overview


  React Animations is a library that brings the popular animate.css effects to
  React applications, providing a collection of ready-to-use, pre-defined
  animations that can be easily applied to any component.


  ## Features


  - Ports animate.css animations to React

  - Includes animations like bounce, fade, and slide

  - Outputs simple JavaScript objects

  - Compatible with any inline styling solution like Radium or Aphrodite

  - Minimal setup required


  ## Usage


  The library works by outputting JavaScript animation objects that can be
  consumed by inline styling solutions, allowing developers to add engaging,
  consistent animations to their projects with minimal configuration.


  ## Pricing


  Free and open-source under the MIT license.
