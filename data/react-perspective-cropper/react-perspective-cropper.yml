markdown: >-
  ## Overview


  react-perspective-cropper is a relatively new React library compared to other
  cropping libraries, specializing in perspective cropping and 3D manipulation
  of images. While it has a smaller community footprint, it offers a unique
  feature set for applications requiring perspective-based image adjustments.


  ## Features


  - Perspective cropping with 3D manipulation

  - Zoom support

  - Rotation capabilities

  - Wrappable in modal components for image uploading workflows


  ## Best For


  - Simple cropping tasks that require perspective transformation

  - 3D image manipulation scenarios


  ## Popularity


  - Approximately 50 stars on GitHub

  - Around 120 weekly downloads on NPM

  - Low activity level with limited documentation


  ## Pricing


  Free and open-source.
