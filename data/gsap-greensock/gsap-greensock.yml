markdown: >-
  ## Overview


  GSAP (GreenSock Animation Platform) is a high-performance JavaScript animation
  library known for its flexibility and power. It excels at animating complex
  sequences with precise timeline control.


  ## Features


  - High performance animations

  - Timeline-based sequencing

  - ScrollTrigger plugin

  - Modular architecture (~23 KB core)

  - SVG animation support

  - Morphing and filters

  - Motion path animations

  - Physics-based motion

  - Cross-browser compatibility

  - Framework agnostic (React, Vue, Angular)

  - Rich plugin ecosystem

  - Advanced easing

  - Draggable interactions

  - Observer patterns

  - TypeScript definitions


  ## Popular Plugins


  - ScrollTrigger

  - Draggable

  - MotionPath

  - MorphSVG

  - SplitText

  - CustomEase


  ## Use Cases


  - Complex scroll animations

  - Interactive experiences

  - Timeline-based sequences

  - SVG animations

  - Game development

  - Micro-interactions


  ## Pricing


  Free core library; premium plugins available with license.
