markdown: >-
  ## Overview


  React Measure provides comprehensive component measurement capabilities,
  computing width, height, top/left positioning, and scroll state for any React
  component.


  ## Features



  - Comprehensive measurements (width, height, position, scroll)

  - Render props API

  - Resize observer integration

  - Performance-optimized measurements

  - Content bounds detection

  - Works with scrollable containers
