markdown: >-
  ## Overview


  React Helmet is the original library for managing document head in React
  applications. While still functional, React Helmet Async is recommended for
  new projects due to better SSR support and thread safety.


  ## Status


  **Note:** For new projects, use React Helmet Async instead. This library is in
  maintenance mode.


  ## Features


  - Manage document head

  - Dynamic title

  - Meta tags

  - Link tags

  - Script tags

  - Style tags

  - HTML attributes

  - Body attributes

  - Server-side rendering

  - Nested components

  - Declarative API


  ## Basic Usage


  - title element

  - titleTemplate

  - defaultTitle

  - titleAttributes

  - base element

  - meta elements

  - link elements

  - script elements

  - noscript elements

  - style elements

  - htmlAttributes

  - bodyAttributes


  ## SEO Elements


  - Page titles

  - Meta descriptions

  - Keywords

  - Open Graph tags

  - Twitter Cards

  - Canonical URLs

  - Language tags

  - Robots directives


  ## Use Cases


  - SEO optimization

  - Social media sharing

  - Dynamic page titles

  - Meta tag management

  - Favicon control

  - Analytics scripts

  - Custom fonts


  ## SSR Support


  - Server-side rendering

  - renderStatic method

  - Extract head tags

  - Not thread-safe (use Async version)


  ## Migration


  **Migrate to React Helmet Async:**

  - Drop-in replacement

  - Requires HelmetProvider

  - Thread-safe

  - Better async support

  - Active maintenance


  ## Legacy Value


  - Stable API

  - Large adoption

  - Good documentation

  - Still works

  - Community knowledge


  ## Pricing


  Free and open-source under the MIT license.
