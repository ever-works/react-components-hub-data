markdown: >-
  ## Overview


  Mantine Spotlight is a command palette and search component that can be used
  as a search or command center for your application. It's keyboard-driven with
  a Cmd/Ctrl+K shortcut and based on the Mantine Modal component.


  ## Features


  - Keyboard shortcut (Cmd/Ctrl+K)

  - Fuzzy search functionality

  - Custom actions

  - Grouped actions

  - Action icons

  - Keyboard navigation

  - Modal-based overlay

  - Theme integration

  - Custom triggers

  - Action descriptions

  - Highlight search terms

  - Custom filters

  - TypeScript support

  - Accessibility features

  - Used on mantine.dev


  ## Action Types


  - Navigation actions

  - Settings shortcuts

  - Search results

  - Custom commands

  - Document links


  ## Use Cases


  - Application search

  - Command center

  - Quick navigation

  - Settings access

  - Documentation search

  - Feature discovery

  - Power user features


  ## Pricing


  Free and open-source under the MIT license.
