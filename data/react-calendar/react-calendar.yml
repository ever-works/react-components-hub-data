markdown: >-
  ## Overview


  React Calendar is an interactive calendar component designed for React
  applications. It supports drag-and-drop event management, multiple calendar
  views, and custom event handling.


  ## Features


  - Monthly, weekly, and daily views

  - Drag-and-drop event scheduling

  - Recurring event support

  - Customizable calendar themes

  - Keyboard navigation

  - Accessibility compliant


  ## Installation


  `npm install react-calendar`


