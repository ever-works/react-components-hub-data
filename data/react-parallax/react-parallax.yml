name: React Parallax
description: React components for creating parallax scroll effects with
  background images. Supports blur transitions and customizable parallax
  elements for engaging scroll experiences.
source_url: https://www.npmjs.com/package/react-parallax
category: Animation
tags:
  - parallax
  - scroll-effects
  - backgrounds
markdown: >-
  ## Overview


  React Parallax provides components for creating parallax scrolling effects in
  React applications. It offers Parallax and Background components for building
  immersive scroll-based animations with background images and custom content.


  ## Features


  - Parallax scrolling effects

  - Background image support

  - Blur transition effects

  - Custom parallax elements

  - Configurable strength/speed

  - Render props pattern

  - Content layering

  - Background positioning

  - Responsive images

  - Easy integration

  - TypeScript support

  - Customizable backgrounds

  - Performance optimized


  ## Components


  - `<Parallax>`: Main parallax container

  - `<Background>`: Background layer with parallax effect


  ## Use Cases


  - Hero sections

  - Landing pages

  - Storytelling websites

  - Product showcases

  - Portfolio sites

  - Marketing pages

  - Immersive experiences


  ## Pricing


  Free and open-source under the MIT license.
