markdown: >-
  ## Overview


  React Rating is a lightweight star rating component for React applications. It
  supports half-star selections and custom icon rendering.


  ## Features


  - Fully customizable star icons

  - Half-star rating support

  - Keyboard navigation

  - Callbacks for rating changes

  - Lightweight (1.2KB minified)


  ## Installation


  `npm install react-rating`


