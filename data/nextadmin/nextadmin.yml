markdown: >-
  ## Overview


  NextAdmin is a powerful Next.js 15-based analytics dashboard, optimized for
  seamless data management and authentication. With deep integrations like
  Prisma, Algolia, and NextAuth, it is designed for modern web apps requiring
  fast, secure data handling.


  ## Features


  - Dynamic data visualization with ApexCharts and JSVectorMap

  - In-built authentication via NextAuth

  - Search indexing with Algolia integration

  - Prisma ORM for database management

  - Ideal for AI-driven and FinTech applications

  - Tech stack: Next.js 15, Tailwind CSS, Prisma, NextAuth


  ## GitHub


  - 187+ GitHub stars

  - Repository: https://github.com/NextAdminHQ/nextjs-admin-dashboard


  ## Pricing


  Free and open-source.
