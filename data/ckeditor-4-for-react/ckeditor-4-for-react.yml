markdown: >-
  ## Overview


  The official React wrapper for CKEditor 4, one of the most widely-used rich
  text editors on the web.


  ## Features


  - Official CKEditor 4 React integration

  - Full WYSIWYG editing capabilities

  - Extensive formatting options (bold, italic, tables, lists, etc.)

  - Image and media embedding

  - Paste from Word support

  - Plugin ecosystem for extended functionality

  - Official documentation and support from CKSource


  ## Pricing


  The CKEditor 4 React wrapper is free and open-source (GPL 2+). CKEditor 4
  itself requires commercial licensing for non-GPL projects after end-of-life.
