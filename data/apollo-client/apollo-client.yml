markdown: >-
  ## Overview


  Apollo Client is a fully-featured, production-ready caching GraphQL client for
  every JavaScript UI framework. It provides a complete state management
  solution for the data graph.


  ## Features


  - Declarative data fetching

  - Query caching

  - Pagination support

  - Error handling

  - Real-time data with subscriptions

  - DevTools integration

  - SSR support

  - Incremental adoption

  - Framework agnostic
