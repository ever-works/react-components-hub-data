markdown: >-
  ## Overview


  Evergreen is Segment's React UI framework, focused on providing flexible,
  well-tested components for building complex web applications. It emphasizes
  accessibility and customization.


  ## Features


  - Comprehensive component library

  - Accessibility-first design

  - Flexible styling with CSS-in-JS

  - Extensible component API

  - Well-tested and maintained

  - Design system integration
