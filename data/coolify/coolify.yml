markdown: >-
  ## Overview


  Coolify is a self-hostable platform that provides a middle ground between full
  infrastructure management and fully managed hosting services. It offers some
  autonomy while simplifying many hosting tasks, allowing developers to deploy
  applications without sacrificing control.


  ## Features


  - Self-hosted on your own infrastructure

  - Deploy web applications, databases, and services

  - Support for Docker Compose and Dockerfiles

  - Automatic SSL certificates

  - Monitoring and notifications

  - Multi-server support

  - Git-based deployments

  - One-click service templates


  ## Pricing


  Free and open-source under the Apache 2.0 license.
