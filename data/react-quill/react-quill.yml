markdown: >-
  ## Overview


  React-Quill integrates the Quill.js editor into React applications, offering a
  seamless way to add editable content areas with rich text capabilities.


  ## Key Features


  - **Rich Text Formatting**: Bold, italic, lists, links, and more.

  - **Custom Modules**: Add image uploads, syntax highlighting, or custom
  formats.

  - **React Integration**: Full lifecycle support with React components and
  props.

  - **Theming**: Light/dark themes and custom CSS.

  - **Cross-Browser Support**: Works consistently across modern browsers.


  ## Pricing


  Free and open-source under the MIT license.
