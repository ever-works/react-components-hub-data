featured: false
markdown: >-
  ## Overview


  React JSON Schema Form is a library that generates React forms automatically
  from JSON Schema definitions, with built-in validation and customization
  options.


  ## Key Features


  - **Schema-Driven**: Generate forms from JSON Schema

  - **Built-in Validation**: JSON Schema validation

  - **Customizable**: Override widgets and fields

  - **Nested Forms**: Support nested schemas

  - **Array Fields**: Handle array items

  - **Conditional Fields**: Conditional rendering

  - **Custom Widgets**: Create custom inputs

  - **TypeScript**: Type support


  ## Features


  - Auto form generation

  - Field validation

  - Error display

  - Required fields

  - Default values

  - Nested objects

  - Array/list handling

  - Conditionals

  - Custom styling

  - Custom widgets


  ## Schema Support


  - String, number, boolean types

  - Enum selections

  - Pattern validation

  - Min/max constraints

  - String format (email, URI, etc.)

  - Array items

  - Nested objects

  - References

  - oneOf/anyOf


  ## Customization


  - Custom widget library

  - Custom field templates

  - Custom error display

  - Theme customization

  - Styling options


  ## Use Cases


  - Dynamic Forms

  - Configuration UI

  - Settings Forms

  - Survey Forms

  - Data Entry

  - Admin Interfaces

  - API Request Forms


  ## Widget Libraries


  - Material UI integration

  - Bootstrap integration

  - Custom widgets


  ## Validation


  - JSON Schema validation

  - Custom validators

  - Error messaging

  - Field-level validation


  ## Pricing


  Free and open-source under the Apache 2.0 license.
