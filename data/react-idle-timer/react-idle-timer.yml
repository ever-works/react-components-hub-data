name: React Idle Timer
description: A React component that triggers events when a user becomes idle or
  active, perfect for implementing auto-logout, session timeout warnings, and
  activity tracking.
source_url: https://idletimer.dev
category: Utilities
tags:
  - idle-detection
  - activity-tracking
  - timeout
  - hooks
featured: false
markdown: >-
  ## Overview


  React Idle Timer detects when a user becomes idle or active, allowing you to
  trigger actions based on user inactivity. It's essential for security
  features, session management, and user experience optimization.


  ## Features


  - Idle detection

  - Activity detection

  - Configurable timeout

  - Multiple event types

  - Pause/resume

  - Reset timer

  - Remaining time

  - Last active time

  - Hook-based API

  - Component API

  - Cross-tab synchronization

  - TypeScript support

  - SSR compatible


  ## Detected Events


  - Mouse movement

  - Mouse clicks

  - Keyboard input

  - Touch events

  - Scroll events

  - Visibility changes

  - Custom events

  - Configurable event list


  ## API


  - useIdleTimer() hook

  - IdleTimer component

  - getRemainingTime()

  - getLastActiveTime()

  - isIdle()

  - pause()

  - resume()

  - reset()

  - activate()


  ## Configuration


  - timeout - idle time in ms

  - events - list of events to track

  - onIdle - idle callback

  - onActive - active callback

  - onAction - action callback

  - debounce - debounce delay

  - throttle - throttle delay

  - crossTab - sync across tabs

  - startOnMount - auto-start

  - startManually - manual start

  - stopOnIdle - stop on idle


  ## Use Cases


  ### Security

  - Auto-logout

  - Session timeout

  - Screen lock

  - Re-authentication

  - Inactivity warnings


  ### UX Optimization

  - Pause animations

  - Stop videos

  - Reduce polling

  - Show idle message

  - Save draft

  - Close notifications


  ### Analytics

  - Track engagement

  - Measure activity

  - Session duration

  - Idle time tracking

  - User behavior


  ### Resource Management

  - Reduce API calls

  - Pause background tasks

  - Suspend connections

  - Save battery

  - Reduce bandwidth


  ## Cross-Tab Sync


  - Synchronize across tabs

  - Shared idle state

  - Activity in any tab

  - Coordinated logout

  - Shared timers


  ## Integration


  - Authentication systems

  - State management

  - Session management

  - Analytics platforms

  - Real-time applications


  ## Pricing


  Free and open-source under the MIT license.
