name: tRPC
description: End-to-end typesafe API framework for TypeScript applications.
  Enables calling backend functions directly from the frontend with full type
  inference, eliminating the need for manual API schema definitions when both
  frontend and backend share TypeScript.
source_url: https://trpc.io/
category: Third Party Integrations
tags:
  - type-safe
  - typescript
  - api
markdown: >-
  ## Overview


  tRPC is a TypeScript-first API framework that enables end-to-end type safety
  between clients and servers. It allows you to call your backend from your
  frontend using typed functions, providing a tremendous productivity boost and
  developer experience for tightly coupled client-server architectures.


  ## Features


  - End-to-end type safety with zero code generation

  - Works seamlessly with React

  - Can be combined with TanStack Query for data fetching benefits

  - Requires TypeScript on both frontend and backend

  - Supports procedures with input validation

  - Built-in error handling

  - Lightweight and fast


  ## Pricing


  Free and open-source under the MIT license.
