name: React Parallax Tilt
description: Easily apply parallax tilt hover effects on React components,
  creating a 3D perspective shift as users hover over elements.
source_url: https://github.com/mkosir/react-parallax-tilt
category: Animation
tags:
  - parallax
  - tilt
  - hover-effect
markdown: >-
  ## Overview


  React Parallax Tilt applies a 3D tilt effect to components based on mouse
  position, creating an engaging parallax hover interaction.


  ## Features


  - 3D tilt effect on hover

  - Mouse position tracking

  - Configurable tilt intensity

  - Glare effect option

  - Smooth transition with easing

  - Mobile and desktop support

  - Lightweight implementation
