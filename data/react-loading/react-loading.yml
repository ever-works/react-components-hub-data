markdown: >-
  ## Overview


  React Loading provides a collection of loading animation components for React
  applications. It offers various spinner types and styles to provide visual
  feedback during loading states.


  ## Spinner Types


  - balls

  - bars

  - bubbles

  - cubes

  - cylon

  - spin

  - spinningBubbles

  - spokes


  ## Features


  - Multiple spinner types

  - Customizable colors

  - Configurable size

  - CSS-based animations

  - Lightweight

  - No dependencies

  - TypeScript support

  - Simple API


  ## Configuration


  - type - spinner type

  - color - spinner color

  - height - spinner height

  - width - spinner width

  - delay - animation delay


  ## Spinner Styles


  ### Balls

  - Bouncing balls

  - Multiple balls

  - Smooth animation


  ### Bars

  - Vertical bars

  - Scaling animation

  - Rhythm effect


  ### Bubbles

  - Floating bubbles

  - Size variation

  - Organic feel


  ### Cubes

  - 3D cubes

  - Rotation effect

  - Geometric


  ### Spin

  - Classic spinner

  - Circular motion

  - Universal


  ## Customization


  - Color theming

  - Size adjustment

  - Custom delays

  - CSS overrides

  - Wrapper styling


  ## Use Cases


  ### Data Loading

  - API calls

  - Data fetching

  - Search results

  - Content loading

  - Lazy loading


  ### UI Feedback

  - Button loading states

  - Form submissions

  - File uploads

  - Processing indicators

  - Background tasks


  ### Page States

  - Initial page load

  - Route transitions

  - Modal content

  - Skeleton replacements

  - Infinite scroll


  ## Integration


  - Loading states

  - Suspense boundaries

  - Async components

  - Data fetching libraries

  - State management


  ## Performance


  - CSS animations

  - GPU acceleration

  - Minimal JavaScript

  - Lightweight SVG


  ## Best Practices


  - Match brand colors

  - Appropriate sizing

  - Clear placement

  - Timeout handling

  - Error states


  ## Pricing


  Free and open-source under the MIT license.
