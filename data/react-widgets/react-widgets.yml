markdown: >-
  ## Overview


  A modular collection of accessible and polished form input widgets for React
  applications that can be imported individually as needed.


  ## Features


  - Includes ComboBox, Dropdown, SelectList, Multiselect, and DatePicker

  - Each widget can be imported independently (Ã  la carte)

  - Full accessibility support with ARIA attributes

  - Extensible with custom rendering

  - Polished default styling

  - Keyboard navigation support

  - Internationalization ready

  - TypeScript support


  ## Pricing


  Free and open-source under the MIT license.
