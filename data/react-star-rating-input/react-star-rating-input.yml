featured: false
markdown: >-
  ## Overview


  A straightforward star rating input component for React that allows users to
  select a rating by clicking on stars.


  ## Features


  - Visual star rating with clickable stars

  - Configurable range of stars (0-5 or more)

  - Controlled and uncontrolled modes

  - Customizable star appearance

  - Simple and lightweight API

  - Works with forms and state management


  ## Pricing


  Free and open-source under the MIT license.
