name: React Scroll
description: Smooth scrolling library for React with support for anchor links,
  scroll-to-element functionality, and smooth scroll animations. Provides
  utilities for both programmatic and navigation-based scrolling.
source_url: https://github.com/fisshy/react-scroll
category: UI Components
tags:
  - scroll
  - navigation
  - smooth-scroll
featured: false
markdown: >-
  ## Overview


  React Scroll provides components and utilities for smooth scrolling, scroll
  spying, and anchor link navigation in React applications.


  ## Key Features


  - **Smooth Scrolling**: Animated scroll transitions

  - **Anchor Links**: Navigate to page sections

  - **Scroll Spy**: Detect scroll position

  - **Active Link Highlighting**: Show active section

  - **Programmatic Scrolling**: Control scroll via functions

  - **Mobile Friendly**: Touch device support

  - **TypeScript**: Type definitions

  - **No Dependencies**: Pure React


  ## Components


  - Link: Scrollable link component

  - Element: Scroll target element

  - Events: Scroll event utilities

  - scroll: Direct scroll function

  - scroller: Scroll controller


  ## Features


  - Smooth scroll animation

  - Active link detection

  - Horizontal scrolling

  - Vertical scrolling

  - Offset support

  - Duration customization

  - Easing functions

  - Scroll callbacks


  ## Configuration


  - smooth: Enable smooth scroll

  - duration: Animation duration

  - offset: Scroll offset

  - delay: Scroll delay

  - spy: Enable scroll spy

  - hashSpy: Hash-based navigation


  ## Use Cases


  - Single Page Navigation

  - Table of Contents

  - Anchor Links

  - Scroll-to-Top Button

  - Page Sections

  - Long-Form Content


  ## Pricing


  Free and open-source under the MIT license.
