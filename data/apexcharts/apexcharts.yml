name: ApexCharts
description: ApexCharts is a modern, interactive open-source charting library
  for JavaScript that provides rich, customizable data visualizations with a
  simple API. It supports 14+ chart types including line, area, bar, column,
  pie, donut, scatter, bubble, heatmap, and candlestick charts, with interactive
  tooltips, zooming, panning, and real-time data updates. Key features include
  responsive design with automatic resizing, dynamic chart updates, export to
  PNG/SVG/CSV, and official wrappers for React, Angular, Vue, and Svelte.
  Primary use cases include business dashboards, analytics platforms, financial
  applications, and any project requiring beautiful interactive charts. Compared
  to Chart.js (simpler but less feature-rich) and D3.js (more flexible but more
  complex), ApexCharts offers an excellent balance of ease-of-use and visual
  quality with built-in interactivity.
