markdown: >-
  ## Overview


  React Testimonial Slider displays customer testimonials with animated
  transitions and responsive layout.


  ## Features


  - Responsive and mobile-friendly

  - Smooth sliding animation

  - Customizable quote rendering

  - Navigation controls

  - Auto-play option


  ## Installation


  `npm install finnovo-components`


