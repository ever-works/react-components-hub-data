name: React Testimonial Slider
description: React Testimonial Slider is a lightweight, animated testimonial
  carousel component designed for displaying customer reviews, quotes, and user
  endorsements on marketing websites and landing pages. It features smooth
  sliding transitions, auto-play functionality, and responsive layouts that
  adapt to any screen size. Key features include auto-play with configurable
  intervals, touch/swipe support for mobile devices, customizable slide content
  with quote formatting, navigation dots and arrow controls, and CSS-based
  smooth transitions. Primary use cases include marketing landing pages, SaaS
  product pages, agency portfolios, and any website section needing to showcase
  customer testimonials. Compared to building a custom testimonial carousel from
  scratch, this component provides a drop-in solution with polished animations
  ready to deploy in minutes.
