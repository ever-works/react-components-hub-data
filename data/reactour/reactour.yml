markdown: >-
  ## Overview


  Reactour is a popular guided product tour library for React applications. With
  3.3k stars on GitHub, it provides a comprehensive solution for creating
  interactive walkthroughs and onboarding experiences.


  ## Core Packages


  - @reactour/tour: Create step-by-step product tours

  - @reactour/mask: Highlight DOM elements or areas

  - @reactour/popover: Place informational dialogs

  - @reactour/utils: Shared utilities


  ## Features


  - Step-by-step guided tours

  - DOM element highlighting

  - Customizable masks and overlays

  - Popover positioning

  - Keyboard navigation

  - Step navigation controls

  - Custom content in steps

  - Conditional steps

  - Step guards and validation

  - Before/after step hooks

  - Accessibility support

  - TypeScript support

  - Responsive design

  - Custom styling


  ## Tour Configuration


  - Steps array with selectors

  - Content for each step

  - Navigation options

  - Mask padding and styling

  - Popover positioning

  - Animation settings


  ## Callbacks


  - onAfterOpen: Tour opened

  - onBeforeClose: Tour closing

  - beforeStep: Before step change

  - afterStep: After step change


  ## Use Cases


  - Feature introductions

  - User onboarding flows

  - Product walkthroughs

  - Interactive tutorials

  - Help documentation

  - New feature announcements


  ## Pricing


  Free and open-source under the MIT license.
