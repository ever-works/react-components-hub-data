markdown: >-
  ## Overview


  React Map GL is a React wrapper around Mapbox GL, providing high-performance
  interactive maps with support for layers, markers, and complex cartographic
  visualizations.


  ## Key Features


  - **Interactive Maps**: Pan, zoom, rotate

  - **Mapbox Layers**: Access all Mapbox layer types

  - **Markers & Popups**: Add interactive markers

  - **Geospatial Data**: GeoJSON support

  - **Real-time Updates**: Update markers/layers

  - **Custom Rendering**: Use React components in popups

  - **TypeScript**: Full type support

  - **Performance**: Optimized rendering


  ## Core Components


  - Map: Main map container

  - Marker: Point markers

  - Popup: Tooltip overlays

  - NavigationControl: Map controls

  - GeolocateControl: Location control

  - FullscreenControl: Fullscreen toggle

  - ScaleControl: Scale indicator


  ## Features


  - Multiple map styles

  - Custom tile layers

  - Vector layer support

  - Raster layer support

  - 3D terrain

  - Layer filtering

  - Data-driven styling

  - Animation

  - Cluster markers

  - Hit detection


  ## Use Cases


  - Location-Based Services

  - Real Estate Maps

  - Delivery Tracking

  - Site Inspection

  - Sales Territory

  - Event Locations

  - Store Locators

  - Analytics Visualization


  ## Integration


  - Mapbox API keys

  - Custom data sources

  - Real-time data

  - WebSocket integration


  ## Pricing


  Free and open-source under the MIT license. Mapbox services have usage-based
  pricing.
