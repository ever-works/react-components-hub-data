markdown: >-
  ## Overview


  M React Splitters is a splitter panel component written in TypeScript. It
  allows users to resize adjacent panels by dragging a dividing handle, commonly
  used in IDE-like layouts and dashboard applications.


  ## Features


  - Written in TypeScript for type safety

  - Resizable panel dividers

  - Vertical and horizontal splitter support

  - Configurable min/max panel sizes

  - Drag handlers for panel resizing
