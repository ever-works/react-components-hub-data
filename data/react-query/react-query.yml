name: React Query
description: React Query is a data fetching and state management library that
  simplifies retrieving, caching, and updating server state in React
  applications. It provides declarative data handling with built-in support for
  pagination, sorting, and query invalidation.
source_url: https://tanstack.com/query/v4
category: Data Management
