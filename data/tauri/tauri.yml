markdown: >-
  ## Overview


  Tauri is a modern open-source framework for building cross-platform desktop
  applications using web technologies for the frontend. It uses a Rust-based
  backend with a lightweight system webview component, providing significant
  advantages over Electron in terms of bundle size and memory usage.


  ## Features


  - Cross-platform support (Windows, macOS, Linux)

  - Uses system webview for rendering (not bundled Chromium)

  - Rust backend with JavaScript frontend bridge

  - Dramatically smaller binary sizes than Electron

  - Built-in security features

  - Auto-updater

  - System tray and notifications

  - Access to native APIs through Rust


  ## Pricing


  Free and open-source under the Apache 2.0 and MIT licenses.
