name: Apache ECharts
description: Apache ECharts is a powerful, interactive data visualization
  library maintained by the Apache Software Foundation, excelling at rendering
  complex charts from small datasets to massive real-time streams with tens of
  thousands of data points. It uses canvas and WebGL rendering for optimal
  performance and provides a comprehensive charting API with 20+ chart types
  including line, bar, scatter, pie, radar, candlestick, heatmap, treemap,
  sankey, and graph visualizations. Key features include WebGL-accelerated
  rendering for large datasets, real-time data streaming, rich interaction
  controls (zoom, pan, brush selection), multiple coordinate systems (Cartesian,
  polar, geo), and built-in animation framework. Primary use cases include
  business intelligence dashboards, financial charting platforms, real-time
  monitoring systems, IoT data displays, and analytics applications. Compared to
  D3.js (more flexible but lower-level) or Chart.js (simpler but less capable),
  ECharts offers a powerful middle ground with high-level APIs, exceptional
  rendering performance, and extensive visualization types.
