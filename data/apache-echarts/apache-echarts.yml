markdown: >-
  ## Overview


  Apache ECharts is a powerful, interactive charting and visualization library
  that excels at handling large datasets. It uses WebGL for rendering, allowing
  it to efficiently display tens of thousands of data points without performance
  issues.


  ## Features


  - 20+ chart types

  - WebGL rendering for performance

  - Handles large datasets (10k+ points)

  - Real-time data updates

  - Lazy loading support

  - Rich interactions (zoom, pan, etc.)

  - Multiple coordinate systems

  - Visual map components

  - Dataset management

  - Responsive design

  - Animation framework

  - Extensive customization

  - Global usage (i18n)

  - Mobile touch support

  - Server-side rendering

  - TypeScript support


  ## Chart Types


  - Line, Bar, Scatter

  - Pie, Radar, Boxplot

  - Candlestick, Heatmap

  - Graph, Tree, Treemap

  - Sunburst, Parallel

  - Sankey, Funnel, Gauge

  - And more


  ## Use Cases


  - Large-scale data visualization

  - Real-time monitoring

  - Financial dashboards

  - IoT data display

  - Analytics platforms

  - Business intelligence


  ## Pricing


  Free and open-source under the Apache 2.0 license.
