markdown: >-
  ## Overview


  react-webcam is a lightweight webcam component for React that provides easy
  access to device cameras for capturing photos and videos. With over 113k
  weekly downloads, it's the most popular webcam solution for React.


  ## Features


  - Image capture (screenshot)

  - Video recording support

  - Multiple camera selection

  - Front/rear camera switching

  - Mirror mode

  - Custom video constraints

  - Audio enable/disable

  - Screenshot format options (JPEG, PNG, WebP)

  - Quality control

  - Ref-based API

  - TypeScript support

  - Mobile device support

  - Error handling

  - MediaStream access


  ## Screenshot API


  - getScreenshot(): Capture base64 image

  - screenshotFormat: Image format (jpeg/png/webp)

  - screenshotQuality: Quality (0-1)

  - Width and height control


  ## Video Constraints


  - facingMode: user/environment

  - width/height: Resolution

  - aspectRatio: Video aspect

  - frameRate: FPS control

  - deviceId: Specific camera


  ## Use Cases


  - Profile photo capture

  - ID verification

  - Video conferencing

  - Photo booth applications

  - Document scanning

  - Security systems

  - Augmented reality


  ## Important Notes


  - Requires HTTPS for security

  - Browser permission required

  - Mobile camera access


  ## Pricing


  Free and open-source under the MIT license.
