markdown: >-
  ## Overview


  React Layer Stack provides a ubiquitous layering system for React
  applications, solving the problem of rendering UI elements (modals, tooltips,
  overlays) in the correct DOM hierarchy.


  ## Features


  - Universal layering system

  - Modal and overlay rendering

  - Correct DOM context management

  - Framework-agnostic design

  - Composable layer configuration
