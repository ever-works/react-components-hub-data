markdown: >-
  ## Overview


  React Table Component is a flexible and powerful table component for rendering
  large datasets with advanced features.


  ## Features


  - Column sorting and filtering

  - Pagination support

  - Expandable rows

  - Customizable cell rendering

  - Integrated state management


  ## Installation


  `npm install react-table`


