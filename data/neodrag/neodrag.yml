markdown: >-
  ## Overview


  A framework-agnostic dragging library that works across multiple frontend
  frameworks with a unified API.


  ## Features


  - Multi-framework support (React, Vue, Angular, etc.)

  - Consistent dragging API across frameworks

  - Lightweight implementation

  - Customizable constraints and behavior

  - Works with any component structure


  ## Pricing


  Free and open-source under the MIT license.
