markdown: >-
  ## Overview


  React Multi Carousel is a production-ready carousel component for React
  applications. It offers server-side rendering support, responsive breakpoints,
  and smooth touch interactions, making it ideal for modern React and Next.js
  applications.


  ## Features


  - **SSR Support**: Full server-side rendering compatibility

  - **Responsive**: Define breakpoints for different screen sizes

  - **Infinite Loop**: Optional infinite carousel mode

  - **Swipe Support**: Touch and mouse drag interactions

  - **Autoplay**: Built-in autoplay functionality

  - **Custom Arrows**: Customizable navigation arrows

  - **Custom Dots**: Custom bullet/dot indicators

  - **Partial Visibility**: Show partial slides on edges

  - **Center Mode**: Center the active slide

  - **RTL Support**: Right-to-left language support


  ## Responsive Configuration


  Define different numbers of slides for various screen sizes:

  - Desktop: Large screens

  - Tablet: Medium screens

  - Mobile: Small screens

  - Custom breakpoints: Define your own


  ## Advanced Features


  - Before/after slide change callbacks

  - Custom transition duration

  - Swipe threshold configuration

  - Minimum swipe distance

  - Container class customization

  - Item class customization

  - Remove arrows on device type

  - Show dots outside container


  ## SSR Benefits


  - Works perfectly with Next.js

  - No hydration issues

  - SEO-friendly carousel content

  - Fast initial page load

  - Proper server rendering


  ## Customization


  - Custom arrow components

  - Custom dot components

  - Custom container styling

  - Item padding and margin

  - Slide item class names

  - Active slide highlighting


  ## Use Cases


  - Next.js applications requiring SSR

  - E-commerce product galleries

  - Blog post carousels

  - Image galleries

  - Client logo showcases

  - Feature highlights

  - Testimonial rotators


  ## Performance


  Optimized for smooth performance with efficient rendering and minimal
  re-renders. Works well with large numbers of slides.


  ## Pricing


  Free and open-source under the MIT license.
