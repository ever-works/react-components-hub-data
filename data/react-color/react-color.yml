markdown: >-
  ## Overview


  React-color provides a variety of color pickers for React applications with
  support for RGB, HSL, HEX, and more.


  ## Features

  - 8+ color pickers (Sketch, GitHub, Material, etc.)

  - Customizable themes

  - TypeScript support

  - Small footprint (<5KB gzipped)

  - Zero dependencies


  ## Pricing

  Free and open source under MIT license.
