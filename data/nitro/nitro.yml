markdown: >-
  ## Overview


  Nitro is a universal server toolkit that powers the Nuxt framework but can
  also be used standalone. It provides a fast, minimal server engine with
  built-in support for deploying to multiple platforms including traditional
  Node.js servers, serverless functions, and edge runtimes.


  ## Features


  - Universal deployment to Node.js, serverless, and edge runtimes

  - Automatic route handling from file-based routing

  - Built-in caching and storage APIs

  - Middleware and plugin system

  - Automatic API route generation

  - Dev server with hot reloading

  - TypeScript support out of the box


  ## Pricing


  Free and open-source under the MIT license.
