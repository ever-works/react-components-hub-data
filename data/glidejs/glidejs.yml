name: Glide.js
description: Glide.js is a lightweight, dependency-free JavaScript ES6 slider
  and carousel library that delivers touch-enabled, responsive carousels at just
  ~7KB gzipped with zero external dependencies. It supports multiple slider
  modes including carousel, rewind, and peek, with smooth GPU-accelerated
  animations and built-in accessibility support. Key features include three
  slider modes — carousel (infinite loop), slider (rewind), and peek (show
  partial slides) for flexible layout needs, zero dependencies keeping bundle
  size at just ~7KB gzipped, full touch and swipe gesture support for mobile
  devices, keyboard navigation with arrow key control and ARIA attributes for
  accessibility, breakpoints API for responsive behavior changes at different
  screen sizes, and a modular architecture allowing selective inclusion of only
  the components you need (autoplay, controls, keyboard, swipe, anchors).
  Primary use cases include product image galleries, hero section carousels,
  testimonial rotators, portfolio displays, and content sliders. Compared to
  heavier alternatives like Swiper (more features but 30+ KB) or Slick Carousel
  (requires jQuery), Glide.js offers the best balance of features, performance,
  and zero-dependency simplicity for projects needing a fast, lightweight
  carousel.
source_url: https://glidejs.com/
