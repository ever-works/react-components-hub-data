markdown: >-
  ## Overview


  Glide.js is a dependency-free JavaScript ES6 slider and carousel library. With
  a tiny footprint of just ~23kb (~7kb gzipped), it's one of the lightest
  carousel solutions available while still being feature-rich and flexible.


  ## Features


  - **Tiny Size**: Only ~7kb gzipped

  - **Zero Dependencies**: No jQuery or other libraries required

  - **ES6**: Modern JavaScript with ES6 modules

  - **Responsive**: Mobile-first, responsive design

  - **Touch Support**: Swipe gestures on touch devices

  - **Keyboard Navigation**: Arrow key support

  - **Modular**: Use only the components you need

  - **Accessible**: ARIA attributes and keyboard support

  - **Customizable**: Extensive API and options


  ## Slider Types


  - Carousel mode (infinite loop)

  - Slider mode (rewind)

  - Peek mode (show partial slides)

  - Center mode

  - RTL support


  ## Features


  - Autoplay with pause on hover

  - Multiple slides per view

  - Gap between slides

  - Breakpoints for responsive behavior

  - Anchors and navigation

  - Touch/mouse dragging

  - Keyboard navigation

  - ARIA labels


  ## Modular Components


  - Autoplay

  - Breakpoints

  - Controls (arrows)

  - Keyboard

  - Swipe

  - Images (lazy loading)

  - Anchors (bullet navigation)


  ## Performance


  Highly optimized with requestAnimationFrame for smooth 60fps animations.
  Minimal DOM manipulation and efficient event handling.


  ## Browser Support


  Supports all modern browsers (Chrome, Firefox, Safari, Edge). IE11 support
  with polyfills.


  ## Use Cases


  - Product showcases

  - Image galleries

  - Content sliders

  - Hero carousels

  - Testimonial rotators

  - Feature highlights

  - Portfolio displays


  ## Pricing


  Free and open-source under the MIT license.
