markdown: >-
  ## Overview


  Lexical is a modern text editor framework created by Meta that powers editors
  across Facebook, Messenger, WhatsApp, and Instagram. It's designed to be
  highly extensible, accessible, and performant while giving developers complete
  control.


  ## Core Features


  - Framework, not a ready-to-use editor

  - Extensible architecture

  - TypeScript-first

  - Accessibility built-in (WAI-ARIA)

  - Cross-browser compatibility

  - Mobile support

  - Server-side rendering compatible

  - Minimal core size (~22KB)

  - Predictable behavior

  - Built for React


  ## Architecture Benefits


  - Unidirectional data flow

  - Immutable editor state

  - Declarative API

  - Time travel (undo/redo)

  - Collision-free collaborative editing

  - Plugin system

  - Custom nodes

  - Custom commands


  ## Built-in Plugins


  - Rich Text plugin

  - Plain Text plugin

  - List plugin (ordered, unordered, check lists)

  - Link plugin

  - Table plugin

  - Code highlighting plugin

  - Markdown shortcuts

  - History (undo/redo)

  - Auto-link

  - Hashtag

  - Mentions (@-mentions)

  - Emoji

  - Horizontal rule

  - Character limit


  ## Advanced Features


  - Collaborative editing support

  - Comments and threading

  - Custom decorators

  - Custom node types

  - Command system

  - Event listeners

  - Transforms

  - DOM reconciliation

  - Selection handling

  - Copy/paste handling


  ## Customization


  - Build your own toolbar

  - Custom UI components

  - Custom formatting

  - Custom node renderers

  - Theme system

  - Styling with CSS

  - Plugin composition


  ## Developer Experience


  - Comprehensive TypeScript types

  - DevTools support

  - Detailed documentation

  - Example implementations

  - Playground for testing

  - Active development

  - Meta backing


  ## Use Cases


  - Rich text editors

  - Code editors

  - Comment systems

  - Note-taking apps

  - Collaborative documents

  - Chat applications

  - Custom content editors


  ## Comparison


  - More flexible than Draft.js

  - Better architecture than ProseMirror for React

  - Lower-level than TipTap

  - Modern alternative to Quill


  ## Pricing


  Free and open-source under the MIT license.
