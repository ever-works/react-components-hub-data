markdown: >-
  ## Overview


  React Grid Layout is a grid layout system with draggable and resizable
  elements. It's perfect for building customizable dashboards and admin
  interfaces where users can rearrange components to their liking.


  ## Features


  - Draggable grid items

  - Resizable grid items

  - Responsive breakpoints

  - Static grid items (non-draggable)

  - Customizable layouts per breakpoint

  - Vertical auto-packing

  - Bounds checking for dragging/resizing

  - Widgets can add/remove themselves

  - Layout persistence

  - Custom drag handles

  - Minimum and maximum dimensions

  - No dependencies (only React)

  - TypeScript support

  - Server-side rendering support

  - Touch device support

  - Customizable compaction algorithms


  ## Compaction Modes


  - Vertical compaction (default)

  - Horizontal compaction

  - No compaction

  - Custom compactors for masonry, gravity, shelf-packing


  ## Use Cases


  - Customizable dashboards

  - Admin panels

  - Widget-based interfaces

  - Report builders

  - Drag-and-drop page builders

  - Analytics displays

  - Monitoring systems


  ## Pricing


  Free and open-source under the MIT license.
