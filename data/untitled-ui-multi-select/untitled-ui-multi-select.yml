markdown: |-
  ## Overview
  Multi-select components from Untitled UI React for selecting multiple values.

  ## Features
  - 1 component with 4 variants
  - Built with Tailwind CSS v4.2 and React Aria v1.16
  - Accessible multi-select dropdowns
  - Tag-based value display
  - Copy, paste, and build workflow

  ## Pricing
  Open-source. Part of the Untitled UI React collection.
