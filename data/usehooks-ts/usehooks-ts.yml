markdown: >-
  ## Overview


  usehooks-ts offers a curated set of utility hooks that solve common React
  development challenges.


  ## Key Features


  - **200+ Hooks**: Includes hooks for animations, form handling, debouncing,
  and more.

  - **TypeScript First**: Built with TypeScript and provides type declarations.

  - **Documentation**: Each hook has usage examples and prop definitions.

  - **Modular**: Import only the hooks you need to minimize bundle size.


  ## Pricing


  Free and open-source under the MIT license.
