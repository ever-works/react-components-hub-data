markdown: >-
  ## Overview


  AG Grid is the industry standard for JavaScript data grids, offering both free
  and enterprise versions. The React integration provides seamless React
  component architecture while maintaining AG Grid's powerful features.


  ## Core Features (Free)


  - Sorting (single and multi-column)

  - Filtering (text, number, date)

  - Pagination

  - Row selection (single and multiple)

  - Column resizing and auto-sizing

  - Column pinning (left and right)

  - Column reordering

  - Cell rendering and editing

  - Keyboard navigation

  - CSV export

  - Themes (Alpine, Balham, Material)

  - TypeScript support


  ## Enterprise Features


  - Row grouping and aggregation

  - Pivot mode

  - Tree data and master-detail

  - Server-side row model

  - Excel export

  - Clipboard operations

  - Range selection

  - Charts integration


  ## Pricing


  Community version free under MIT license. Enterprise license available.
