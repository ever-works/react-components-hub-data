markdown: >-
  ## Overview


  Synergies is a performant distributed context-state library for React that
  allows developers to create reusable state logic by combining atomic context
  pieces.


  ## Features


  - Distributed context state management

  - Atomic state composition

  - Reusable state logic

  - High performance

  - TypeScript support

  - React hooks API


  ## Links


