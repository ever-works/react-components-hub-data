name: React Virtualized
description: React Virtualized is a pioneering high-performance React component
  library for efficiently rendering large lists, grids, and tabular data through
  windowing techniques that only render items visible in the viewport. It
  supports datasets of hundreds of thousands of rows while maintaining smooth
  60fps scrolling and minimal memory usage. Key features include the List, Grid,
  and Table components for various layout patterns, CellMeasurer for dynamically
  measuring content dimensions, AutoSizer for responsive container sizing,
  InfiniteLoader for infinite scroll data fetching, and Collection for rendering
  irregularly positioned items. Primary use cases include data-heavy admin
  dashboards, email inbox views, file explorer interfaces, spreadsheet-like data
  grids, and any application rendering thousands or millions of rows. Compared
  to newer alternatives like React Window (which offers a simpler, more modern
  API from the same author), react-virtualized provides more components
  including Table with built-in column resizing and sorting, though react-window
  is recommended for new projects due to its smaller API surface and better
  tree-shaking support.
