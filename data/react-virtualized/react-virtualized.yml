markdown: >-
  ## Overview


  React Virtualized renders large datasets efficiently by only rendering visible
  cells and elements.


  ## Features

  - Virtualized cell list rendering

  - Grid and Table components

  - Scroll position persistence

  - Cell measurer for dynamic content

  - High-performance scrolling


  ## Pricing

  Free and open source under MIT license.
