markdown: >-
  ## Overview


  React FilePond is a React wrapper for FilePond, a JavaScript library for file
  uploads with a focus on user experience and image optimization. It provides a
  smooth, beautiful interface for uploading files of any type.


  ## Features


  - Drag and drop file upload

  - Browse file selection

  - Paste from clipboard

  - Multiple file uploads

  - Async file upload

  - Chunk uploads for large files

  - Image preview and editing

  - Image size optimization

  - Image cropping and resizing

  - EXIF orientation correction

  - File validation (type, size)

  - Upload progress indication

  - Upload retry on failure

  - Reorder files

  - Remove files

  - Direct upload to S3, Azure, etc.

  - Accepts directories

  - Accepts remote URLs

  - Accessibility compliant

  - Custom styling

  - Plugin architecture


  ## Image Processing Plugins


  - Image Preview

  - Image Resize

  - Image Transform

  - Image Crop

  - Image Filter

  - Image EXIF Orientation


  ## Upload Plugins


  - Chunk uploads

  - Direct S3 uploads

  - Azure Blob Storage

  - Custom server integration


  ## Validation


  - File type validation

  - File size limits

  - Maximum files

  - Custom validators

  - Async validation


  ## Use Cases


  - Profile picture uploads

  - Document submission forms

  - Media galleries

  - File sharing applications

  - Image-heavy forms

  - Multi-file uploads


  ## Pricing


  Core library is free and open-source under MIT license. Premium plugins
  available with commercial license.
