markdown: >-
  ## Overview


  React Form Builder enables users to create custom forms through a
  drag-and-drop interface with live validation and export options.


  ## Features


  - Drag-and-drop form designer

  - Field validation configuration

  - Real-time form preview

  - JSON schema export

  - WYSIWYG form builder


  ## Installation


  `npm install react-form-builder`


