markdown: >-
  ## Overview


  A React image cropping component that enables users to visually select and
  crop regions of images.


  ## Features


  - Visual image cropping interface

  - Adjustable crop area with drag handles

  - Real-time preview of cropped output

  - Configurable aspect ratios

  - Touch-friendly interactions

  - Returns cropped image data


  ## Pricing


  Free and open-source.
