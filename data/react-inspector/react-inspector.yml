markdown: >-
  ## Overview


  React Inspector brings the power of Browser DevTools inspectors right inside
  your React application, enabling interactive component exploration.


  ## Features


  - Interactive component inspection

  - DOM tree visualization

  - Property browsing

  - State and prop viewing

  - Embedded directly in the app
