markdown: >-
  ## Overview


  Hedron is a minimal flexbox grid system designed for React applications. Built
  on top of styled-components, it offers a clean API for creating responsive
  layouts without unnecessary complexity.


  ## Features


  - Flexbox-based grid system

  - Powered by styled-components for CSS-in-JS styling

  - Minimal configuration and API surface

  - Responsive column definitions

  - Composable layout components
