name: lint-staged
description: Run linters and formatters on git staged files only. Speeds up
  pre-commit checks by processing only changed files. Perfect companion to Husky
  for efficient code quality checks in React projects without slowing down
  commits.
source_url: https://github.com/okonet/lint-staged
category: Developer Tools
tags:
  - git
  - linting
  - pre-commit
  - performance
markdown: >-
  ## Overview


  lint-staged runs linters on git staged files, making pre-commit hooks faster
  and more efficient. It only processes files that are about to be committed,
  significantly improving performance.


  ## Features


  - **Staged Files Only**: Process only changed files

  - **Fast**: Much faster than full project linting

  - **Multi-tool**: Run multiple linters/formatters

  - **Glob Patterns**: Match specific file types

  - **Concurrent**: Run tasks in parallel

  - **Git Integration**: Automatically stage fixes

  - **Configurable**: Flexible task configuration

  - **Husky Compatible**: Perfect with Husky


  ## Use Cases


  - Pre-commit code formatting

  - Staged file linting

  - Running tests on changed files

  - Optimizing pre-commit hooks

  - Enforcing code quality

  - Large monorepo workflows


  ## Pricing


  Free and open source (MIT License)
