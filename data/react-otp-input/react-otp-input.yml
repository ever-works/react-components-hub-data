markdown: >-
  ## Overview


  React OTP Input is a specialized form component for capturing one-time
  passwords and verification codes. It provides an optimized user experience
  with automatic field advancement and paste handling.


  ## Key Features


  - **Auto-Focus**: Automatic focus progression

  - **Paste Support**: Paste entire OTP at once

  - **Customizable**: Full styling control

  - **Variable Length**: 4-6 digit support

  - **Error Display**: Show/hide values

  - **Keyboard Support**: Full keyboard control

  - **Mobile Friendly**: Touch-optimized

  - **TypeScript**: Type support


  ## Features


  - Individual digit inputs

  - Auto-advance on digit entry

  - Paste entire code

  - Backspace handling

  - Copy support

  - Custom delimiter

  - Disabled state

  - Error state

  - Clear functionality


  ## Props


  - value: Current OTP value

  - onChange: Value change handler

  - numInputs: Number of inputs (default: 4)

  - placeholder: Input placeholder

  - isPasswordInput: Hide characters

  - disabled: Disable input

  - shouldAutoFocus: Auto-focus first input

  - inputStyle: Input CSS

  - containerStyle: Container CSS


  ## Use Cases


  - Two-Factor Authentication

  - Phone Verification

  - Email Verification

  - Security Code Entry

  - Reset Verification

  - Payment Verification


  ## UX Features


  - Smooth UX flow

  - Prevents input errors

  - Handles paste events

  - Clear error messaging

  - Mobile optimized


  ## Pricing


  Free and open-source under the MIT license.
