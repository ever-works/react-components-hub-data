markdown: >-
  ## Overview


  Mobiscroll is a feature-rich UI component library focused on advanced
  scheduling, calendar, and date/time picking functionality. It provides
  components that work seamlessly across desktop and mobile devices with
  native-feeling interactions.


  ## Core Components


  - Event Calendar with multiple views

  - Scheduler with resource management

  - Date & Time Pickers

  - Select dropdowns

  - Form components

  - Popup and notifications

  - Range selectors

  - Color picker

  - Calendar sync (Google, Outlook)


  ## Calendar & Scheduler Features


  - Day, Week, Month, Year views

  - Agenda and Timeline views

  - Resource scheduling

  - Drag and drop events

  - Recurring events

  - Timezone support

  - Event templates

  - Touch gestures

  - Responsive design

  - Dark mode


  ## Date & Time Pickers


  - Date picker

  - Time picker

  - DateTime picker

  - Date range picker

  - Duration picker

  - Wheel scroller (mobile-optimized)

  - Calendar scroller

  - Multiple selection


  ## Form Components


  - Input fields

  - Textarea

  - Button

  - Checkbox

  - Radio button

  - Switch

  - Segmented control

  - Stepper

  - Rating


  ## Key Features


  - Mobile-first design

  - Touch-optimized

  - Responsive across all devices

  - Accessibility compliant

  - RTL support

  - Theme customization

  - 85+ built-in themes

  - TypeScript support

  - Framework integrations (React, Angular, Vue)


  ## Use Cases


  - Booking and reservation systems

  - Scheduling applications

  - Calendar apps

  - Time tracking

  - Event management

  - Resource planning


  ## Pricing


  Commercial license starts at $499/year per developer. Free trial available.
