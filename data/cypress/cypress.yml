name: Cypress
description: Fast, easy, and reliable testing for anything that runs in a
  browser. Cypress provides a complete end-to-end testing experience with
  time-travel debugging, automatic waiting, and real-time reloads. Includes
  component testing for React applications.
source_url: https://www.cypress.io/
category: Testing
tags:
  - e2e
