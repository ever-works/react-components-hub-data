name: Carbon Design System
description: Carbon Design System is IBM's open-source design system providing a
  comprehensive set of enterprise-grade UI components built on the IBM Design
  Language. The React implementation offers 80+ components including data
  tables, forms, navigation, and data visualization widgets optimized for
  complex enterprise applications. Key features include design token support,
  dark mode theming, internationalization, WCAG accessibility compliance, and
  integration with IBM Cloud services. Primary use cases include enterprise
  dashboards, SaaS platforms, internal tools, and large-scale web applications
  requiring consistent branding. Compared to community libraries, Carbon
  benefits from IBM's rigorous design standards and extensive component coverage
  for data-intensive interfaces.
