markdown: >-
  ## Overview


  Aphrodite is a framework-agnostic CSS-in-JS library developed by Khan Academy
  that provides inline CSS with automatic vendor prefixing, style deduplication,
  and critical CSS extraction.


  ## Features


  - Automatic vendor prefixing

  - CSS generation

  - Style deduplication

  - Critical CSS extraction

  - Server-side rendering support

  - Minification in production

  - Works with any framework
