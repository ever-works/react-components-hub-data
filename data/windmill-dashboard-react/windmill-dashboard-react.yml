markdown: >-
  ## Overview


  Windmill Dashboard React prioritizes accessibility, making it uniquely suited
  for government projects, healthcare applications, education platforms, and any
  context where accessibility is not optional.


  ## Features


  - 100% keyboard navigable

  - WCAG compliant

  - Designed with assistive technology in mind

  - Multi-theme support (dark/light)

  - Responsive charts

  - Table pagination

  - Modal components

  - PWA readiness

  - Built on Windmill React UI with Tailwind CSS

  - Clean and functional design


  ## Pricing


  Free and open-source under the MIT license.
