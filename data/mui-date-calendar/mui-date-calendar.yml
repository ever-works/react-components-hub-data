markdown: >-
  ## Overview


  MUI's Date Calendar component is part of the MUI X date pickers suite. It
  provides an enterprise-grade calendar widget that lets users select dates
  directly inline, without requiring an input field or popper/modal overlay. It
  is designed for React applications already using the MUI ecosystem.


  ## Features


  - Inline date selection without input or popper/modal

  - Supports multiple view modes: year, month, and day

  - Disable future or past dates via `disableFuture` and `disablePast` props

  - Integrates with `LocalizationProvider` for date adapter support (date-fns,
  moment, dayjs, luxon)

  - Full TypeScript support with type-safe props

  - Comprehensive theming via MUI's theme system

  - Built-in enterprise-grade accessibility (a11y) standards following Material
  Design guidelines

  - Seamless integration with other MUI components


  ## Use Cases


  - Enterprise applications requiring polished, accessible date selection

  - Admin dashboards with inline calendar views

  - Forms using MUI's design language

  - Applications already committed to the MUI ecosystem


  ## Pricing


  The MUI Date Calendar is part of MUI X. Free and open-source components are
  available under the MIT license. Advanced MUI X features may require a Pro or
  Premium commercial license.
