markdown: >-
  ## Overview


  React Particles BG provides animated particle backgrounds for React
  applications. It offers various preset particle patterns including circles,
  lines, and custom shapes.


  ## Features


  - Multiple particle background presets

  - Customizable colors and particle shapes

  - Configurable particle count and speed

  - Responsive to screen size

  - Easy integration with any React layout
