name: React Helmet Async
description: A thread-safe fork of React Helmet for managing document head tags
  in React applications, essential for SEO, social sharing, and dynamic meta
  tags with SSR support.
source_url: https://github.com/staylor/react-helmet-async
category: Utilities
tags:
  - seo
