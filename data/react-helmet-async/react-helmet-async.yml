featured: false
markdown: >-
  ## Overview


  React Helmet Async is a reusable React component that manages changes to the
  document head. It's thread-safe and designed for server-side rendering, making
  it ideal for modern React applications.


  ## Features


  - Manage document head

  - Meta tags

  - Title tags

  - Link tags

  - Script tags

  - Style tags

  - Base tag

  - Noscript tags

  - HTML attributes

  - Body attributes

  - Server-side rendering

  - Thread-safe

  - TypeScript support

  - Declarative API


  ## Managed Elements


  ### Meta Tags

  - title

  - description

  - keywords

  - author

  - viewport

  - robots

  - canonical

  - og:* (Open Graph)

  - twitter:* (Twitter Cards)

  - Custom meta tags


  ### Link Tags

  - Stylesheets

  - Preload/prefetch

  - Canonical URL

  - Alternate languages

  - RSS feeds

  - Favicons

  - DNS-prefetch


  ### Script Tags

  - Inline scripts

  - External scripts

  - JSON-LD structured data

  - Analytics scripts

  - Third-party scripts


  ## SEO Features


  - Dynamic page titles

  - Meta descriptions

  - Open Graph tags

  - Twitter Cards

  - Canonical URLs

  - Structured data (JSON-LD)

  - Hreflang tags

  - Robots directives


  ## Social Sharing


  - Facebook Open Graph

  - Twitter Cards

  - LinkedIn meta tags

  - Custom thumbnails

  - Rich previews

  - Social titles/descriptions


  ## Server-Side Rendering


  - Thread-safe

  - Async rendering

  - Context provider

  - Extract head tags

  - Hydration support

  - No memory leaks


  ## Priority and Ordering


  - Tag ordering

  - Override tags

  - Nested Helmet components

  - Priority-based rendering

  - Last-in-wins strategy


  ## Use Cases


  ### SEO Optimization

  - Dynamic titles

  - Page descriptions

  - Structured data

  - Canonical URLs

  - Sitemap hints


  ### Social Media

  - Share previews

  - Card customization

  - Image optimization

  - Platform-specific tags


  ### Analytics & Tracking

  - Google Analytics

  - Facebook Pixel

  - Custom tracking

  - Conversion pixels


  ### Performance

  - Resource hints

  - Preload/prefetch

  - DNS prefetch

  - Critical CSS


  ## Integration


  - Next.js

  - Gatsby

  - React Router

  - Redux

  - Any React app


  ## Pricing


  Free and open-source under the MIT license.
