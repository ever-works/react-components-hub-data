markdown: >-
  ## Overview


  React Container Dimensions is a wrapper component that detects resize events
  on its container element and passes dimension data to child components,
  solving container query problems in React.


  ## Features


  - Container resize detection

  - Dimension data passed as props

  - Render props pattern

  - Works with dynamic layouts
