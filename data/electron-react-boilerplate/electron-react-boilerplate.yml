markdown: >-
  ## Overview


  Electron React Boilerplate is a complete foundation for building desktop
  applications using Electron and React with live editing and development
  workflows.


  ## Features


  - Electron + React integration

  - Live hot reloading

  - Auto updater

  - TypeScript support

  - Testing setup

  - CI/CD configuration

  - Cross-platform builds
