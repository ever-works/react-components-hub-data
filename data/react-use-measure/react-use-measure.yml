name: react-use-measure
description: A React hook for measuring element sizes and positions using
  ResizeObserver. Provides accurate, performant measurements of DOM elements
  with support for debouncing and polyfills. Perfect for responsive components
  and animations.
source_url: https://github.com/pmndrs/react-use-measure
category: Custom Hooks
tags:
  - hooks
  - resize
  - observer
  - measurements
markdown: >-
  ## Overview


  react-use-measure is a React hook that uses ResizeObserver to measure element
  dimensions and position. It provides accurate measurements with optimal
  performance for creating responsive components.


  ## Features


  - **ResizeObserver**: Modern, performant resize detection

  - **Debouncing**: Built-in debounce support

  - **Polyfill Support**: Works in older browsers

  - **TypeScript**: Full type definitions

  - **Scroll Detection**: Detects position changes

  - **Lightweight**: Minimal bundle size


  ## Use Cases


  - Responsive components that adapt to size changes

  - Animation triggers based on element size

  - Chart and visualization sizing

  - Dynamic layout calculations

  - Virtual scrolling and windowing


  ## Pricing


  Free and open source (MIT License)
