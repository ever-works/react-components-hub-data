markdown: >-
  ## Overview


  react-colorful is a tiny, fast color picker component for React and Preact
  applications. It's designed to be lightweight, performant, and flexible while
  supporting multiple color formats.


  ## Features


  - Tiny bundle size (2.8 KB gzipped)

  - 13x lighter than react-color

  - Tree-shakeable architecture

  - Fast performance with hooks and functional components

  - TypeScript support with 100% test coverage

  - Multiple color format components (HEX, RGB, HSL, HSB)

  - Alpha channel support

  - No dependencies

  - Accessible keyboard controls

  - Touch-friendly

  - Mobile responsive

  - SSR compatible

  - Framework support for React and Preact


  ## Color Format Components


  - HexColorPicker

  - RgbColorPicker

  - RgbaColorPicker

  - HslColorPicker

  - HslaColorPicker

  - HsvColorPicker

  - HsvaColorPicker


  ## Use Cases


  - Form color inputs

  - Theme customization

  - Design tools

  - Drawing applications

  - CSS color selection

  - Brand color pickers


  ## Pricing


  Free and open-source under the MIT license.
