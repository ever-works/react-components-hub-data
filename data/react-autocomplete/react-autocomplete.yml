markdown: >-
  ## Overview


  React AutoComplete provides a flexible autocomplete/suggestions component for
  React applications. It supports custom rendering of suggestions and
  integration with async data sources.


  ## Features


  - Customizable suggestion templates

  - Async data loading from APIs

  - Keyboard navigation support

  - Debounce for search throttling

  - Highlight matching text


  ## Installation


  `npm install react-autocomplete`


