markdown: >-
  ## Overview


  Vite is a modern build tool and development server that has become the
  standard for bootstrapping React projects. It leverages native ES modules in
  the browser for lightning-fast development builds and uses Rollup for
  production builds, offering exceptional performance.


  ## Features


  - Instant server start with native ESM

  - Lightning-fast Hot Module Replacement (HMR)

  - TypeScript support out of the box

  - Built-in CSS preprocessor support

  - Plugin system compatible with Rollup

  - Optimized production builds with Rollup

  - Framework-agnostic with React, Vue, Svelte support


  ## Pricing


  Free and open-source under the MIT license.
