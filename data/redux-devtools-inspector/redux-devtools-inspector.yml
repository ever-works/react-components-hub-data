markdown: >-
  ## Overview


  Redux DevTools Inspector is an alternative monitor for Redux DevTools,
  providing a tree view for inspecting actions and state changes.


  ## Features


  - Tree view of dispatched actions

  - State inspection

  - Action diff visualization

  - Filterable action tree


  ## Pricing


  Free and open-source under the MIT license.
