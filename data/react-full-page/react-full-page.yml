markdown: >-
  ## Overview


  React Full Page provides full screen scrolling with React using a FullPage
  component with Slide children. Create impressive fullscreen scrolling websites
  with smooth transitions and customizable controls.


  ## Features


  - Full screen slides

  - Smooth scroll transitions

  - Customizable scroll duration (default 700ms)

  - Built-in navigation controls

  - Custom control support

  - beforeChange callback

  - afterChange callback

  - Keyboard navigation

  - Mouse wheel support

  - Touch gestures

  - Responsive design

  - TypeScript support


  ## Components


  - FullPage: Main container

  - Slide: Individual full-screen section


  ## Navigation


  - Mouse wheel scrolling

  - Keyboard arrows

  - Touch swipe gestures

  - Custom navigation buttons

  - Dot indicators

  - Programmatic control


  ## Callbacks


  - beforeChange: Before slide transition

  - afterChange: After slide transition

  - Receive current and next slide indices


  ## Configuration


  - duration: Scroll animation duration

  - controls: Show/hide navigation

  - scrollUponMount: Auto-scroll on load


  ## Use Cases


  - Landing pages

  - Portfolio websites

  - Product showcases

  - Presentation sites

  - Storytelling pages

  - Marketing campaigns


  ## Pricing


  Free and open-source under the MIT license.
