markdown: >-
  ## Overview


  Stitches is a CSS-in-JS library with near-zero runtime, SSR support, and
  multi-variant support for building component-based UIs.


  ## Features


  - Near-zero runtime

  - SSR support

  - Multi-variant system

  - Theming

  - CSS extraction at build time

  - Type-safe API

  - Scoped styles
