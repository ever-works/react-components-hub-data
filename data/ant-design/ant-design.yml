markdown: >-
  ## Overview


  Ant Design provides a comprehensive set of UI components for enterprise-level
  React applications.


  ## Key Features


  - **Consistent Design Language**: Adheres to the Ant Design system for visual
  consistency.

  - **Modular Components**: Includes buttons, forms, tables, modals, and more
  with customizable props.

  - **Responsive Grid System**: Facilitates responsive layouts with flexible
  grid and layout containers.

  - **Accessibility**: Built-in ARIA attributes and keyboard navigation support.

  - **Internationalization**: Pre-configured language packs for 100+ languages.


  ## Pricing


  Free and open-source under the MIT license.
