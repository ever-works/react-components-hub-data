markdown: >-
  ## Overview


  Figma is a cloud-based design and prototyping tool that is the industry
  standard for UI/UX design. It enables designers and developers to collaborate
  in real-time on wireframes, component designs, and interactive prototypes,
  making it the primary tool for prototyping React components and app layouts.


  ## Features


  - Real-time collaborative design editing

  - Vector design and component-based layouts

  - Interactive prototyping with transitions

  - Design system management

  - Plugin ecosystem

  - Developer handoff with inspect mode

  - Auto-layout for responsive designs

  - Community templates and resources


  ## Pricing


  Free Starter plan available. Professional plans start at $12/editor/month.
  Organization and Enterprise plans available.
