markdown: >-
  ## Overview


  Tolgee is a web-based localization tool that enables developers and
  translators to translate directly within the React app during development.


  ## Features


  - In-context translation

  - Real-time preview

  - Web-based management

  - React integration

  - Automatic string extraction


  ## Links


  - [Documentation](https://tolgee.io/docs/web/using_with_react/installation)
