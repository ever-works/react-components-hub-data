markdown: >-
  ## Overview


  React Virtualized List optimizes rendering of large datasets by only rendering
  visible elements within a scrolling container.


  ## Features


  - Render thousands of items efficiently

  - Auto-measuring item heights

  - Cell cache and reuse

  - Horizontal and vertical layouts

  - Integration with React windowing APIs


  ## Installation


  `npm install react-virtualized`


