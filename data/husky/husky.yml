name: Husky
description: Modern native Git hooks made easy. Automatically run linting,
  testing, and formatting before commits and pushes. Essential for maintaining
  code quality and preventing bad commits in React projects with minimal
  configuration.
source_url: https://typicode.github.io/husky/
category: Developer Tools
tags:
