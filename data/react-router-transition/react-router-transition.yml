markdown: >-
  ## Overview


  React Router Transition provides easy-to-use transition animations for React
  Router. It leverages react-motion for smooth spring-based animations when
  routes change.


  ## Features


  - Page-level route transitions

  - Powered by react-motion spring physics

  - Configurable enter and exit animations

  - Works with react-router v3 and v4+

  - Preset animation styles
