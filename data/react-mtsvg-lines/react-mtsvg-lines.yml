markdown: >-
  ## Overview


  React MTSVG Lines is a component that animates SVG line strokes using the
  anime.js library. It enables drawing effects where SVG paths appear to be
  drawn over time.


  ## Features


  - SVG stroke animation powered by anime.js

  - Configurable draw-in and draw-out effects

  - Support for multiple SVG paths

  - Customizable animation duration and easing

  - Declarative React component interface
