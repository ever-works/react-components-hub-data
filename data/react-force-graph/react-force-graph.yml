markdown: >-
  ## Overview


  React Force Graph provides React components for creating force-directed graph
  visualizations in 2D, 3D, VR, and AR environments. Built on top of force-graph
  and three.js for powerful network visualizations.


  ## Features


  - Four rendering modes: 2D (Canvas), 3D (WebGL), VR, and AR

  - Force-directed graph layouts

  - Node and link customization

  - Interactive node dragging

  - Zoom and pan controls

  - Camera positioning and animation

  - Custom node and link rendering

  - Click and hover event handlers

  - Dynamic data updates

  - Directional links with arrows

  - Node and link labels

  - Particle animations along links

  - Collision detection

  - Warm-up simulation ticks

  - DAG (Directed Acyclic Graph) mode

  - Performance optimized for large graphs


  ## Packages


  - react-force-graph-2d: 2D Canvas rendering

  - react-force-graph-3d: 3D WebGL rendering

  - react-force-graph-vr: VR rendering with A-Frame

  - react-force-graph-ar: AR rendering


  ## Use Cases


  - Social network visualization

  - Organizational charts

  - Dependency graphs

  - Knowledge graphs

  - Network topology diagrams

  - Citation networks


  ## Pricing


  Free and open-source under the MIT license.
