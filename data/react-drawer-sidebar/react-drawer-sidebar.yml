markdown: >-
  ## Overview


  React Drawer Sidebar provides a sliding panel component for React
  applications. It supports custom content and responsive behavior for different
  screen sizes.


  ## Features


  - Left/right drawer positioning

  - Responsive toggle on mobile

  - Overlay backdrop

  - Keyboard escape support

  - Animation control


  ## Installation


  `npm install react-drawer`


