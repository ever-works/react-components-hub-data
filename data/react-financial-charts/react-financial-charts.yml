markdown: >-
  ## Overview


  react-financial-charts is a visualization library specifically designed for
  financial applications such as stock trading platforms and forex (FX) systems.
  It provides the tools and chart types most commonly needed in the financial
  and trading sectors.


  ## Features


  - **Financial data focus**: Purpose-built for financial data including
  candlestick charts, OHLCV data, and trading volume

  - **High accuracy**: Ensures precise representation of financial data, which
  is crucial for trading platforms

  - **Specialized chart types**: Includes technical analysis chart types
  tailored for financial markets

  - **Time-series support**: Optimized for displaying financial time-series data


  ## Considerations


  - **Narrowed use cases**: The financial focus limits its applicability for
  non-financial visualizations

  - **Smaller community**: Fewer resources and tutorials are available due to
  its niche audience


  ## Pricing


  Free and open-source.
