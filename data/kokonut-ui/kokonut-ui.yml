name: Kokonut UI
description: >-
  Kokonut UI is a modern, open-source React component library providing
  beautifully designed, customizable UI components built with contemporary
  design principles. It focuses on developer experience with copy-paste
  installation, clean APIs, and components that blend seamlessly into any
  application aesthetic.


  **Key Features:**

  - Free and open-source components under MIT license

  - Modern, clean design aesthetics suitable for contemporary web apps

  - Copy-paste installation model (components become your own code)

  - High customizability through CSS and component props

  - Regular updates with new components and improvements

  - Community-driven development


  **Primary Use Cases:** Modern web applications, SaaS dashboards, portfolio
  websites, and projects where developers want beautiful defaults they can
  easily customize rather than a rigid design system.


  **Compared to Alternatives:** Similar to Aceternity UI's copy-paste model but
  with less emphasis on dramatic animations and more focus on clean, functional
  components. Compared to shadcn/ui, it offers a different design aesthetic and
  may provide components not found in more mainstream libraries.
