markdown: >-
  ## Overview


  Render is a unified cloud platform that makes it easy to deploy and run web
  applications. For React developers, it offers seamless deployment of static
  sites, backend services, and managed databases, serving as a modern
  alternative to traditional hosting providers.


  ## Features


  - One-click deploy from Git repositories

  - Automatic HTTPS and CDN

  - Managed PostgreSQL and Redis databases

  - Background workers and cron jobs

  - Blue-green deployments with zero downtime

  - Private services and networking

  - Auto-scaling capabilities


  ## Pricing


  Free tier for static sites and web services. Paid plans start at $7/month for
  individual services, with compute pricing based on usage.
