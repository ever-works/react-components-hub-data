name: Animate.css
description: Animate.css is a popular cross-browser CSS animation library
  providing 80+ pre-built, ready-to-use animations through simple class names.
  With over 80k GitHub stars, it covers categories like entrance/exit effects,
  attention seekers, bouncing, fading, flipping, rotation, sliding, and zoom
  animations. Key features include CSS custom properties for customization,
  animation delays and durations, and compatibility with JavaScript libraries or
  standalone use. Primary use cases include page transitions, scroll-triggered
  reveals, hover effects, and element emphasis in marketing sites and web apps.
  Compared to heavier JS animation libraries like GSAP, Animate.css is
  lightweight, requires no JavaScript, and is ideal for quick, common
  animations, though it lacks the complex timeline control and sequencing
  capabilities of JS-based alternatives.
source_url: https://animate.style
category: UI Animation
