markdown: >-
  ## Overview


  Animate.css is a widely-used CSS animation library that provides a collection
  of ready-to-use animations. It works by adding predefined CSS class names to
  elements, requiring no JavaScript for basic usage.


  ## Features


  - Over 70+ predefined animations across categories: attention seekers, back
  entrances/exits, bouncing, fading, flippers, lightspeed, rotations, slides,
  specials, and zooming

  - Simple class-based API — just add `animate__animated` and the desired
  animation class

  - Works in all modern browsers

  - Lightweight and framework-agnostic

  - Supports CSS custom properties for customization

  - Can be used with JavaScript libraries or standalone


  ## Usage


  Install via npm: `npm install animate.css`, or include via CDN.


  ``html

  <div class="animate__animated animate__bounce">An animated element</div>

  ``


  ## Best Use Case


  Quick, simple animations that need to be implemented rapidly without
  JavaScript overhead.


  ## Pricing


  Free and open-source.
