markdown: >-
  ## Overview


  Notyf is a lightweight, dependency-free JavaScript notification library for
  vanilla JavaScript projects. It provides a simple API for displaying
  notification toasts with minimal configuration and a tiny bundle size.


  ## Features


  - Zero dependencies

  - Lightweight with minimal bundle size

  - Simple, minimal API

  - Framework-agnostic (vanilla JS)

  - Customizable toast duration

  - Configurable positioning

  - Support for success and error notification types

  - CSS animations for toast appearance

  - Simple installation and setup


  ## Installation


  ```bash

  # Using NPM

  npm i notyf

  # Using Yarn

  yarn add notyf

  ```


  ## Use Cases


  - Simple, framework-agnostic projects needing lightweight notifications

  - Vanilla JavaScript applications that don't require advanced customization

  - Projects prioritizing minimal bundle size and simplicity


  ## Pricing


  Free and open-source. Has more than 2,900 GitHub stars and over 32,000 weekly
  NPM downloads.
