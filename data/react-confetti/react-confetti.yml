markdown: >-
  ## Overview


  React Confetti is a component that renders animated confetti particles,
  perfect for celebrating achievements, milestones, or completing actions in
  your application.


  ## Key Features


  - **Canvas Rendering**: Performant particle system

  - **Customizable**: Colors, shapes, speed

  - **Physics**: Gravity and air resistance

  - **Responsive**: Auto-adjust to container

  - **Recycle**: Reuse particles

  - **Optional Tweens**: Smooth animations

  - **TypeScript**: Type support

  - **Accessibility**: Respects prefers-reduced-motion


  ## Configuration


  - width: Canvas width

  - height: Canvas height

  - numberOfPieces: Particle count

  - colors: Particle colors

  - gravity: Gravity strength

  - wind: Wind effect

  - friction: Air resistance

  - confettiSource: Starting point

  - twirlSpeed: Rotation speed


  ## Features


  - Falling confetti

  - Custom colors

  - Rotation animation

  - Gravity simulation

  - Wind effects

  - Particle lifetime

  - Multiple burst

  - Gravity variations

  - Wind variations


  ## Use Cases


  - Success Messages

  - Form Submission

  - Level Complete

  - Birthday/Anniversary

  - Achievement Unlocked

  - Order Confirmed

  - Goal Reached

  - Game Win


  ## Performance


  - Efficient canvas rendering

  - Optimized particle system

  - Minimal re-renders

  - GPU acceleration


  ## Accessibility


  - Respects prefers-reduced-motion

  - Optional disable option

  - No flashing


  ## Pricing


  Free and open-source under the MIT license.
