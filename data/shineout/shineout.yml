markdown: >-
  ## Overview


  Shineout is a React component library optimized for Chinese language support,
  providing a comprehensive set of components including form elements,
  navigation, tables, trees, and tree select dropdowns.


  ## Features


  - Chinese-friendly component design

  - Form elements and validation

  - Navigation components

  - Table with sorting and filtering

  - Tree and tree-select components

  - Dropdown and selection controls
