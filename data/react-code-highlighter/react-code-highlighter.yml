markdown: >-
  ## Overview


  React Syntax Highlighter is a lightweight and comprehensive syntax
  highlighting component for React with Prism.js and highlight.js support.


  ## Features


  - Support for 180+ languages via Prism or highlight.js

  - 40+ visual themes

  - Line numbers and line highlighting

  - Custom style component overrides

  - Lazy loading for large code blocks

  - Copy-to-clipboard integration


  ## Pricing


  Free and open-source under the MIT license.
