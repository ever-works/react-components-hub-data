name: React Code Highlighter
description: React Syntax Highlighter is a comprehensive syntax highlighting
  component built on prism.js and highlight.js that displays over 200
  programming languages with 40+ visual themes in React applications. It is
  currently the largest React code highlighting library with 4000+ GitHub stars
  and 250K+ weekly npm downloads. Key features include support for 180+
  languages via prism.js and 50+ via highlight.js, line numbers and line
  highlighting for code documentation, multiple visual themes optimized for
  light and dark mode, copy-to-clipboard integration, custom component
  overriding for tokens, and lazy loading support for large code blocks. Primary
  use cases include developer documentation sites, code playground platforms,
  technical blogs, API documentation, tutorial platforms, and developer tools
  requiring syntax-highlighted code display. Compared to lighter alternatives
  like react-shiki (which uses Shiki for VS Code-quality highlighting but has a
  larger bundle), or react-code-blocks (fewer themes and less community
  adoption), React Syntax Highlighter offers the widest language and theme
  support with the largest ecosystem.
