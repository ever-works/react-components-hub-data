markdown: >-
  ## Overview


  React Code Highlighter provides syntax highlighting for code snippets in React
  applications with multiple language and theme support.


  ## Features


  - 120+ programming languages

  - 40+ syntax themes

  - Line number support

  - Copy-to-clipboard button

  - Responsive code blocks


  ## Installation


  `npm install react-syntax-highlighter`


