markdown: >-
  ## Overview


  Algolia Autocomplete is a JavaScript library for building autocomplete
  experiences. It provides a flexible, performant foundation for
  search-as-you-type interfaces with React integration.


  ## Features


  - Lightning-fast search with debounced queries

  - Multiple concurrent data sources with priority-based ordering

  - Keyboard navigation and touch-friendly interactions

  - Accessibility built-in (WAI-ARIA compliant)

  - Plugin architecture for recent searches, query suggestions, and redirects

  - Customizable rendering with templates

  - TypeScript support

  - Headless by default — framework agnostic core


  ## Data Sources


  - Algolia indices

  - REST APIs

  - Static data

  - Multiple concurrent sources with source-specific templates


  ## Use Cases


  - Site search

  - E-commerce product search

  - Documentation search

  - Command palettes

  - Address lookups

  - Product finders


  ## Pricing


  Core library is free and open-source under the MIT license. Algolia search
  service has free tier and paid plans based on search volume.
