name: Algolia Autocomplete
description: Algolia Autocomplete is a JavaScript library for building fast,
  accessible autocomplete experiences with out-of-the-box React integration.
  Built by Algolia, it provides a flexible, headless architecture with support
  for multiple concurrent data sources, keyboard navigation, and advanced search
  capabilities like typo tolerance and faceted filtering. Key features include a
  plugin system for recent searches and query suggestions, customizable
  rendering with templates, and WAI-ARIA accessibility compliance.
