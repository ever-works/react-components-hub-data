markdown: >-
  ## Overview


  Algolia Autocomplete is a JavaScript library for building autocomplete
  experiences. It provides a flexible, performant foundation for
  search-as-you-type interfaces with React integration.


  ## Features


  - Lightning-fast search

  - Multiple data sources

  - Keyboard navigation

  - Accessibility built-in (WAI-ARIA)

  - Mobile-friendly

  - Debounced queries

  - Query suggestions

  - Recent searches

  - Highlighted matches

  - Custom rendering

  - Plugin architecture

  - Panel layouts

  - Virtual keyboard support

  - Touch-friendly

  - TypeScript support

  - Headless by default

  - Framework agnostic core


  ## Plugins


  - Recent Searches - save and display recent queries

  - Query Suggestions - suggest popular queries

  - Redirect URLs - navigate to specific pages

  - Algolia Insights - track user behavior

  - Custom plugins - extend functionality


  ## Data Sources


  - Algolia indices

  - REST APIs

  - Static data

  - Multiple concurrent sources

  - Source-specific templates

  - Priority-based ordering


  ## Search Features


  - Instant results

  - Typo tolerance

  - Faceted search

  - Filtering

  - Highlighting

  - Ranking customization

  - Language detection

  - Synonym support


  ## Customization


  - Custom templates

  - Panel components

  - Source components

  - Styling with CSS

  - Theme variables

  - Layout control

  - Result grouping


  ## React Integration


  - React hooks

  - Component-based API

  - State management

  - Context providers

  - Event handling

  - Dynamic sources


  ## Use Cases


  - Site search

  - E-commerce search

  - Documentation search

  - Command palettes

  - Address lookups

  - Product finders


  ## Pricing


  Core library is free and open-source under the MIT license. Algolia search
  service has free tier and paid plans.
