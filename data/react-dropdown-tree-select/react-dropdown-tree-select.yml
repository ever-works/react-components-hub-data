markdown: >-
  ## Overview


  A lightweight and fast React control to render a select component that can
  display hierarchical tree data. It shows the selection in pills and allows
  users to search the options for quick filtering and selection.


  ## Features


  - Hierarchical data display

  - Single and multi-select modes

  - Search and filter functionality

  - Keyboard navigation (arrow keys, page up/down, home/end)

  - Toggle selection with Enter key

  - Checkbox support

  - Customizable node rendering

  - Virtual scrolling for performance

  - Accessible ARIA attributes

  - TypeScript support

  - Tag/pill display for selections

  - Clear all functionality

  - Disabled state support

  - Custom CSS styling


  ## Performance


  - Creates a flat list of nodes from hierarchical tree data

  - Performs linear-time searches regardless of tree depth or size

  - Efficient rendering for large datasets


  ## Use Cases


  - Category selection

  - Organization hierarchies

  - File system navigation

  - Department selection

  - Location pickers


  ## Pricing


  Free and open-source under the MIT license.
