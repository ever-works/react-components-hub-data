markdown: >-
  ## Overview


  React Track is a library that tracks DOM element positions and exposes
  position data for creating scroll-based or position-aware animations in React
  applications.


  ## Features


  - DOM element position tracking

  - Position-driven animations

  - Scroll-aware component behavior

  - Composable tracking recipes

  - Position data exposed as render props
