name: Atlaskit
description: Atlaskit is Atlassian's official React UI component library,
  providing a comprehensive design system with 100+ components for building
  enterprise applications that match Atlassian's design language and user
  experience standards. It covers everything from basic UI elements (badges,
  buttons, icons) to complex components (tree tables, date pickers,
  drag-and-drop boards) and design tokens for consistent theming. Key features
  include enterprise-grade accessibility, comprehensive documentation with live
  examples, TypeScript support, Storybook integration for component exploration,
  and alignment with the Atlassian Design System. Primary use cases include
  building Jira/Confluence-like enterprise applications, internal tools, and
  SaaS products requiring a polished, corporate-grade UI. Compared to
  open-source alternatives like Material UI or Ant Design, Atlaskit offers a
  more refined enterprise aesthetic with Atlassian's battle-tested patterns,
  though it has a narrower scope focused on Atlassian's specific design
  philosophy.
