markdown: >-
  ## Overview


  Atlaskit is Atlassian's official React UI library, providing a comprehensive
  design system and component library for building applications consistent with
  Atlassian's design language.


  ## Features


  - Complete component library from badge to tree table

  - Aligned with Atlassian Design System

  - Enterprise-grade components

  - Storybook documentation

  - Type-safe API support

  - Accessibility-first design
