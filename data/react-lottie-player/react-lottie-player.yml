markdown: >-
  ## Overview


  React Lottie Player is a declarative Lottie animation player for React
  applications, rendering After Effects animations exported as JSON.


  ## Features


  - Declarative API

  - Lottie animation rendering

  - Play/pause/loop controls

  - Customizable sizing


