markdown: >-
  ## Overview


  React Icons is a collection of high-quality SVG icons for React applications.
  It includes icons from major icon sets and provides easy integration with
  TypeScript support.


  ## Features


  - 1000+ icons from popular icon libraries

  - Tree-shakable and lightweight

  - TypeScript type definitions

  - Dynamic icon loading

  - Customizable icon sizes and colors


  ## Installation


  `npm install react-icons`


