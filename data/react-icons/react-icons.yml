name: React Icons
description: React Icons is the largest SVG icon library for React with over
  10,000 icons from 20+ popular icon sets including Font Awesome, Material
  Design Icons, Lucide, Heroicons, Tabler Icons, Devicons, and more. It uses ES6
  import syntax with tree-shaking support so you only bundle the icons you
  actually use, keeping your bundle size minimal. Key features include 20+ icon
  packages with 10,000+ total icons from sources like Font Awesome 5/6, Material
  Design Icons, Lucide, Heroicons, Tabler, Phosphor, Boxicons, and Devicons,
  full tree-shaking support ensuring zero-cost imports for unused icons, native
  SVG rendering with no external font dependencies, customizable sizing and
  coloring via standard React props and CSS, TypeScript support with
  auto-generated type definitions for all icons, and a simple unified import API
  across all icon sets. Primary use cases include navigation icons, button
  icons, status indicators, form field icons, sidebar navigation, and any React
  application requiring polished, scalable iconography. Compared to using raw
  SVG files from individual libraries (which requires managing multiple imports
  and inconsistent APIs) or icon font solutions like FontAwesome (which add
  larger font files), React Icons provides a unified, tree-shakeable API for
  accessing the entire icon ecosystem from a single package.
