markdown: >-
  ## Overview


  Cerebral is a state controller with its own debugger, designed to provide
  predictable and debuggable state management for React applications.


  ## Features


  - Centralized state controller

  - Built-in debugger

  - Time-travel debugging

  - Predictable state changes

  - Signal-based architecture

  - Declarative action sequences

  - DevTools integration

  - Supports multiple UI frameworks including React
