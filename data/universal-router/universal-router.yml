markdown: >-
  ## Overview


  Universal Router is a simple middleware-style router for isomorphic JavaScript
  web applications. It works on both client and server sides with chainable
  route configurations.


  ## Features


  - Middleware-style architecture

  - Isomorphic/client-server support

  - Chainable route definitions

  - Parameter extraction from URLs

  - Route nesting

  - Async route handlers

  - Works with any framework (React, Vue, etc.)

  - Small bundle size
