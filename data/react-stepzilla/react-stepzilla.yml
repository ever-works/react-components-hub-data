markdown: >-
  ## Overview


  React StepZilla is a multi-step, wizard component that guides users through a
  sequence of React components for data collection. It provides a simple API for
  creating complex multi-step forms with validation.


  ## Features


  - Accept any React component as a step

  - Built-in navigation controls

  - Step validation before proceeding

  - Progress indicator

  - Previous/Next button customization

  - Step completion callbacks

  - Prevent step skipping

  - Custom button text

  - Step-by-step data collection

  - Validation hooks

  - Responsive design

  - Easy integration

  - Minimal configuration required

  - Compatible with form libraries


  ## How It Works


  1. Pass an array of React components as steps

  2. Each step can be a form, text, or any React component

  3. Built-in controls for navigation

  4. Validation ensures data quality

  5. Callbacks for step transitions


  ## Use Cases


  - User registration flows

  - Product configuration wizards

  - Survey forms

  - Booking processes

  - Application forms

  - Onboarding experiences


  ## Pricing


  Free and open-source under the MIT license.
