markdown: >-
  ## Overview


  React Spreadsheet Grid is an Excel-like spreadsheet component that provides
  powerful data editing capabilities with high performance and extensive
  customization options.


  ## Features


  - Custom cell editors (Input, Select, or custom components)

  - Custom header content

  - Performant scroll for unlimited rows

  - Resizable columns

  - Mouse and keyboard control

  - Flexible disabled cell configuration

  - Lazy loading support

  - Customizable CSS styling

  - React Hooks compatible

  - TypeScript support

  - Copy/paste operations

  - Cell validation

  - Row and column spanning


  ## Cell Editors


  - Built-in Input editor

  - Built-in Select dropdown

  - Custom React components

  - Inline editing

  - Cell focus management


  ## Navigation


  - Arrow keys navigation

  - Tab key movement

  - Enter to edit

  - Escape to cancel

  - Click to select

  - Drag to select range


  ## Configuration


  - Column definitions

  - Cell renderer functions

  - Disabled cell logic

  - Custom validators

  - Value formatters

  - Data binding


  ## Performance


  - Virtual scrolling

  - Efficient updates

  - Lazy data loading

  - Minimal re-renders


  ## Use Cases


  - Data entry interfaces

  - Configuration tables

  - Price lists

  - Inventory tracking

  - Order management

  - Report builders

  - Admin panels


  ## Pricing


  Free and open-source under the MIT license.
