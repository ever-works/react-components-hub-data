markdown: >-
  ## Overview


  React Motion enables developers to create realistic physics-based animations
  in React applications.


  ## Features

  - Spring physics animation system

  - Support for SVG and Canvas rendering

  - Compatible with all modern browsers

  - Lightweight and performant

  - Easy-to-use API


  ## Pricing

  Free and open source under MIT license.
