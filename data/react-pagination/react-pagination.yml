markdown: >-
  ## Overview


  React Pagination provides an easy-to-use pagination component for React
  applications.


  ## Features


  - Customizable previous/next buttons

  - Ellipsis for long pagination bars

  - Active page indicator

  - Support for large datasets

  - Keyboard navigation


  ## Installation


  `npm install react-paginate`


