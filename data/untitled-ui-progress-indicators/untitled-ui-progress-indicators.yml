markdown: >-
  ## Overview

  Progress indicator components from Untitled UI React for displaying task and
  loading progress.


  ## Features

  - 2 components with 9 variants

  - Built with Tailwind CSS v4.2 and React Aria v1.16

  - Progress bars and circular indicators

  - Multiple style variants

  - Copy, paste, and build workflow


  ## Pricing

  Open-source. Part of the Untitled UI React collection.
