markdown: >-
  ## Overview


  Ark UI is a headless library providing 45+ accessible, unstyled components
  that work across multiple frameworks. It focuses on adaptability and
  composability, allowing developers to bring their own styles and build design
  systems that work everywhere.


  ## Features


  - 45+ accessible components

  - Framework support: React, Solid, Vue, Svelte

  - Completely unstyled (headless)

  - WAI-ARIA compliant

  - Keyboard navigation support

  - TypeScript support

  - Composable architecture

  - Customizable behavior

  - Server-side rendering compatible

  - No runtime styles

  - Tree-shakeable

  - Modern API design

  - Active development

  - Comprehensive documentation


  ## Component Categories


  - Overlays (Dialog, Popover, Tooltip)

  - Forms (Select, Combobox, Checkbox)

  - Navigation (Tabs, Menu, Accordion)

  - Media (Avatar, Image)

  - Data display (Table, Pagination)

  - Feedback (Toast, Progress)

  - And many more


  ## Use Cases


  - Building design systems

  - Cross-framework component libraries

  - Custom-styled applications

  - Accessibility-first projects

  - Enterprise applications


  ## Pricing


  Free and open-source under the MIT license.
