name: Ark UI
description: Ark UI is a modern, headless component library providing 45+
  accessible, unstyled UI primitives that work seamlessly across React, Solid,
  Vue, and Svelte frameworks. Built by the Zag.js team, it leverages a
  state-machine architecture (XState) under the hood for predictable component
  behavior with complete styling freedom and WAI-ARIA compliance. Key features
  include framework-agnostic architecture, keyboard navigation and focus
  management, composable API design, tree-shakeable exports, and server-side
  rendering compatibility. Primary use cases include building cross-framework
  design systems, custom-styled accessible applications, and enterprise UI
  libraries that need consistent behavior across different frontend stacks.
  Compared to Radix UI (React/Vue-only) or Headless UI (Tailwind ecosystem
  only), Ark UI offers broader framework support with React, Solid, Vue, and
  Svelte all from a single codebase.
