markdown: >-
  ## Overview


  React Contenteditable is a wrapper component for the HTML contenteditable
  attribute, providing a controlled React interface for inline text editing.


  ## Key Features


  - **Controlled Component**: React-managed state

  - **Text Editing**: Inline text editing

  - **Event Handling**: Full event support

  - **HTML Preservation**: Maintain HTML structure

  - **Sanitization**: Optional HTML sanitization

  - **TypeScript**: Type support

  - **Performance**: Efficient updates


  ## Features


  - Editable content

  - Controlled updates

  - Focus management

  - Blur handling

  - Text selection

  - Undo/redo support

  - Copy/paste handling

  - HTML content

  - Plain text mode


  ## Props


  - html: Content HTML

  - disabled: Disable editing

  - onChange: Content change handler

  - onBlur: Blur handler

  - onFocus: Focus handler

  - className: CSS class

  - style: Inline styles

  - tagName: Container element


  ## Methods


  - getValue: Get text value

  - setValue: Set text value

  - focus: Focus element

  - blur: Blur element


  ## Use Cases


  - Inline Title Editing

  - Editable Lists

  - Note-Taking Apps

  - Content Management

  - Form Fields

  - Collaborative Editing

  - Rich Text (basic)


  ## Security


  - HTML sanitization

  - Script injection prevention

  - Safe content handling


  ## Pricing


  Free and open-source under the MIT license.
