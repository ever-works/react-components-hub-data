markdown: >-
  ## Overview


  React ColRow provides responsive grid layout components built on CSS flexbox,
  offering fraction-based width support and auto-grow capabilities for building
  flexible layouts.


  ## Features


  - CSS flexbox-based grid system

  - Fraction-width support for proportional sizing

  - Auto-grow columns

  - Responsive layout with minimal configuration

  - Column and row oriented layouts
