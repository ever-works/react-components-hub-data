markdown: >-
  ## Overview


  Data Driven Forms provides a declarative approach to building forms in React.
  Define your forms through a JSON schema and it automatically generates all
  form fields, validation, and layouts.


  ## Features


  - JSON schema form definition

  - Automatic field generation

  - Built-in validation

  - Multiple renderer support (MUI, Blueprint, PF4)

  - Custom field components

  - Conditional rendering

  - Wizard/stepper forms

  - File upload support
