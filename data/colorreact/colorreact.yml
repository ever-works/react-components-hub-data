name: colorReact
description: >-
  colorReact is a minimal, ultra-lightweight color picker component for React
  applications that provides a simple color selection widget with a tiny bundle
  footprint. It renders an intuitive color selection UI that can be embedded in
  forms, style editors, or theme customization panels with minimal code.


  **Key Features:**

  - Ultra-lightweight at just a few kilobytes gzipped

  - Simple, intuitive color picking interface

  - onChange callback for real-time color updates

  - Zero external dependencies

  - Easy customization through CSS

  - Works seamlessly with React's standard state management patterns


  **Primary Use Cases:** Form color inputs, theme configuration panels, brand
  color selectors, and design customization tools in React applications that
  need a simple color picker without heavy dependencies.


  **Compared to Alternatives:** Unlike react-color (which offers multiple picker
  styles like Sketch, Chrome, and Photoshop at ~100KB), colorReact focuses on a
  single minimal pattern with a fraction of the bundle size. It trades advanced
  features like color format conversion for simplicity and lightweight
  integration.
