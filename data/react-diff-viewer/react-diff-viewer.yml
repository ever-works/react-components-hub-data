markdown: >-
  ## Overview


  React Diff Viewer is a simple and beautiful text diff component made with Diff
  and React. It provides an intuitive interface for comparing text and code with
  comprehensive customization options.


  ## Features


  - Split view mode

  - Inline view mode

  - Word-level diff highlighting

  - Line-level diff highlighting

  - Syntax highlighting support

  - Line numbers

  - Custom styles via emotion

  - Collapsible unchanged sections

  - Show/hide line numbers

  - Custom diff method

  - TypeScript support

  - Virtualization for large files

  - Dark and light themes

  - Copy code functionality

  - Expand/collapse controls


  ## View Modes


  - Split: Side-by-side comparison

  - Inline: Unified diff view


  ## Customization


  - Custom syntax highlighter

  - Custom styles per line

  - Custom diff algorithm

  - Line number formatting

  - Gutter customization

  - Content rendering control


  ## Diff Highlighting


  - Added lines (green)

  - Removed lines (red)

  - Modified lines (yellow)

  - Word-level changes


  ## Use Cases


  - Code review interfaces

  - Version comparison

  - Git diff visualization

  - Document changes

  - Configuration comparison

  - Merge conflict resolution

  - Pull request reviews


  ## Pricing


  Free and open-source under the MIT license.
