markdown: >-
  ## Overview


  React Modal Portal creates modal dialogs by rendering content into a portal
  outside the standard DOM hierarchy. This helps with z-index management and
  accessibility.


  ## Features


  - Automatically positions modals above content

  - Screen reader accessibility

  - Escape key dismissal

  - Customizable backdrop

  - Support for nested modals


  ## Installation


  `npm install react-modal-portal`


