name: BizCharts
description: BizCharts is a React charting library developed by Alibaba's AntV
  team, built on top of G2 (a visualization grammar engine based on D3). It
  provides declarative chart components for building business data
  visualizations with an intuitive JSX syntax. Key features include support for
  line, bar, pie, scatter, area, funnel, radar, and heat map charts, declarative
  grammar-based chart composition, configurable axes and legends, and responsive
  resizing. Primary use cases include business intelligence dashboards,
  analytics applications, reporting tools, and any React project needing
  customizable chart visualizations. Note that BizCharts v3 and earlier are
  based on AntV G2; Ant Design Charts is the newer charting library from the
  same team that supersedes BizCharts for new projects. Compared to Recharts
  (simpler grammar, larger community in Western markets), BizCharts offers more
  sophisticated visualization grammar but with a steeper learning curve.
