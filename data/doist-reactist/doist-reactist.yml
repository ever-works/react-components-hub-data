name: Doist Reactist
description: >-
  Doist Reactist is a collection of open-source React UI components built with
  Emotion CSS-in-JS, created by Doist (the company behind Todoist and Twist).
  With 35+ components ranging from basics like buttons, inputs, and tooltips to
  complex elements like modals, dropdowns, and date pickers, it provides a
  cohesive design language for building web applications with zero external
  dependencies.


  **Key Features:**

  - 35+ production-ready React components

  - Zero runtime dependencies (only peer dependency is React)

  - Styled with Emotion CSS-in-JS for dynamic theming

  - Clean, minimalist design language

  - MIT-licensed and open-source

  - Consistent API across all components


  **Primary Use Cases:** Teams building productivity tools, web applications
  needing a clean minimal UI foundation, and developers who want quality
  components without the overhead of large UI libraries.


  **Compared to Alternatives:** Unlike Material-UI (100+ components, heavier) or
  Bootstrap React (many dependencies), Reactist is intentionally minimal with
  zero dependencies beyond React. It offers fewer components but each is
  well-crafted for productivity-focused interfaces.
