markdown: >-
  ## Overview


  Doist Reactist is a collection of open-source React components created by
  Doist. It provides a variety of UI components that can be used across
  different projects.


  ## Features


  - Reusable React components

  - MIT licensed

  - Styled with emotion

  - Includes 35+ components

  - Zero dependencies


  ## Installation


  ```bash

  $ npm install @doist/reactist

  ```


  ## Pricing


  Free and open-source under MIT license.
