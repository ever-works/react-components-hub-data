name: Playwright
description: Microsoft's modern end-to-end testing framework for web
  applications. Enables reliable testing across Chrome, Firefox, and Safari with
  a single API. Features auto-waiting, web-first assertions, and powerful
  debugging tools for React applications.
source_url: https://playwright.dev/
category: Testing
