markdown: >-
  ## Overview


  A completely customizable framework for building rich text editors. Build
  everything from a simple text editor to a complex word processor.


  ## Key Features


  - Fully customizable

  - Plugin architecture

  - Nested data model

  - Flexible configuration

  - Event handling

  - Transform API

  - Normalization

  - History tracking

  - TypeScript support

  - React integration


  ## Architecture


  - Value: Document structure

  - Editor: Main component

  - Plugins: Extend functionality

  - Operations: Content changes

  - Selection: Text selection state


  ## Pricing


  Free and open-source under the MIT license.
