name: React Use Gesture
description: A library for adding gesture recognition to React components,
  supporting drag, pinch, scroll, wheel, hover, and move gestures with
  fine-grained control.
source_url: https://use-gesture.netlify.app
category: Interaction
tags:
  - gestures
