featured: false
markdown: >-
  ## Overview


  React Use Gesture provides hooks for adding rich gesture interactions to React
  components. It supports a wide range of gestures with precise control over
  behavior and works seamlessly with animation libraries.


  ## Supported Gestures


  - Drag - mouse/touch dragging

  - Pinch - two-finger zoom/rotate

  - Scroll - scroll detection

  - Wheel - mouse wheel

  - Move - mouse/touch movement

  - Hover - mouse hover


  ## Features


  - Hook-based API

  - Multi-touch support

  - Velocity tracking

  - Direction detection

  - Distance calculation

  - Gesture state

  - Gesture combinations

  - Custom thresholds

  - Boundaries

  - Inertia/momentum

  - Spring physics integration

  - TypeScript support


  ## Drag Features


  - Drag constraints (axis, bounds)

  - Drag threshold

  - Initial position

  - Velocity

  - Direction

  - Distance traveled

  - Release momentum

  - Drag handles


  ## Pinch Features


  - Scale tracking

  - Rotation tracking

  - Origin point

  - Pinch threshold

  - Min/max scale

  - Velocity


  ## Configuration


  - Axis locking (x, y, both)

  - Boundaries

  - Initial values

  - Threshold values

  - Filtering

  - Transform values

  - Event options

  - Pointer events


  ## State Information


  - Active state

  - Movement delta

  - Offset

  - Velocity

  - Direction

  - Distance

  - Time

  - Initial position

  - Previous values


  ## Integration


  - React Spring integration

  - Framer Motion compatible

  - Custom animation libraries

  - DOM manipulation

  - Canvas interactions

  - SVG interactions


  ## Use Cases


  - Image galleries (pinch-to-zoom)

  - Drag-to-dismiss cards

  - Swipeable carousels

  - Interactive charts

  - Drawing applications

  - Game interfaces

  - Touch-based navigation

  - Custom sliders

  - 3D model viewers


  ## Pricing


  Free and open-source under the MIT license.
