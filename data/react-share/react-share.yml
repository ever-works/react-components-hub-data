markdown: >-
  ## Overview


  React Share provides social media share buttons for React applications. It
  supports all major social platforms with customizable buttons, share counts,
  and tracking capabilities.


  ## Supported Platforms


  - Facebook

  - Twitter (X)

  - LinkedIn

  - Pinterest

  - Reddit

  - WhatsApp

  - Telegram

  - Email

  - VK

  - Tumblr

  - Weibo

  - Line

  - Viber

  - Mailru

  - LiveJournal

  - Workplace

  - Pocket

  - Instapaper

  - Hatena


  ## Components


  ### Share Buttons

  - FacebookShareButton

  - TwitterShareButton

  - LinkedinShareButton

  - PinterestShareButton

  - RedditShareButton

  - WhatsappShareButton

  - EmailShareButton

  - And more...


  ### Share Counts

  - FacebookShareCount

  - PinterestShareCount

  - RedditShareCount

  - TumblrShareCount

  - VKShareCount


  ### Icons

  - FacebookIcon

  - TwitterIcon

  - LinkedinIcon

  - PinterestIcon

  - And corresponding icons for all platforms


  ## Features


  - Customizable buttons

  - Share counts

  - Custom icons

  - URL sharing

  - Title/description passing

  - Image sharing (Pinterest)

  - Hashtag support

  - Via account (Twitter)

  - Custom window options

  - Callback support

  - TypeScript support


  ## Icon Customization


  - size - icon size

  - round - circular icons

  - borderRadius - custom radius

  - bgStyle - background style

  - iconFillColor - icon color

  - Custom SVG icons


  ## Share Configuration


  ### Common Props

  - url - URL to share

  - title - share title

  - quote - share quote/description

  - hashtag - hashtag (Facebook)

  - via - via account (Twitter)

  - beforeOnClick - callback

  - onShareWindowClose - callback

  - openShareDialogOnClick

  - resetButtonStyle


  ### Platform-Specific

  - media - image URL (Pinterest)

  - description - description text

  - source - content source

  - body - email body

  - subject - email subject


  ## Use Cases


  ### Content Sharing

  - Blog posts

  - Articles

  - Products

  - Images/galleries

  - Videos


  ### Marketing

  - Viral content

  - Campaign sharing

  - User-generated content

  - Social proof

  - Referral programs


  ### Analytics

  - Track shares

  - Measure virality

  - Platform preferences

  - Engagement metrics


  ## Integration


  - Analytics platforms

  - Event tracking

  - Custom callbacks

  - URL shorteners

  - UTM parameters


  ## Pricing


  Free and open-source under the MIT license.
