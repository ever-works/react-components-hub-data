markdown: >-
  ## Overview


  AOS (Animate On Scroll) is an open-source library for animating elements on
  scroll. It optimizes performance by using CSS for animations and JavaScript
  only for logic, making it fast and beginner-friendly.


  ## Features


  - Easy setup with data attributes

  - 50+ built-in animations

  - Fade, flip, slide, and zoom effects

  - Customizable duration and delay

  - Easing options

  - Offset configuration

  - Once or repeat animations

  - Anchor placements

  - Disable on mobile option

  - Lightweight (~3.2kb gzipped)

  - No dependencies

  - Works with any framework

  - CSS-powered for performance

  - Simple API


  ## Animation Types


  - Fade (up, down, left, right)

  - Flip (up, down, left, right)

  - Slide (up, down, left, right)

  - Zoom (in, out, in-up, in-down)

  - And many more combinations


  ## Use Cases


  - Landing pages

  - Marketing websites

  - Portfolio sites

  - Product showcases

  - Storytelling pages

  - Interactive presentations


  ## Pricing


  Free and open-source under the MIT license.
