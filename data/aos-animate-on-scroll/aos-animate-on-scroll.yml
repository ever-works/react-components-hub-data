name: AOS - Animate On Scroll
description: AOS (Animate On Scroll) is a lightweight, dependency-free
  JavaScript library that triggers CSS animations on elements as they enter the
  viewport during page scrolling. It's designed around performance, using CSS
  for animations and JavaScript only for scroll detection and triggering,
  keeping the gzipped footprint at just ~3.2KB. Key features include 50+
  built-in animations (fade, flip, slide, zoom), easy declarative API using data
  attributes, customizable duration/delay/easing, and options for single or
  repeated triggering per scroll pass. Primary use cases include landing pages,
  marketing sites, portfolio websites, and product showcases that benefit from
  scroll-driven visual engagement. Compared to heavier libraries like wow.js
  (Animate.css companion) or Intersection Observer-based custom implementations,
  AOS offers a simpler setup with no external dependencies and better
  performance, though it lacks the advanced timeline control of ScrollTrigger
  (GSAP).
