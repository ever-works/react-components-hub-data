markdown: >-
  ## Overview


  Material Tailwind is an open-source UI library that combines the beauty of
  Material Design with the power and flexibility of Tailwind CSS. It provides
  pre-designed React components that are easy to customize and integrate into
  your projects.


  ## Features


  - 70+ React components

  - Full Tailwind CSS integration

  - Material Design aesthetics

  - Responsive design out of the box

  - Customizable themes

  - TypeScript support

  - Dark mode support

  - Accessibility best practices

  - No JavaScript dependencies

  - Easy customization


  ## Components Included


  - Buttons

  - Forms (input, checkbox, radio, select)

  - Navbars and navigation

  - Cards and layouts

  - Modals and dialogs

  - Dropdowns and menus

  - Tabs and accordions

  - Badges and alerts

  - Spinners and loaders

  - Typography components


  ## Installation


  ```bash

  npm install @material-tailwind/react

  ```


  ## Pricing


  Free and open source under the MIT license.
