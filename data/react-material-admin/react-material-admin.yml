  ## Overview


  React Material Admin by Flatlogic delivers a straightforward Material Design
  dashboard that is less opinionated than Ant Design Pro and less sprawling than
  React Admin.


  ## Features


  - Chart widgets

  - Notification system

  - Login and error pages

  - Sidebar navigation

  - Table components

  - Material Design aesthetic throughout

  - Mobile-responsive

  - No half-finished pages


