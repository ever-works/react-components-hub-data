markdown: >-
  ## Overview


  React Intersection Observer provides a simple React hook and component for
  using the Intersection Observer API. It's essential for implementing lazy
  loading, infinite scroll, animations on scroll, and tracking element
  visibility.


  ## Features


  - Hook-based API (useInView)

  - Component-based API

  - Intersection Observer API wrapper

  - Element visibility detection

  - Viewport entry/exit detection

  - Percentage visible tracking

  - Root margin support

  - Threshold configuration

  - Multiple instances

  - TypeScript support

  - SSR compatible

  - Minimal bundle size


  ## API


  - useInView() hook

  - InView component

  - ref assignment

  - inView boolean state

  - entry object with intersection data

  - Configurable options


  ## Configuration Options


  - root - viewport element

  - rootMargin - margin around root

  - threshold - visibility percentage

  - triggerOnce - only trigger once

  - skip - temporarily disable

  - initialInView - initial state

  - trackVisibility - track visibility

  - delay - minimum delay


  ## Common Use Cases


  ### Lazy Loading

  - Images

  - Videos

  - Iframes

  - Heavy components

  - Code splitting triggers


  ### Infinite Scroll

  - Load more content

  - Pagination triggers

  - Feed loading

  - List expansion


  ### Animations

  - Scroll animations

  - Fade-in effects

  - Parallax effects

  - Reveal animations

  - Progress tracking


  ### Analytics

  - Viewability tracking

  - Ad impression tracking

  - Content engagement

  - Scroll depth

  - Element visibility metrics


  ## Performance Benefits


  - No scroll event listeners

  - Browser-native optimization

  - Efficient viewport checks

  - Reduced JavaScript execution

  - Battery-friendly


  ## Browser Support


  - All modern browsers

  - Polyfill available for older browsers

  - IE11 support with polyfill

  - Mobile browsers


  ## Integration


  - Works with any React app

  - Next.js compatible

  - Gatsby compatible

  - React Native Web

  - Animation libraries


  ## Pricing


  Free and open-source under the MIT license.
