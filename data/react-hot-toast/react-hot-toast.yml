markdown: >-
  ## Overview


  React Hot Toast is a lightweight, customizable toast notification library for
  React. It provides a clean API for displaying success, error, loading, and
  custom notifications with beautiful default styles and smooth animations.


  ## Features


  - Easy to use with minimal setup

  - Beautiful default styles

  - Customizable appearance

  - Promise-based API for async operations

  - Multiple toast positions

  - Custom icons and emoji support

  - Dark mode support

  - Accessibility features

  - TypeScript support

  - Tiny bundle size

  - No dependencies

  - Keyboard dismissal

  - Auto-dismiss with custom duration

  - Stack/queue management

  - Custom render functions

  - Smooth animations

  - Mobile-friendly


  ## Toast Types


  - Success notifications

  - Error messages

  - Loading states

  - Custom toasts

  - Promise toasts (auto-update on resolve/reject)


  ## Use Cases


  - Form submission feedback

  - API request status

  - User action confirmations

  - Error messaging

  - Loading indicators

  - General notifications


  ## Pricing


  Free and open-source under the MIT license.
