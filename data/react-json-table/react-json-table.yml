markdown: >-
  ## Overview


  React JSON Table converts JSON data into a feature-rich table with interactive
  sorting, filtering, and pagination capabilities.


  ## Features


  - Dynamic column sorting

  - Filter rows by column values

  - Pagination support

  - Custom cell rendering

  - Row selection


  ## Installation


  `npm install react-json-table`


