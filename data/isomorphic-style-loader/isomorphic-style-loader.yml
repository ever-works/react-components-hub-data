markdown: >-
  ## Overview


  Isomorphic Style Loader is a Webpack CSS style loader that enables server-side
  rendering of CSS styles in isomorphic applications.


  ## Features


  - Server-side CSS rendering

  - Critical CSS extraction

  - Webpack loader

  - Context-based styling

  - Isomorphic support
