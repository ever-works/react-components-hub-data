markdown: >-
  ## Overview


  Untitled UI React is a comprehensive open-source library containing 1000+
  reusable React components designed for modern application development. Built
  with Tailwind CSS and React Aria, it provides a consistent design system for
  building accessible, production-ready interfaces.


  ## Key Features


  - **Component Variety**: Includes pricing pages, 78+ modal variants, command
  menus, notification systems, and complex data visualizations

  - **Technology Stack**: React Aria for accessibility + Tailwind CSS for
  styling

  - **Development Focus**: Ready-to-use components that work out-of-the-box with
  copy/paste integration

  - **Commercial Use**: Open-source license with optional paid Pro version for
  enhanced components

  - **Extensive Documentation**: Detailed usage guides for all component types


  ## Component Gallery


  ```

  • Pricing Pages

  • Modals (78 variants)

  • Command Menus (69 variants)

  • Notifications (18 variants)

  • Line/Bar Charts (43 variants)

  • Footers (180 variants)

  • Sliders (39 variants)

  • 100+ Additional Patterns

  ```


  ## License


  MIT License (view full terms [here](https://www.untitledui.com/license))


  ## Commercial Options


  Free tier available with optional PRO license for access to premium components
  and advanced customization options.
