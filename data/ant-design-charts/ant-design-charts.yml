name: Ant Design Charts
description: Ant Design Charts is a React charting library built on G2Plot,
  offering a comprehensive suite of statistical and business visualization
  components that seamlessly integrate with the Ant Design ecosystem. It
  provides 20+ chart types including line, bar, pie, area, scatter, radar,
  funnel, gauge, and waterfall charts, all rendered on Canvas for optimal
  performance with large datasets. Key features include intelligent auto-layout
  and responsive design, built-in tooltips and legends, robust theming with Ant
  Design design tokens, and accessibility-focused configurations. Primary use
  cases include business intelligence dashboards, analytics platforms, financial
  reporting tools, and any React application requiring rich data visualization
  within the Ant Design UI system. Compared to Recharts (which uses SVG and has
  simpler APIs) or Apache ECharts (more powerful but steeper learning curve),
  Ant Design Charts offers the best balance of developer experience and visual
  quality for React projects already using Ant Design, though it's less
  customizable than lower-level libraries like D3.js.
