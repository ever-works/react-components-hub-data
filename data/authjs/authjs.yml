name: Auth.js
description: Auth.js (formerly NextAuth.js) is the most popular open-source
  authentication solution for JavaScript applications, providing session
  management and authentication with support for 50+ OAuth providers, email
  magic links, and credential-based login. It offers seamless integration with
  Next.js and other full-stack frameworks. Key features include support for over
  50 OAuth providers (Google, GitHub, Twitter, etc.), email/password and magic
  link authentication, JWT and database-backed session management, built-in CSRF
  protection, customizable authentication callbacks, and TypeScript support.
  Primary use cases include SaaS applications, membership sites, social login
  integration, and any full-stack web app requiring user authentication.
  Compared to proprietary solutions like Auth0 (hosted, usage-based pricing) or
  Clerk (commercial SaaS), Auth.js gives you full control with no vendor
  lock-in, though it requires self-hosting and managing your own authentication
  infrastructure.
source_url: https://authjs.dev/
category: Third Party Integrations
