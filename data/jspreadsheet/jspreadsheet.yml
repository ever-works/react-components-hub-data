markdown: >-
  ## Overview


  Jspreadsheet (formerly jExcel) provides a lightweight and responsive
  spreadsheet component for web applications, offering a free MIT-licensed Lite
  version alongside commercial tiers.


  ## Features


  - Formula support

  - CSV import and export

  - Mobile-friendly responsive design

  - Lightweight footprint

  - Spreadsheet-like editing experience

  - Custom cell rendering


  ## Pricing


  - Lite: Free under MIT license

  - Pro and Enterprise: Commercial licenses available
