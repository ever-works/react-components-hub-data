markdown: >-
  ## Overview


  Font Awesome is one of the most widely used icon libraries on the web. The
  React integration provides official React components for using Font Awesome
  icons in React applications. It is known for its large icon catalog and strong
  brand and social icon coverage.


  ## Features


  - Large catalog of icons including brand and social icons

  - Multiple delivery formats: SVGs and web-font-based assets

  - Highly customizable through CSS for size, color, and basic animations

  - Official React component wrappers for easy integration

  - Supports multiple icon styles

  - Familiar API widely adopted across many projects


  ## Use Cases


  - Legacy systems and enterprise applications

  - Interfaces requiring recognizable brand icons

  - Projects prioritizing speed and broad icon availability

  - Teams already invested in the Font Awesome ecosystem


  ## Pricing


  - **Free tier**: Core icon set available at no cost

  - **Pro tier**: Larger icon set with additional styles and features (paid
  subscription)
