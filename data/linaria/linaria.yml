name: Linaria
description: Zero-runtime CSS-in-JS library for React that compiles styles at
  build time. Combines the developer experience of CSS-in-JS with the
  performance of static CSS, enabling standard CSS syntax in JavaScript with
  full server-side rendering support.
source_url: https://linaria.dev/
category: CSS/Styling
