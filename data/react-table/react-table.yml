markdown: >-
  ## Overview


  React Table is a high-performance React component for rendering and
  manipulating tabular data.


  ## Features

  - Column sorting and filtering

  - Pagination and server-side processing

  - Row selection and cell editing

  - Resizable columns

  - Virtual scrolling


