markdown: >-
  ## Overview


  Park UI is a React component library built on Ark UI and Panda CSS, a
  CSS-in-JS library created by the author of Chakra UI. Released in 2024, it is
  one of the newer component libraries with over 2.2k GitHub stars. Beyond
  React, it supports Vue, Solid.js, and metaframeworks like Next.js and Nuxt.


  ## Key Features


  - **Theme Editor**: Visual editor panel to define custom styles for fonts,
  colors, and border radius, with copyable config code for direct project
  integration

  - **Panda CSS Integration**: Built on Panda CSS, a modern CSS-in-JS solution

  - **Blocks**: Pre-built collection of common UI elements including banners,
  footers, and cards that can be copied and pasted directly into projects

  - **Multi-Framework Support**: Works with React, Vue, Solid.js, Next.js, and
  Nuxt


  ## Benefits


  - **Accessibility**: Follows accessibility standards and guidelines for
  inclusive applications

  - **Cross-Framework Flexibility**: Master one component library and use it
  across multiple frameworks

  - **Rapid Prototyping**: Copy-paste approach with Blocks for quick UI assembly

  - **Modern CSS Foundation**: Leverages Panda CSS for performant styling


  ## Pricing


  Free and open-source.
