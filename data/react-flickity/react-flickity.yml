markdown: >-
  ## Overview


  React Flickity is a React wrapper component for Flickity, originally built by
  Desandro. It provides a polished carousel component with extensive options and
  comprehensive documentation, making it a reliable choice for React developers
  building image galleries and sliders.


  ## Features


  - **Responsive Styling**: Automatically adapts carousel layout to different
  screen sizes

  - **Physics-based Animation**: Smooth, natural-feeling transitions powered by
  physics-based animation engine

  - **Touch Enable**: Native touch support for mobile and tablet devices

  - **Full-feature API**: Access to Flickity's complete API including events,
  methods, and options

  - **Fullscreen Support**: Ability to implement a button that opens the
  slideshow in fullscreen mode

  - **Drag-enabled**: Native drag interaction for desktop and touch navigation


  ## Use Cases


  - Image galleries and lightboxes with fullscreen capabilities

  - Product showcases and portfolio displays

  - Touch-friendly mobile web carousels


  ## Pricing


  Free and open-source.
