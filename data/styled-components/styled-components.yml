markdown: >-
  ## Overview


  Styled Components is a popular CSS-in-JS library for React that allows
  developers to write actual CSS inside JavaScript using tagged template
  literals.


  ## Features


  - Tagged template literal syntax

  - Automatic critical CSS

  - No class name bugs

  - Easy deletion of CSS

  - Simple dynamic styling

  - Automatic vendor prefixing

  - Theming support

  - Server-side rendering

  - Styles are scoped to components
