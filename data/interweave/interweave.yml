markdown: >-
  ## Overview


  A React library focused on safe HTML rendering and text manipulation with
  built-in XSS protection and emoji support.


  ## Features


  - Safe HTML rendering with XSS protection

  - Automatic attribute filtering

  - Text autowrapping with regex matchers

  - Built-in emoji rendering via Emojibase

  - Plugin system for extensibility

  - URL matching and conversion

  - Markup generation utilities


  ## Pricing


  Free and open-source.
