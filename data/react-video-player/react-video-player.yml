markdown: >-
  ## Overview


  React Video Player provides a feature-rich video playback component with
  customizable controls and adaptive streaming capabilities.


  ## Features


  - HTML5 and HLS video support

  - Subtitle track integration

  - Customizable UI components

  - Adaptive bitrate streaming

  - Picture-in-Picture mode


  ## Installation


  `npm install video-react`


