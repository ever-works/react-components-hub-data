markdown: >-
  ## Overview


  PrimeReact is a comprehensive UI component library containing 100+
  production-ready components for building enterprise-grade applications
  interfaces. It provides a unified design language with consistent styling and
  behavior across all components.


  ## Key Features


  - **Enterprise-Ready**: Components designed for complex business applications
  requirements

  - **PrimeFaces Integration**: Shares the same rich components ecosystem with
  PrimeFaces

  - **Themeability**: Built-in support for 20+ themes including Material,
  Bootstrap, and more

  - **Server-Side Rendering**: Optimized for React server components and Next.js


  ## Notable Components


  - Data Grid (with filtering, sorting, pagination)

  - Advanced Calendar

  - Drag-and-Drop components

  - File upload

  - Gantt chart


  ## Performance


  - Tree-shakable components for optimized builds

  - Lazy loading patterns

  - Virtualization for large datasets


