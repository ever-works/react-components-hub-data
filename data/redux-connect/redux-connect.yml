markdown: >-
  ## Overview


  Redux Connect provides decorators for resolving async props in React Router
  applications. It enables server-side rendering with data pre-fetching through
  Redux.


  ## Features


  - Async props resolution

  - Server-side rendering support

  - Redux integration

  - Route-based data fetching

  - Decorator pattern API

  - Loading state management
