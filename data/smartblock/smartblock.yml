markdown: >-
  ## Overview


  A block-based WYSIWYG editor inspired by modern content editors, built on top
  of ProseMirror for React applications.


  ## Features


  - Block-based content editing

  - Built on ProseMirror for reliability

  - Modern and intuitive UI

  - Demo and documentation available

  - Customizable block types

  - Responsive editor design


  ## Pricing


  Free and open-source under the MIT license.
