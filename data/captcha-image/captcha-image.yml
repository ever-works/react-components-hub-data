name: Captcha Image
description: >-
  Captcha Image is a lightweight JavaScript library that generates random
  CAPTCHA images for human verification in web forms. It renders CAPTCHA text as
  distorted images with configurable noise, colors, and character settings to
  prevent automated bot submissions without requiring external services.


  **Key Features:**

  - Random CAPTCHA image generation using Canvas API

  - Configurable character sets, length, and font styles

  - Adjustable noise, distortion, and background colors

  - Zero external dependencies and server calls

  - Simple API with validation callback

  - Framework-agnostic usage with React integration examples


  **Primary Use Cases:** Registration forms, contact forms, login pages, and
  comment systems that need lightweight bot protection without relying on
  third-party services like reCAPTCHA.


  **Compared to Alternatives:** Unlike Google reCAPTCHA (which requires API keys
  and tracks users), this library is fully self-contained and privacy-friendly.
  However, it lacks the advanced ML-based security of modern CAPTCHA services.
