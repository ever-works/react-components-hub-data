name: AutoAnimate
description: AutoAnimate is a zero-configuration animation library created by
  FormKit that automatically detects DOM additions, removals, and state changes
  to add smooth layout transitions with a single function call. It weighs only
  1.5 KB gzipped and works by wrapping any parent element to animate its
  children's positional changes. Key features include zero-configuration setup
  (just add useAutoAnimate to any parent element), support for React hooks,
  automatic handling of conditional rendering and list reordering, and
  customizable durations and easing functions. Primary use cases include
  animating list additions/removals, accordion open/close transitions, tab panel
  switching, and conditional UI element reveals. Compared to Framer Motion
  (which requires explicit animate prop declarations) or CSS transitions (which
  can't animate DOM additions/removals), AutoAnimate provides the simplest path
  to adding motion to React applications with virtually no code changes.
source_url: https://auto-animate.formkit.com/
