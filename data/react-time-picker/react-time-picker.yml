markdown: >-
  ## Overview


  React Time Picker is a flexible time selection component for React
  applications. It supports multiple time formats and provides keyboard
  accessibility.


  ## Features


  - 12/24-hour format switching

  - Keyboard navigation and shortcuts

  - Custom time step increments

  - AM/PM toggle

  - Locale-aware time display


  ## Installation


  `npm install react-time-picker`


