name: React Time Picker
description: React Time Picker is an accessible, customizable time selection
  component for React applications that provides intuitive time input through
  visual clock face, scrollable pickers, or direct text entry with support for
  both 12-hour and 24-hour formats. It integrates seamlessly with React forms
  and supports keyboard navigation for accessibility compliance. Key features
  include 12/24-hour format switching with locale-aware AM/PM indicators,
  keyboard navigation with arrow keys for adjusting hours and minutes,
  customizable time step intervals (5, 10, 15, 30-minute increments), disabled
  time ranges for restricting unavailable time slots, clear reset button for
  removing the selected value, and full ARIA accessibility attributes for screen
  reader compatibility. Primary use cases include appointment scheduling
  interfaces, event creation forms, restaurant reservation systems, meeting
  booking tools, and any application requiring users to specify a time of day.
  Compared to native HTML time inputs (which have inconsistent cross-browser
  rendering and limited features), this component provides a uniform, polished
  experience across all browsers with richer customization options and better
  mobile support.
