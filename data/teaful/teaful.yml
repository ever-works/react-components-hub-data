markdown: >-
  ## Overview


  Teaful is a tiny and easy React state management library that uses React hooks
  for state management with minimal boilerplate.


  ## Features


  - Tiny bundle size

  - Hook-based API

  - Minimal boilerplate

  - Built-in persistence

  - Type-safe with TypeScript

  - Simple store creation

  - Supports async state updates

  - DevTools support
