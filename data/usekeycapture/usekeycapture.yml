markdown: >-
  ## Overview


  useKeyCapture is a React custom hook that simplifies keyboard event listening
  for both specific target elements and global scope.


  ## Features


  - Custom hook for keyboard events

  - Target or global event capturing

  - Clean lifecycle management

  - TypeScript support

  - Functional component compatibility
