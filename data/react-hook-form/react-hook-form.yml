markdown: >-
  ## Overview


  React Hook Form is a performant, flexible and extensible form library with
  easy-to-use validation.


  ## Key Features


  - Uncontrolled components

  - Minimal re-renders

  - Small bundle size

  - TypeScript support

  - Easy field registration

  - Built-in validation

  - Custom validation support

  - Error handling

  - Form state management

  - Works with UI libraries


  ## Main Concepts


  - Hook API: useForm, useFieldArray, useWatch

  - Validation: Built-in rules or schema-based (Yup, Zod)

  - Controlled/Uncontrolled: Both modes supported

  - Integration: Works with any UI component library


  ## Pricing


  Free and open-source under the MIT license.
