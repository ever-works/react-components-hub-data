markdown: >-
  ## Overview


  React Router Component provides a declarative, JSX-based approach to defining
  routes and navigation in React applications.


  ## Features


  - Declarative route definition in JSX

  - Dynamic route matching

  - Query parameter parsing

  - Nested routing

  - URL state management
