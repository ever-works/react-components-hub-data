name: OnboardJS
description: Open-source headless onboarding engine for React. Provides hooks
  and context provider to seamlessly connect the onboarding engine to React
  components without UI constraints.
source_url: https://www.npmjs.com/package/@onboardjs/react
category: Interaction
tags:
  - onboarding
  - headless
  - tours
markdown: >-
  ## Overview


  OnboardJS is an open-source, headless onboarding engine designed to simplify
  user onboarding creation. The @onboardjs/react package provides React-specific
  hooks and providers for seamless integration.


  ## Features


  - Headless architecture

  - React hooks integration

  - Context provider

  - Complete UI control

  - Step-based tours

  - Conditional logic

  - State management

  - Event system

  - Progress tracking

  - Multi-flow support

  - TypeScript support

  - No styling opinions

  - Customizable behavior

  - Analytics hooks

  - Persistent state


  ## React Integration


  - useOnboard hook

  - OnboardProvider context

  - Step management

  - Flow control

  - Custom rendering


  ## Use Cases


  - Complex onboarding flows

  - Custom-designed tours

  - Multi-step processes

  - Feature discovery

  - Progressive disclosure

  - User education


  ## Pricing


  Free and open-source under the MIT license.
