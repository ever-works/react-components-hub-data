markdown: >-
  ## Overview


  FsLightbox React is a simple yet powerful lightbox component that displays
  images, videos (YouTube, Vimeo), and custom HTML content. It provides an
  elegant user experience with smooth animations and intuitive controls.


  ## Features


  - Image galleries with thumbnails

  - Video support (YouTube, Vimeo, HTML5 video)

  - Custom HTML slides

  - Touch and swipe gestures

  - Keyboard navigation

  - Responsive design

  - Fullscreen mode

  - Zoom functionality

  - Toolbar customization

  - Slide counter

  - Download button

  - Auto-play slideshow

  - Lazy loading

  - Caption support

  - Multiple galleries on one page

  - Exit on slide click

  - Customizable animations


  ## Media Support


  - JPEG, PNG, GIF, WebP images

  - YouTube videos

  - Vimeo videos

  - HTML5 video (MP4, WebM, OGG)

  - Custom HTML content

  - Inline elements


  ## Customization


  - Custom toolbar buttons

  - Adjustable animation speed

  - Custom colors and styling

  - Configurable controls

  - Custom slide sources


  ## Use Cases


  - Photography portfolios

  - Product galleries

  - Video presentations

  - Mixed media galleries

  - Documentation with images


  ## Pricing


  Basic version available under MIT license. Pro version with advanced features
  available for purchase.
