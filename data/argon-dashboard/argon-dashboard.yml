markdown: >-
  ## Overview


  Argon Dashboard is an elegant and lightweight Next.js dashboard with built-in
  modern UI elements for seamless analytics. Developed by Creative Tim, it
  offers a polished interface for data-driven applications.


  ## Features


  - Elegant and lightweight Next.js dashboard

  - Built-in modern UI elements for seamless analytics

  - Chart.js for data visualization

  - Bootstrap 4 styling framework

  - Tech stack: Next.js 10, Bootstrap 4, Chart.js


  ## GitHub


  - 132+ GitHub stars

  - Repository: https://github.com/creativetimofficial/nextjs-argon-dashboard


  ## Pricing


  Free and open-source.
