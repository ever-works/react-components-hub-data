name: Argon Dashboard
description: Argon Dashboard is a free, open-source Next.js admin dashboard
  template built with Bootstrap components and Chart.js for data visualization.
  It provides a clean, modern UI with pre-built admin pages, charts, and user
  management screens designed for rapid development of analytics-oriented
  applications. Key features include responsive Bootstrap 4/5 layouts, multiple
  chart types with Chart.js, user authentication pages, profile and settings
  screens, and a cohesive design language inspired by Google's Material Design.
  Primary use cases include admin panels, analytics dashboards, CRM systems, and
  data-driven web applications requiring a polished, out-of-the-box admin
  interface. Compared to premium alternatives like Creative Tim's Argon Pro or
  other commercial dashboards, the free version offers a solid starting point
  with fewer pages and components, while compared to custom-built admin panels,
  it significantly reduces development time for standard admin use cases.
