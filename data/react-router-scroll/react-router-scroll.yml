markdown: >-
  ## Overview


  React Router Scroll provides scroll management for React Router applications,
  automatically handling scroll position during navigation and history
  transitions.


  ## Features


  - Automatic scroll restoration

  - History-based scroll position tracking

  - Integration with React Router

  - Scroll to top on navigation

  - Custom scroll behavior support

  - Works with browser back/forward buttons
