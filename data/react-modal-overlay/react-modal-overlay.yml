markdown: >-
  ## Overview


  React Modal Overlay provides a flexible modal dialog component for React apps.
  It supports custom content, accessibility features, and keyboard traps.


  ## Features


  - Fully customizable modal body and footer

  - Accessibility compliant (ARIA roles)

  - Keyboard navigation and escape key dismissal

  - Animated transitions and backdrop

  - Supports large content loading


  ## Installation


  `npm install react-modal-overlay`


