markdown: >-
  ## Overview


  ZingChart is a declarative JavaScript charting library designed for building
  responsive, interactive charts. It supports the widest range of chart types
  and features in the category, with a JSON-based configuration system that
  makes it easy to define complex visualizations.


  ## Features


  - 35+ chart types: line, area, bar, pie, scatter, bubble, heat map, tree map,
  radar, and more

  - JSON-based declarative configuration

  - Responsive design with automatic resizing

  - Interactive features: tooltips, zoom, pan, selection

  - Built-in chart export (PNG, JPEG, CSV, PDF)

  - Real-time data update support

  - Annotations and callouts

  - Custom themes and styling

  - Works with React, Angular, Vue, and vanilla JS/TS

  - TypeScript definitions included


  ## Pricing


  Free tier for non-commercial and educational use. Commercial licenses
  available for business applications.
