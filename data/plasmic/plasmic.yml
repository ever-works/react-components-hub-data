markdown: >-
  ## Overview


  Plasmic is a powerful visual design tool for building React components without
  writing CSS. It enables designers and developers to collaborate on building UI
  components.


  ## Features


  - Visual component builder

  - React code generation

  - Design system support

  - Developer handoff

  - Custom code integration

  - Responsive design tools
