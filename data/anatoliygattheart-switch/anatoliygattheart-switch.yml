name: "@anatoliygatt/heart-switch"
description: "@anatoliygatt/heart-switch is a lightweight React toggle switch
  component with an animated heart-shaped design for a unique, visually
  appealing UI element. Built with full accessibility support including ARIA
  attributes and keyboard navigation, it works seamlessly in any React
  application. Key features include a smooth sliding animation, customizable
  colors via props, TypeScript support, and a minimal footprint with zero
  runtime dependencies. Primary use cases include adding playful, themed toggles
  to settings pages, profile editors, and preference panels. Compared to
  standard toggle switches, this offers a distinctive heart-themed design that
  stands out, while maintaining the same accessibility standards expected from
  production-ready components."
source_url: https://github.com/anatoliygatt/heart-switch
