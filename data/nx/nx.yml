  ## Overview


  Nx is a next generation build system with first class monorepo support and
  powerful integrations for React applications.


  ## Features


  - Monorepo management

  - Code generators

  - Task orchestration

  - Affected build computation

  - Plugin ecosystem

  - TypeScript support

  - Linting and testing integration
