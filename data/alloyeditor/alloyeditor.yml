name: AlloyEditor
description: AlloyEditor is a modern, free WYSIWYG editor built on top of the
  CKEditor engine with a completely redesigned UI focused on inline editing
  simplicity. Originally developed by Liferay, it provides a clean,
  distraction-free editing toolbar that appears contextually near the user's
  cursor position, making content creation feel natural and intuitive. Key
  features include image upload and management, link editing, undo/redo support,
  full-screen editing mode, and a plugin system for extensibility. Primary use
  cases include content management systems, blog platforms, and document editing
  interfaces where a lightweight yet powerful editor is needed. Compared to
  CKEditor 5's standard UI (which is toolbar-heavy), AlloyEditor's inline
  approach is cleaner for content-focused applications, though the project has
  been deprecated and users should consider CKEditor 5 or Tiptap for new
  projects.
source_url: https://github.com/liferay/alloy-editor
