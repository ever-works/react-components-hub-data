markdown: >-
  ## Overview


  React Color Picker provides an intuitive interface for selecting colors in
  React applications. It supports HEX, RGB, and HSL color formats with real-time
  preview.


  ## Features


  - Multiple color representation modes

  - Eye-dropper tool for screen color selection

  - Slider and input field controls

  - Customizable swatch previews

  - Accessibility attributes


  ## Installation


  `npm install react-color`


