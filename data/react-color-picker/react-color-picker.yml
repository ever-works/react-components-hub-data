name: React Color Picker
description: React Color Picker is a lightweight, customizable color selection
  component for React that supports multiple color formats including HEX, RGB,
  and HSL with real-time visual preview and intuitive slider controls. It
  provides an accessible interface for users to choose colors through visual
  swatches, eyedropper integration, and direct input fields. Key features
  include multi-format color input with real-time conversion between
  HEX/RGB/HSL, built-in eye-dropper tool for selecting colors from anywhere on
  screen, customizable swatch presets for quick selection of common colors,
  slider and numeric input controls for precise color adjustment, and full
  keyboard accessibility with ARIA labels for screen readers. Primary use cases
  include theme configuration panels, brand color customization tools, design
  system color pickers, user preference settings, and any application requiring
  color selection. Compared to react-color (which bundles multiple picker styles
  but has heavier dependencies), this component provides a focused, lightweight
  solution with fewer external dependencies while maintaining core
  functionality.
