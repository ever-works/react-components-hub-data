markdown: >-
  ## Overview


  Headless UI provides fully accessible UI components for React without relying
  on the DOM.


  ## Features

  - 40+ headless components

  - Built-in accessibility

  - No CSS required

  - Fully typed

  - Works with any CSS framework


  ## Pricing

  Free and open source under MIT license.
