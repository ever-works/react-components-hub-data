markdown: "## Overview


  Headless UI provides fully accessible UI components designed without default
  styles, giving developers complete control over appearance while ensuring
  WCAG-compliant accessibility.


  ## Features

  - 45+ headless components (Dialog, Popover, Menu, Listbox, Radio Group,
  Switch, Tabs, Disclosure, Combobox, Transitions)

  - Built-in accessibility with WAI-ARIA compliance

  - No CSS required â fully unstyled out of the box

  - Fully typed with TypeScript definitions

  - Works with any CSS framework including Tailwind CSS

  - Automatic focus management and keyboard navigation

  - Official React and Vue implementations


  ## Pricing

  Free and open source under MIT license."
