markdown: >-
  ## Overview


  Reactable provides an editable data grid for complex data manipulation in
  React applications.


  ## Features

  - In-place cell editing

  - Column sorting and filtering

  - Built-in pagination

  - Keyboard navigation

  - Custom cell renderers


  ## Pricing

  Free and open source under MIT license.
