markdown: >-
  ## Overview


  Plotly.js is a high-level, declarative charting library built on top of d3.js
  and stack.gl. It ships with over 40 chart types, including 3D charts,
  statistical graphs, and SVG maps. The library provides a declarative API for
  creating interactive data visualizations across React, Angular, and Vue.


  ## Features


  - 40+ chart types including 3D charts, statistical graphs, and maps

  - Declarative API based on plotly.js

  - Interactive features: tooltips, zoom, pan, select, and click events

  - Scientific and statistical chart types: histograms, box plots, violin plots

  - 3D surface plots, scatter plots, and meshes

  - SVG map rendering with geographic data

  - Export charts as PNG, SVG, and PDF

  - Works with React, Angular, Vue, and vanilla JS

  - TypeScript definitions included


  ## Pricing


  Open-source core available under the MIT license. Enterprise features require
  a commercial license.
