markdown: >-
  ## Overview


  React Accordion is a flexible and accessible accordion component for React
  applications. It supports animated panel transitions and keyboard
  interactions.


  ## Features


  - Single/multi panel configurations

  - Animated expand/collapse transitions

  - Keyboard navigation (arrow keys, enter)

  - Custom header and content rendering

  - Accessible via ARIA attributes


  ## Installation


  `npm install react-accordion`


