markdown: >-
  ## Overview


  React Swipe wraps the popular Swipe.js library as a React component, providing
  touch-friendly swipe navigation for content carousels and sliders.


  ## Features


  - Touch swipe gestures

  - Carousel-like interface

  - Configurable auto-play

  - Smooth slide transitions

  - Responsive width support
