markdown: >-
  ## Overview


  Splide is a modern, lightweight slider and carousel library built with
  TypeScript. It's designed to be flexible, accessible, and easy to integrate
  into any web project with zero dependencies.


  ## Features


  - **Zero Dependencies**: No jQuery or external libraries required

  - **Lightweight**: Small bundle size for optimal performance

  - **TypeScript**: Written in TypeScript with full type definitions

  - **Accessibility**: WCAG compliant with keyboard navigation and screen reader
  support

  - **Responsive**: Works seamlessly across all devices

  - **Touch Support**: Native swipe gestures on mobile devices

  - **Flexible Layout**: Grid mode, vertical slides, and custom configurations

  - **Extensions**: Video, AutoScroll, and URL Hash extensions available

  - **RTL Support**: Right-to-left language support

  - **Lazy Loading**: Built-in lazy loading for images


  ## Slider Types


  - Standard horizontal slider

  - Vertical slider

  - Grid/Tile layout

  - Fade transition

  - Thumbnail navigation

  - Multiple slides per view


  ## Extensions


  - Video integration

  - Auto-scroll functionality

  - URL hash synchronization

  - Intersection observer


  ## Performance


  Splide is optimized for performance with hardware acceleration, smooth
  animations, and minimal DOM manipulation. No Lighthouse errors reported.


  ## Browser Support


  Supports all modern browsers including Chrome, Firefox, Safari, Edge, and
  mobile browsers with IE11 support available.


  ## Pricing


  Free and open-source under the MIT license.
