markdown: >-
  ## Overview


  React Form Validator provides real-time validation capabilities for React
  forms with support for custom validation rules and user-friendly error
  messages.


  ## Features


  - Schema-based validation configuration

  - Async validation for server-side checks

  - Custom validation rule definitions

  - Field-level error highlighting

  - Integration with popular form libraries


  ## Installation


  `npm install react-form-validator`


