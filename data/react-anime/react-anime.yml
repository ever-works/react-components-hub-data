markdown: >-
  ## Overview


  React Anime provides a straightforward animation API for React developers.
  Designed for ease of use, it enables quick implementation of common animation
  patterns with minimal boilerplate.


  ## Features


  - Simple, declarative animation API

  - Quick setup with minimal configuration

  - Supports common animation patterns

  - Staggered animations for lists

  - Lightweight implementation
