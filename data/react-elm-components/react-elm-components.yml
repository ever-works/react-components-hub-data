markdown: >-
  ## Overview


  React Elm Components enables embedding Elm programs as React components,
  providing a bridge between React's component model and Elm's pure functional
  architecture through the Elm Architecture pattern.


  ## Features


  - Embeds Elm programs as React components

  - Automatic port communication

  - Clean API for Elm-React communication

  - Simple render props

  - Supports Elm Architecture pattern


  ## Pricing


  Free and open-source under the MIT license.
