  - notification
  - counter
markdown: >-
  ## Overview


  react-notification-badge is a lightweight React component for displaying
  notification badges with counts. It includes preset animations and is highly
  customizable for various notification needs.


  ## Features


  - Customizable badge effects and animations

  - Multiple animation presets

  - Custom colors and styling

  - Count display with formatting

  - Lightweight (7.1kb minified)

  - Works with any React component

  - Easy integration

  - Responsive design

  - TypeScript definitions available

  - Frame animation support

  - Duration control

  - Custom rendering


  ## Animation Effects


  - Scale animation

  - Pulse effect

  - Bounce animation

  - And more preset effects


  ## Use Cases


  - Notification counters

  - Unread message indicators

  - Cart item counts

  - Alert badges

  - Status indicators

  - Activity counters


  ## Installation


  ```bash

  npm i react-notification-badge

  ```


  ## Pricing


  Free and open-source under the MIT license.
