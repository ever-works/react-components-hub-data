markdown: >-
  ## Overview


  Aceternity UI offers a large collection of free, copy-paste animated
  components, blocks, and templates for building modern web interfaces. It's
  designed as a copy-paste solution where components become your code after
  integration.


  ## Features


  - **1000+ Components**: Extensive library of animated components and effects

  - **Copy & Paste**: Easy integration into your projects

  - **Motion Powered**: Powered by Motion (formerly Framer Motion) animations

  - **Tailwind CSS**: Built with Tailwind for easy styling

  - **Next.js Ready**: Optimized for Next.js applications

  - **TypeScript**: Full TypeScript support

  - **Customizable**: Fully customizable after copying

  - **Regular Updates**: Continuously updated with new components


  ## Component Types


  ### Animated Elements

  - Animated cards with hover effects

  - Hero sections with motion

  - Dynamic backgrounds with gradients

  - Direction-aware hover effects

  - Lamp effects (as seen on Linear)

  - Particle effects

  - 3D card effects

  - Morphing shapes


  ### UI Components

  - Modals and dialogs

  - Navigation menus

  - Buttons and links

  - Forms and inputs

  - Tabs and accordions

  - Tooltips and popovers

  - Testimonials

  - Pricing tables


  ### Layout Components

  - Grid layouts

  - Bento grids

  - Masonry layouts

  - Timeline components

  - Feature sections


  ## Pricing


  All components, blocks, and templates are available for free.
