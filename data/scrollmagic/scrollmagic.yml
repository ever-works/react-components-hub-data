markdown: >-
  ## Overview


  ScrollMagic is a JavaScript library that turns scroll position into an
  animation driver. It uses a scene-based architecture where scenes define what
  should happen at certain scroll positions, including pinning elements and
  triggering animations.


  ## Features


  - Scene-based architecture for defining scroll-driven behaviors

  - Element pinning for sticky effects during scroll

  - Support for offset and duration controls

  - Integration with tweening libraries like GSAP and Velocity.js

  - Reverse animation on scroll up

  - Multiple scroll containers support

  - Container element option for horizontal scrolling

  - Debugging indicators for development

  - Responsive breakpoints per scene

  - Indicators for scene position visualization


  ## Best Use Case


  Creating complex scroll-driven interactions, parallax effects, and
  scroll-triggered animations for storytelling or product pages.


  ## Pricing


  Free and open-source under the MIT license.
