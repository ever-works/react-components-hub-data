markdown: >-
  ## Overview


  A wrapper that integrates Formsy's form validation capabilities with Material
  UI's form components.


  ## Features


  - Bridges Formsy validation with Material UI components

  - Supports all Material UI form components

  - Unified validation state management

  - Material Design compliant error display

  - Simplifies form validation in Material UI applications


  ## Pricing


  Free and open-source.
