name: React Vis
description: React Vis is a set of reusable visualization components for React,
  built on top of D3.js with a declarative API. It supports a wide range of
  chart types and provides highly customizable data visualizations for React
  applications.
source_url: https://github.com/uber/react-vis
category: Data Visualization
tags:
