name: React DnD
description: React DnD is a flexible drag-and-drop library for React that
  enables developers to add interactive drag-and-drop functionality to
  components with minimal configuration. It supports touch devices and works
  well with virtualized lists.
source_url: https://react-dnd.github.io/react-dnd
category: UI Components
tags:
  - drag-and-drop
  - interaction
featured: false
markdown: >-
  ## Overview


  React DnD provides a declarative API for implementing drag-and-drop
  interactions in React applications.


  ## Key Features


  - **Backends**: Supports HTML5, Touch, and HTML5 to avoid conflicts.

  - **Flexible API**: Customizable drag/drop behavior with hooks and event
  handlers.

  - **High Performance**: Optimized for performance with virtualized components.

  - **Community-Driven**: Actively maintained with community-contributed drag
  layer implementations.


  ## Pricing


  Free and open-source under the MIT license.
