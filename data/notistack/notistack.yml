markdown: >-
  ## Overview


  Notistack makes it super easy to display notifications (snackbars/toasts) on
  your React web apps. It is highly customizable and allows you to stack
  snackbars/toasts on top of one another, providing a better UX for multiple
  simultaneous notifications.


  ## Features


  - Stack snackbars on top of each other

  - Customizable notification types (success, error, warning, info)

  - Queue management for notifications

  - Auto-dismiss with configurable duration

  - Persistent notifications

  - Action buttons in notifications

  - Custom content and styling

  - Anchor positioning (top/bottom, left/center/right)

  - Slide and fade animations

  - Imperative API (enqueueSnackbar)

  - Hook-based usage (useSnackbar)

  - TypeScript support

  - Material-UI integration

  - Maximum snackbar limit

  - Dense mode for compact notifications


  ## Variants


  - default: Standard notification

  - success: Success messages

  - error: Error alerts

  - warning: Warning messages

  - info: Informational notices


  ## Actions


  - Dismiss button

  - Custom action buttons

  - Undo functionality

  - Retry actions


  ## Use Cases


  - Success confirmations

  - Error notifications

  - Warning alerts

  - Info messages

  - Multi-step process feedback


  ## Pricing


  Free and open-source under the MIT license.
