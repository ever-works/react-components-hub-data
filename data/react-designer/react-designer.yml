markdown: >-
  ## Overview


  A tool for creating and manipulating vector graphics directly inside React
  components with an intuitive interface.


  ## Features


  - Easy configuration and setup

  - Lightweight vector graphics editor

  - Editable SVG shapes within React

  - Customizable canvas and tools

  - Integration with React component lifecycle

  - Shape creation and manipulation


  ## Pricing


  Free and open-source.
