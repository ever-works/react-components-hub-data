markdown: >-
  ## Overview


  shadcn/ui is not a traditional component library but rather a collection of
  re-usable components that you can copy and paste into your apps. Built on top
  of Radix UI and Tailwind CSS, it gives you the freedom to own the components
  and customize them exactly as you need.


  ## Key Features


  - Copy-paste component system

  - Built on Radix UI primitives

  - Tailwind CSS for styling

  - Full ownership of component code

  - TypeScript support

  - Dark mode support

  - Accessible components

  - Highly customizable


  ## Component Categories


  - UI: Button, Badge, Input, Label, Textarea

  - Navigation: Breadcrumb, Dropdown Menu, Pagination, Tabs

  - Overlays: Dialog, Popover, Sheet, Tooltip

  - Forms: Checkbox, Radio, Select, Switch

  - Data: Table, Card, Skeleton


  ## Pricing


  Free and open-source under the MIT license.
