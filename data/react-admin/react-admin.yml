markdown: >-
  ## Overview


  React-Admin allows developers to build admin dashboards for data models in an
  efficient manner, leveraging React's component-based architecture.


  ## Key Features


  - **Resource-Based Architecture**: Define resources and map them to your API
  endpoints.

  - **Built-in List, Edit, and Create Views**: Out-of-the-box UI for basic CRUD
  operations.

  - **Customizable**: Extend functionality with custom components and hooks.

  - **Authentication Support**: Seamless integration with OAuth, JWT, and other
  auth providers.

  - **Filtering & Pagination**: Advanced data filtering and pagination for large
  datasets.


  ## Pricing


  Free and open-source under the MIT license.
