markdown: >-
  ## Overview


  Bootstrap Basix Admin is a lightweight, minimalist React template with a focus
  on simplicity and efficiency. It includes essential features such as charts,
  tables, and forms, making it suitable for straightforward projects and
  beginner-friendly implementations.


  ## Features


  - Lightweight and minimalist design

  - Pre-built charts

  - Data tables

  - Form components

  - Beginner-friendly implementation


  ## Pricing


  Free and open-source.
