markdown: >-
  ## Overview


  Formsy React is a form input builder and validator for React applications. It
  provides a flexible API for composing form components with built-in
  validation.


  ## Features


  - Form input composition

  - Built-in and custom validators

  - Form state management

  - Dynamic form fields

  - Nested form support

  - Error messages

  - Custom input components

  - Validation rules
