  - d3
  - visualization
markdown: >-
  ## Overview


  recharts-scale is a scale calculation library that provides various scale
  types for mapping data values to visual coordinates. It's the core scaling
  library used by Recharts but can be used independently.


  ## Features


  - **Multiple Scale Types**: Linear, log, pow, sqrt, time, band

  - **Domain/Range**: Flexible domain and range configuration

  - **Ticks Generation**: Automatic tick calculation

  - **Nice Numbers**: Round to human-friendly values

  - **D3-Compatible**: Similar API to D3 scales

  - **TypeScript**: Full type support

  - **Standalone**: Use outside of Recharts


  ## Use Cases


  - Chart axis scaling

  - Data visualization

  - Custom chart components

  - Graph layouts

  - Data transformations


  ## Pricing


  Free and open source (MIT License)
