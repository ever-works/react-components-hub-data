name: recharts-scale
description: Scale calculation library used by Recharts for axis scaling and
  data transformations. Provides linear, logarithmic, power, and other scale
  types for mapping data values to visual coordinates. Essential for data
  visualization and charting.
source_url: https://github.com/recharts/recharts-scale
category: Data Visualization
tags:
