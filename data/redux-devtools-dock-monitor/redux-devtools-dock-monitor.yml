markdown: >-
  ## Overview


  A resizable and movable dock component for Redux DevTools monitors, allowing
  developers to customize the position and visibility of the debugging
  interface.


  ## Features


  - Resizable dock window

  - Draggable and movable

  - Keyboard shortcuts to show/hide

  - Configurable position

  - Works with all Redux DevTools monitors


  ## Pricing


  Free and open-source under the MIT license.
