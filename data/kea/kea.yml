markdown: >-
  ## Overview


  Kea is a high-level architecture library for React apps that builds on Redux
  to provide a cleaner, more structured approach to managing application logic
  and state.


  ## Features


  - Declarative logic definition

  - Built on Redux

  - Reusable logic modules (scenes)

  - Automatic action generation

  - Async flow management

  - Built-in selectors

  - TypeScript support

  - Hot reloading support

  - Plugin architecture
