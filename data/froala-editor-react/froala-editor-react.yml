markdown: >-
  ## Overview


  Froala Editor is a beautiful WYSIWYG HTML editor that works on mobile, web,
  and desktop. The React integration provides a seamless editing experience with
  modern features and excellent performance.


  ## Features


  - Inline editing

  - Distraction-free mode

  - Clean, intuitive UI

  - Mobile-optimized

  - Touch-friendly

  - Autosave

  - Undo/redo with levels

  - Spell checker

  - Word paste cleanup

  - Full screen mode

  - Source code editing

  - Character counter

  - Word counter

  - Markdown support

  - Multiple instances

  - Responsive toolbar

  - Accessibility features


  ## Media Management


  - Drag and drop images

  - Image upload

  - Image resize

  - Image alignment

  - Image styles

  - Image link

  - Video embed (YouTube, Vimeo)

  - Video upload

  - File upload

  - File manager


  ## Formatting Features


  - Paragraph formatting

  - Headers (H1-H6)

  - Bold, italic, underline

  - Text colors

  - Background colors

  - Font family

  - Font size

  - Lists (ordered, unordered)

  - Quotes

  - Code blocks

  - Horizontal rules

  - Alignment

  - Indentation


  ## Advanced Features


  - Tables with advanced editing

  - Link management

  - Special characters

  - Emoticons

  - Insert HTML

  - Save to disk

  - Print

  - Help dialog

  - Placeholder text

  - Custom buttons

  - Custom dropdowns

  - Custom popups


  ## Integration


  - React Hooks support

  - Event system

  - API methods

  - Custom plugins

  - Third-party integrations

  - Cloud image manager

  - AWS S3 upload

  - Azure upload


  ## Plugins (50+)


  - Align

  - Char Counter

  - Code Beautifier

  - Code View

  - Colors

  - Draggable

  - Embedly

  - Emoticons

  - Entities

  - File

  - Font Awesome

  - Font Family

  - Font Size

  - Forms

  - Fullscreen

  - Help

  - Image

  - Image Manager

  - Inline Style

  - And many more...


  ## Use Cases


  - Content management systems

  - Blog platforms

  - Email editors

  - Documentation systems

  - Online editors

  - Note-taking applications


  ## Pricing


  Commercial license required. Basic license starts at $299 for single website.
  OEM and enterprise licenses available.
