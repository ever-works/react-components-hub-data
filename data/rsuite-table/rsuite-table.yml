markdown: >-
  ## Overview


  RSuite Table is a powerful and flexible table component designed for building
  sophisticated data grids in React applications. It is part of RSuiteJS and
  supports virtualization, fixed columns and headers, tree views, and more. The
  library comes with extensive examples for each feature.


  ## Features


  - **Virtualization**: Efficient rendering of large datasets by only rendering
  visible rows

  - **Fixed columns and headers**: Keep important data visible while scrolling
  through large tables

  - **Tree views**: Support for hierarchical data display

  - **Column sorting**: Sort data by single or multiple columns

  - **Resizable columns**: Adjust column widths to fit content or preferences

  - **Column grouping**: Organize columns into logical groups

  - **Row selection**: Select individual or multiple rows

  - **Expandable rows**: Show additional detail in expandable row sections

  - **Cell editing**: Inline data editing capabilities

  - **Responsive design**: Adapts to different screen sizes


  ## Performance


  RSuiteJS is optimized for handling large datasets efficiently, ensuring smooth
  performance even with substantial amounts of data. This makes it an excellent
  choice for applications dealing with complex data management tasks.


  ## Pricing


  Free and open-source under the MIT license.
