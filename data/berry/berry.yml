name: Berry
description: Berry is a feature-rich React admin dashboard template built on
  Material UI (MUI) that follows Google's Material Design guidelines, providing
  comprehensive pre-built pages for analytics dashboards, CRM systems, and SaaS
  products. It includes multiple chart libraries with visualizations, data
  tables, forms, calendars, profile pages, and authentication screens. Key
  features include Material Design-compliant components, multiple dashboard
  variants with charts and KPIs, extensive user management pages, built-in
  calendar and email UIs, form validation, and Figma design files (premium).
  Primary use cases include admin backends, analytics dashboards, CRM systems,
  and enterprise applications needing a Material Design-based starting point.
  Compared to alternatives like CoreUI or Argon Dashboard (which use Bootstrap),
  Berry leverages MUI for a more polished but opinionated look, though its
  strict adherence to Material Design may feel dated compared to modern flat
  design trends seen in Tailwind-based templates like shadcn/ui.
source_url: https://berrydashboard.com/
