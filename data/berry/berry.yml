markdown: >-
  ## Overview


  Berry is a feature-rich React admin template built on Material UI. It heavily
  follows Google's Material Design guidelines, making it feel very familiar but
  also visually dated. It is packed with a large number of pre-built components
  and user pages for complex web applications.


  ## Tech Stack


  - Material UI

  - React


  ## Features


  - Comprehensive set of Material UI components

  - Figma UI kit and design file available for paid users only

  - Includes multiple chart libraries, tables, forms, and a calendar

  - Many different user pages for building comprehensive dashboards


  ## Pros


  - Comprehensive feature set suitable for complex, data-heavy backends such as
  analytics dashboards

  - Includes many different user pages for building comprehensive dashboards


  ## Cons


  - Strict adherence to Material Design results in a look not aligned with
  modern design standards

  - Figma UI kit and design files are available only with the paid version

  - Can be overly complex for smaller projects
