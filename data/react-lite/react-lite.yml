markdown: >-
  ## Overview


  React Lite is an implementation of React that optimizes for small script size,
  providing a lightweight alternative for applications with strict bundle size
  constraints.


  ## Features


  - Small bundle size

  - React-compatible API

  - Optimized for production

  - Component lifecycle support

  - JSX support
