markdown: >-
  ## Overview


  Rill is a universal web application framework designed for building isomorphic
  JavaScript applications with Express-like middleware that works on both client
  and server sides.


  ## Features


  - Universal client/server architecture

  - Express-like middleware

  - Isomorphic routing

  - Framework agnostic

  - Lightweight core
