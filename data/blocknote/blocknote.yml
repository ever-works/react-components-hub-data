name: BlockNote
description: BlockNote is a modern, block-based rich text editor for React built
  on top of ProseMirror and TipTap, providing a Notion-like editing experience
  with drag-and-drop blocks, slash commands, and AI integration capabilities. It
  features a clean, intuitive interface for content creation with real-time
  collaboration support through Yjs CRDT protocol. Key features include
  drag-and-drop block reordering, slash command menus for formatting, real-time
  collaborative editing, customizable block types, AI-assisted content
  generation, full TypeScript support, WAI-ARIA accessibility compliance, light
  and dark theme support, markdown shortcuts, and export to HTML/Markdown.
  Primary use cases include document editors, knowledge base platforms, content
  management systems, collaborative writing tools, and any application requiring
  a rich text editor with block-based composition. Compared to Quill or CKEditor
  (which are inline-formatting focused), BlockNote offers a more modern
  block-based editing paradigm similar to Notion, while compared to Tiptap
  (which is lower-level), BlockNote provides a more opinionated, ready-to-use
  experience.
