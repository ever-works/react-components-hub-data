markdown: >-
  ## Overview


  CDBReact (Contrast) provides an elegant set of reusable UI components for
  building responsive, mobile-first web applications. Built with Tailwind CSS
  for modern styling.


  ## Features


  - Mobile-first responsive design

  - Built with Tailwind CSS

  - Pre-built UI components

  - Templates and layouts

  - Reusable component architecture

  - Documentation and examples
