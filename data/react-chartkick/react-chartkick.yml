markdown: >-
  ## Overview


  react-chartkick aims for simplicity with a minimalistic API, making it one of
  the easiest React chart libraries to get started with. It supports multiple
  underlying charting engines, giving developers flexibility in choosing the
  rendering backend.


  ## Features


  - **Simplicity first**: Offers a minimalistic API for quick and easy charting
  with minimal configuration

  - **Multiple-engine support**: Compatible with various charting engines
  including Chart.js, Google Charts, and Highcharts

  - **Beginner-friendly**: Straightforward API with minimal setup requirements,
  perfect for personal projects and prototypes

  - **Declarative API**: Create charts with simple component definitions


  ## Considerations


  - **Customization depth**: Prioritizes simplicity, which limits deep
  customization. For intricate designs or specific chart behaviors, reliance on
  the underlying engines (Chart.js or Highcharts) may be necessary

  - **Dependency on other engines**: Relies on external charting engines for
  rendering, which can introduce additional complexity and dependencies


  ## Pricing


  Free and open-source under the MIT license.
