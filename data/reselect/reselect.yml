markdown: >-
  ## Overview


  Reselect is a memoized selector library for Redux. It provides composable,
  efficient selector functions for computing derived data from Redux store
  state.


  ## Features


  - Memoized selector functions

  - Composable selectors

  - Efficient derived state computation

  - Works with Redux

  - No dependencies

  - Multiple input selectors support

  - Custom equality checks
