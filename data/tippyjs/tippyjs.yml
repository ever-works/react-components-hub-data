markdown: >-
  ## Overview


  Tippy.js is a highly customizable tooltip, popover, dropdown menu, and more.
  It uses Popper.js to position tooltips and has a simple, powerful API.


  ## Key Features


  - Highly customizable

  - 30+ built-in themes

  - Animations

  - Lazy creation

  - Trigger events (hover, click, focus)

  - Touch support

  - Keyboard navigation

  - Accessible

  - Mobile-friendly

  - SSR support

  - React wrapper available


  ## Content Types


  - Plain text

  - HTML content

  - React components

  - DOM elements

  - String templates


  ## Pricing


  Free and open-source under the MIT license.
