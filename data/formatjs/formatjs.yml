name: FormatJS
description: Suite of JavaScript libraries for internationalization and
  localization, including react-intl. Provides comprehensive i18n support with
  message formatting, relative time display, plural rules, and date/number
  formatting across multiple languages.
source_url: https://github.com/formatjs/formatjs
category: Internationalization
