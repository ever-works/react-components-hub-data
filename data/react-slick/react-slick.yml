markdown: >-
  ## Overview


  React Slick is a carousel component built with React. It supports multiple
  slides per view, different transition effects, and extensive customization
  options.


  ## Key Features


  - Responsive design

  - Touch/swipe support

  - Transition effects

  - Autoplay functionality

  - Navigation controls

  - Pagination dots

  - Lazy loading

  - Vertical scrolling

  - Center mode

  - Infinite loop

  - Variable width slides


  ## Customization


  - CSS customization

  - Before/After change callbacks

  - Custom arrows and dots

  - Slide timing control

  - Responsive breakpoints


  ## Pricing


  Free and open-source under the MIT license.
