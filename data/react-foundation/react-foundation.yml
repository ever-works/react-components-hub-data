markdown: >-
  ## Overview


  React Foundation ports the ZURB Foundation CSS framework to React, providing
  familiar Foundation components and grid system as React components.


  ## Features


  - Foundation CSS framework as React components

  - Grid system and responsive utilities

  - Form and button components

  - Navigation and layout components

  - Familiar Foundation API
