markdown: >-
  ## Overview


  Searchkit provides React UI components for building powerful search
  experiences backed by Elasticsearch. It handles search requests, facet
  filtering, and result display with minimal setup.


  ## Features


  - Elasticsearch integration

  - Faceted search components

  - Search filters and sorting

  - Result display components

  - Pagination support

  - Aggregation widgets

  - Easy configuration
