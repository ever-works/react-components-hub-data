markdown: >-
  ## Overview


  Jest is a widely used JavaScript testing framework originally developed by
  Meta. It provides everything needed for comprehensive testing including a test
  runner, assertion library, mocking, stubbing, and code coverage analysis.
  While Vitest is now often preferred for React projects, Jest remains a
  backbone option for many existing codebases.


  ## Features


  - Built-in test runner with parallel execution

  - Rich assertion library with matchers

  - Mocking and stubbing capabilities

  - Snapshot testing

  - Code coverage reporting

  - Zero configuration for most setups

  - TypeScript support with ts-jest or babel-jest


  ## Pricing


  Free and open-source under the MIT license.
