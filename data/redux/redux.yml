markdown: >-
  ## Overview


  Redux is a state management library that helps manage application state in a
  predictable way.


  ## Features

  - Single source of truth

  - State is read-only

  - Changes using pure functions

  - Middleware support

  - Time-travel debugging


  ## Pricing

  Free and open source under MIT license.
