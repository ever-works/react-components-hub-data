markdown: >-
  ## Overview


  A React component that combines sortable and resizable pane functionality,
  enabling users to organize and resize panel elements through intuitive drag
  interactions.


  ## Features


  - Sortable pane ordering via drag-and-drop

  - Resizable pane dimensions

  - Configurable constraints

  - Smooth animations during resize and reorder

  - Customizable styles


  ## Pricing


  Free and open-source under the MIT license.
