markdown: >-
  ## Overview


  React Web Animation provides React components that wrap the Web Animations
  API, enabling declarative, performant animations powered by the browser's
  native animation engine.


  ## Features


  - Web Animations API wrapper components

  - Declarative animation configuration

  - Keyframe-based animations

  - Play, pause, and reverse controls

  - Animation callbacks and events

  - Browser-native performance
