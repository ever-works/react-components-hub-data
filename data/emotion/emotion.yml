name: Emotion
description: CSS-in-JS library for React that enables writing styles using
  JavaScript template literals or object styles. An alternative to
  styled-components with support for both the styled pattern and the css prop
  for co-locating styles with components.
source_url: https://emotion.sh/
category: CSS/Styling
tags:
