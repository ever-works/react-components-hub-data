markdown: >-
  ## Overview


  An in-line WYSIWYG web editor with a modular plugin system for creating rich
  content editing experiences.


  ## Features


  - In-line WYSIWYG editing

  - Plugin-based architecture for extensibility

  - Built for web-based content creation

  - Demo available at edtr.io

  - Comprehensive documentation

  - React integration

  - Supports various content types through plugins


  ## Pricing


  Free and open-source under the MIT license.
