markdown: >-
  ## Overview


  Jodit is a lightweight, fast WYSIWYG HTML editor built with vanilla JavaScript
  and no dependencies. It offers a modern editing experience with extensive
  features while maintaining a small footprint.


  ## Features


  - Lightweight and fast

  - No dependencies

  - Mobile-friendly

  - Touch support

  - Inline editing mode

  - Iframe mode

  - Source code editor with syntax highlighting

  - Full screen mode

  - Responsive design

  - Image upload and handling

  - Drag and drop images

  - Paste handling

  - Table editing

  - Insert special characters

  - Insert emoticons

  - Link management

  - Find and replace

  - Spell checker integration

  - Undo/redo

  - Multiple language support

  - RTL text support


  ## Customization


  - Custom buttons

  - Custom plugins

  - Toolbar configuration

  - Custom themes

  - Color schemes

  - Button icons

  - Context menu customization


  ## Media Handling


  - Image upload

  - Image resize and crop

  - Image alignment

  - Drag and drop

  - File browser

  - Media embed

  - Video insertion

  - Audio insertion


  ## Advanced Features


  - Split mode (editor + source)

  - Preview mode

  - Statistics (word count, character count)

  - Hot keys

  - Auto-save

  - Clean HTML output

  - Paste from Word

  - XSS protection

  - Sanitization


  ## React Integration


  - Official React component

  - Controlled component support

  - Event callbacks

  - Ref access

  - Dynamic configuration

  - TypeScript definitions


  ## Plugins


  - File browser

  - Image editor

  - Video embed

  - Search and replace

  - Font awesome

  - Copy format

  - Sticky toolbar


  ## Use Cases


  - Blog editors

  - Comment sections

  - Forum posts

  - Email composition

  - CMS systems

  - Note-taking apps


  ## Pricing


  Free and open-source under the MIT license.
