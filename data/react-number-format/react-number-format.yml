markdown: >-
  ## Overview


  React Number Format is a flexible input component for formatting numbers,
  currency, phone numbers, and other numeric patterns with built-in validation
  and customization.


  ## Key Features


  - **Currency Formatting**: USD, EUR, etc.

  - **Phone Numbers**: International formats

  - **Credit Cards**: Card number formatting

  - **Custom Patterns**: Define custom masks

  - **Prefix/Suffix**: Add text around value

  - **Thousand Separators**: Locale-specific

  - **Decimal Control**: Decimal places

  - **Validation**: Built-in validation

  - **TypeScript**: Type support


  ## Format Types


  - **Currency**: USD $, EUR €, etc.

  - **Phone**: (123) 456-7890

  - **Credit Card**: XXXX XXXX XXXX XXXX

  - **SSN**: XXX-XX-XXXX

  - **Postal Code**: Locale-specific

  - **Custom Patterns**: Any format


  ## Features


  - Thousand separators

  - Decimal places

  - Prefix/suffix

  - Negative number handling

  - Copy/paste support

  - Backspace handling

  - Selection handling

  - International support

  - Custom formatting

  - Input validation


  ## Props


  - thousandSeparator: Separator character

  - decimalSeparator: Decimal character

  - decimalScale: Decimal places

  - fixedDecimalScale: Fixed decimals

  - prefix: Prefix text

  - suffix: Suffix text

  - format: Custom pattern

  - mask: Mask character

  - allowNegative: Allow negative

  - allowLeadingZeros: Leading zeros


  ## Use Cases


  - Price Input

  - Quantity Input

  - Phone Entry

  - Credit Card Entry

  - Social Security Numbers

  - Postal Codes

  - Tax IDs

  - Account Numbers


  ## Pricing


  Free and open-source under the MIT license.
