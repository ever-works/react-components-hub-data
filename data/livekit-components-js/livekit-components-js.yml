markdown: >-
  ## Overview


  LiveKit Components provides React UI components for building real-time
  communication features like voice agents, video conferencing, and chat. The
  components integrate with LiveKit's cloud or self-hosted servers for
  low-latency communication.


  ## Key Features


  - Pre-built components for agent sessions

  - Audio visualization UI

  - Voice control bars

  - Chat transcript components

  - Compatible with Shadcn UI


  ## Installation


  ```bash

  $ npm install @livekit/components-js

  ``


  ## Pricing


  Free and open-source under Apache-2.0 license.

  [Enterprise support available](https://livekit.io/enterprise) for commercial
  use.
