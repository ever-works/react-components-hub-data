markdown: >-
  ## Overview


  React Server is a framework for React with server rendering for blazing fast
  page load times. Developed by Redfin, it provides isomorphic rendering with
  progressive enhancement.


  ## Features


  - Server-side rendering by default

  - Fast page loads

  - Progressive enhancement

  - Built-in routing

  - Streaming HTML

  - Hot reloading

  - Plugin architecture
