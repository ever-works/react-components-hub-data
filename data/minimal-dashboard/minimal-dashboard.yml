markdown: >-
  ## Overview


  Minimal is a free and open-source dashboard template built with Material UI.
  It offers a basic set of components and pages with the option to upgrade to a
  paid version for more extensive features. It serves as a good starting point
  for simple projects.


  ## Key Features


  - **Material UI foundation:** Built with standard Material UI components

  - **Basic pages included:** Comes with a dashboard overview, tables, and icons

  - **Free and open source:** The free version is available on GitHub for anyone
  to use

  - **Pre-built pages:** Includes authentication, settings, profile page,
  product listings, orders, blog, and job listing pages


  ## Pros


  - Free version available for easily trying it out

  - Good set of product pages for common use cases

  - Good starting point for simple projects


  ## Cons


  - Outdated Material Design aesthetic that lacks visual appeal

  - Fully editable Figma UI kit design file available only in paid version

  - Not actively maintained with new features


  ## Pricing


  - Free version available

  - Paid version from $69
