markdown: >-
  ## Overview


  Reactotron is a cross-platform desktop app for inspecting React JS and React
  Native applications, providing rich debugging capabilities.


  ## Features


  - State inspection

  - API request monitoring

  - Error logging

  - Performance tracking

  - Custom plugins

  - Works with React and React Native
