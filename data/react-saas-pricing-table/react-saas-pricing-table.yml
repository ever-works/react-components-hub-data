markdown: >-
  ## Overview


  React SaaS Pricing Table provides a clean, toggleable pricing table component
  designed for SaaS applications.


  ## Features


  - Responsive card layout

  - Monthly/annual plan toggle

  - Highlighted premium plan

  - Customizable with Tailwind CSS

  - Animate price changes


  ## Installation


  `npm install finnovo-components`


