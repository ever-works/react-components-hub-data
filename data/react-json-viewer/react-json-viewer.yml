markdown: >-
  ## Overview


  React JSON Viewer provides an interactive way to display and navigate JSON
  data in React applications with syntax highlighting and expandable nodes.


  ## Features


  - Syntax-highlighted JSON rendering

  - Collapsible/expandable nodes

  - Search and filtering

  - Theming support

  - Copy to clipboard


  ## Installation


  `npm install react-json-view`


