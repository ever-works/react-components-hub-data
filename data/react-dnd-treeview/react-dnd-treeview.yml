name: React DnD Treeview
description: A draggable tree view component for React with support for nested
  items, drag-and-drop reordering, and customizable node rendering for
  hierarchical data structures.
source_url: https://github.com/minop1205/react-dnd-treeview
category: Interaction
tags:
  - tree-view
  - drag-drop
  - hierarchical
  - sortable
featured: false
markdown: >-
  ## Overview


  React DnD Treeview provides a tree structure with drag-and-drop capabilities,
  allowing users to reorganize hierarchical data visually. It's built on top of
  React DnD for smooth interactions.


  ## Features


  - Hierarchical tree structure

  - Drag and drop nodes

  - Drop between nodes

  - Drop inside nodes

  - Reorder nodes

  - Nest/unnest nodes

  - Collapsible branches

  - Expandable nodes

  - Multi-select

  - Custom node rendering

  - Custom icons

  - Custom handles

  - Keyboard navigation

  - Accessibility support

  - TypeScript support


  ## Tree Operations


  - Add nodes

  - Remove nodes

  - Move nodes

  - Copy nodes

  - Nest nodes

  - Expand/collapse

  - Select nodes

  - Highlight nodes


  ## Drag and Drop


  - Drag nodes within tree

  - Drop indicators

  - Drag preview

  - Drop validation

  - Drag constraints

  - Custom drop zones

  - External drag sources


  ## Node Features


  - Custom rendering

  - Node icons

  - Node labels

  - Node badges

  - Expandable/collapsible

  - Selection state

  - Disabled state

  - Custom metadata


  ## Customization


  - Custom node components

  - Custom expand/collapse icons

  - Custom drag handle

  - Custom drop indicator

  - Styling options

  - Theme support


  ## Data Management


  - Flat data structure support

  - Tree data structure support

  - Data transformation utilities

  - State management

  - Update callbacks


  ## Use Cases


  - File explorers

  - Folder structures

  - Organization charts

  - Menu builders

  - Category management

  - Task hierarchies

  - Project structures

  - Navigation trees


  ## Pricing


  Free and open-source under the MIT license.
