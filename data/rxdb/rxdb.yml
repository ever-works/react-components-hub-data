markdown: >-
  ## Overview


  RxDB is a reactive Database for JavaScript Applications that is fast,
  local-first, and built for modern web apps. It provides real-time data
  synchronization and works offline.


  ## Features


  - Reactive data queries

  - Local-first architecture

  - Offline support

  - Real-time synchronization

  - Multiple storage engines

  - Schema-based validation

  - TypeScript support

  - Works with React, Vue, Angular, and vanilla JS


  ## Links


  - [Documentation](https://rxdb.info/quickstart.html)

  - [Example](https://github.com/pubkey/rxdb/tree/master/examples/react)
