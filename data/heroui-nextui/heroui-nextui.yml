markdown: >-
  ## Overview


  HeroUI (previously NextUI) is a modern React UI library with 50+ beautiful
  components built on React Aria. It provides accessible, customizable
  components with a focus on developer experience and design flexibility.


  ## Features


  - 50+ accessible components

  - Built on React Aria for accessibility

  - Customizable theming system

  - Dark mode support

  - TypeScript support

  - Server-side rendering

  - Responsive design

  - Variants and sizes

  - Beautiful default styles

  - Performance optimized

  - Tree-shakeable

  - Regular updates

  - Comprehensive documentation

  - Active community

  - As of January 2026: 27,000+ GitHub stars

  - 120,000+ weekly npm downloads


  ## Component Categories


  - Layout (Grid, Container, Spacer)

  - Forms (Input, Checkbox, Select)

  - Navigation (Navbar, Tabs, Breadcrumbs)

  - Display (Card, Avatar, Badge)

  - Overlay (Modal, Dropdown, Tooltip)

  - Feedback (Progress, Spinner)


  ## Use Cases


  - Web applications

  - Admin dashboards

  - SaaS products

  - Marketing sites

  - E-commerce platforms


  ## Pricing


  Free and open-source under the MIT license.
