markdown: >-
  ## Overview


  Create skeleton screens that automatically adapt to your app with animated
  shimmer effect. Use in place of content that is loading.


  ## Key Features


  - Auto-sizing skeletons

  - Shimmer animation

  - Customizable styling

  - CSS-in-JS compatible

  - TypeScript support

  - Responsive

  - Dark mode support

  - BaseURL support

  - Count prop for multiple skeletons


  ## Benefits Over Spinners


  - Shows expected content shape

  - Reduces perceived load time

  - Better user experience

  - More professional appearance

  - Reduces cognitive load


  ## Pricing


  Free and open-source under the MIT license.
