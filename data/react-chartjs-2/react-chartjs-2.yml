markdown: >-
  ## Overview


  React Chart.js 2 provides React components for Chart.js, one of the most
  popular JavaScript charting libraries. It combines Chart.js's powerful
  charting capabilities with React's component model.


  ## Chart Types


  - Line Chart

  - Bar Chart (vertical and horizontal)

  - Pie Chart

  - Doughnut Chart

  - Polar Area Chart

  - Radar Chart

  - Scatter Chart

  - Bubble Chart

  - Mixed Charts (combination of types)


  ## Features


  - Responsive design

  - Canvas rendering for performance

  - Animated transitions

  - Legend and tooltips

  - Multiple datasets

  - Custom colors and styling

  - Plugins support

  - TypeScript support

  - Tree-shakeable

  - SSR compatible

  - Accessibility features


  ## Customization


  - Custom tooltips

  - Custom legends

  - Custom animations

  - Custom scales

  - Custom plugins

  - Theming support

  - Color schemes


  ## Interactions


  - Hover effects

  - Click events

  - Pan and zoom

  - Data point selection

  - Drill-down capabilities

  - Export to image


  ## Data Handling


  - Dynamic data updates

  - Real-time data

  - Large datasets (up to 1M points)

  - Data decimation

  - Time-series data

  - Logarithmic scales

  - Multiple Y-axes


  ## Performance


  - Canvas-based rendering

  - Hardware acceleration

  - Efficient updates

  - Lazy loading

  - Data decimation for large sets


  ## Chart.js Plugins


  - Zoom and pan

  - Annotation

  - Datalabels

  - Streaming data

  - Stacked charts

  - Crosshair

  - Deferred loading


  ## Use Cases


  - Dashboards

  - Analytics platforms

  - Financial charts

  - Scientific data visualization

  - Real-time monitoring

  - Statistical analysis

  - Business intelligence


  ## Integration


  - React Hooks support

  - Ref access to chart instance

  - Event handlers

  - Dynamic updates

  - Controlled components


  ## Pricing


  Free and open-source under the MIT license.
