markdown: >-
  ## Overview


  React Spinners is a comprehensive collection of loading spinner components for
  React, providing 30+ different spinner styles with full customization options.


  ## Key Features


  - **30+ Spinners**: Various spinner designs

  - **Customizable**: Size, color, speed

  - **CSS Animations**: Smooth animations

  - **Simple Props**: Easy configuration

  - **No Dependencies**: Pure CSS animations

  - **TypeScript**: Type definitions

  - **Accessibility**: ARIA labels


  ## Available Spinners


  - BarLoader

  - BeatLoader

  - BounceLoader

  - CircleLoader

  - ClimbingBoxLoader

  - ClipLoader

  - DotLoader

  - FadeLoader

  - GridLoader

  - HashLoader

  - MoonLoader

  - PacmanLoader

  - PulseLoader

  - RingLoader

  - RiseLoader

  - RotateLoader

  - ScaleLoader

  - SyncLoader

  - PropagateLoader

  - SkewLoader

  - And more...


  ## Configuration


  - color: Spinner color

  - size: Spinner size

  - speedMultiplier: Animation speed

  - loading: Show/hide

  - css: Custom CSS

  - radius: Border radius

  - margin: Margin around spinner


  ## Use Cases


  - Data Loading

  - API Requests

  - Page Transitions

  - Content Loading

  - Form Submission

  - File Upload


  ## Accessibility


  - ARIA labels

  - Screen reader support

  - Focus management


  ## Pricing


  Free and open-source under the MIT license.
