markdown: >-
  ## Overview


  Low-level visualization primitives for React. visx is a collection of
  low-level visualization components. Build your own charting library or
  visualization applications with visx components.


  ## Key Features


  - D3.js primitives

  - Tree-shakable components

  - Small bundle size

  - Full customization

  - TypeScript support

  - Responsive design

  - Touch and mouse events

  - Animations

  - SSR support


  ## Component Categories


  - Axes: AxisBottom, AxisLeft, AxisRight, AxisTop

  - Scales: ScaleLinear, ScaleTime, ScaleBand

  - Shapes: Bar, Line, Area

  - Legends: LegendOrdinal, LegendSize

  - Tooltips, Gradients, Patterns


  ## Pricing


  Free and open-source under the MIT license.
