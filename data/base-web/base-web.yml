name: Base Web
description: Base Web (also known as Base UI) is a React component library
  developed by Uber that serves as a foundation for building enterprise web
  applications. It provides a comprehensive set of well-engineered, themeable
  components with built-in accessibility and internationalization support. Key
  features include an extensible component architecture for deep customization,
  a powerful theme system with design tokens for light/dark modes, a
  comprehensive grid and layout system, and support for RTL languages with full
  accessibility. Primary use cases include enterprise dashboards, internal
  tools, data-heavy applications, and design system foundations. Compared to MUI
  (which is more feature-rich but heavier) or Ant Design (more opinionated),
  Base Web offers a unique overrides system that enables deep component
  customization while maintaining consistent design language, making it ideal
  for teams needing fine-grained control over component behavior.
source_url: https://baseweb.design
