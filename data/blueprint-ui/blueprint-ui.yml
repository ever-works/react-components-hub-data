name: Blueprint UI
description: Blueprint UI is a comprehensive React-based UI toolkit designed
  primarily for complex, data-dense desktop applications. Developed by Palantir,
  it provides over 50 components including data tables, date pickers, tree
  views, and form controls optimized for business workflows. Key features
  include built-in dark mode, keyboard accessibility, TypeScript-first design,
  and extensive customization through CSS variables and component props. Primary
  use cases include data-intensive dashboards, financial applications, analytics
  platforms, and enterprise internal tools. Compared to lighter libraries like
  Chakra UI, Blueprint prioritizes data-heavy components and productivity
  workflows over marketing UI patterns.
