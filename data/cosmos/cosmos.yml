markdown: >-
  ## Overview


  Cosmos is a DX tool for developing and testing React components in isolation,
  enabling truly encapsulated component design.


  ## Features


  - Component playground

  - Fixture-based testing

  - Snapshot support

  - Hot module reloading

  - Multiple renderer support
