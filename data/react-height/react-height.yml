markdown: >-
  ## Overview


  React Height is a wrapper component that measures its children's rendered
  height and reports it as a prop, useful for driving animations or layout
  decisions.


  ## Features


  - Automatic children height measurement

  - Height reporting via props

  - Useful for expand/collapse animations
