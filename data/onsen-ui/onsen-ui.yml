markdown: >-
  ## Overview


  Onsen UI is an open-source React UI library designed for building hybrid and
  mobile web applications. It provides components specifically crafted for
  mobile applications with native look and feel, supporting both iOS and Android
  Material Design. The library has over 8k GitHub stars and approximately 24k
  weekly NPM downloads.


  ## Key Features


  - **Gesture Support**: Built-in touch gesture support using a minified version
  of Hammer.js for swiping, tapping, and dragging

  - **Mobile UI Components**: Components specifically designed for mobile
  including carousels, dialogs, navigation drawers, and more

  - **Customization**: Components can be styled to match app design and branding

  - **Built-in Themes**: Ships with built-in themes that can be selected and
  customized to match your project's brand

  - **Cross-Platform**: Build mobile applications for both iOS and Android
  platforms using a single codebase


  ## Benefits


  - **Native Experience**: UI components mimic native mobile application
  designs, providing familiar user experiences

  - **Performance**: Optimized for smooth and animated transitions

  - **Cross-Platform Compatibility**: Single codebase for iOS and Android

  - **Theme Support**: Built-in themes with customization options


  ## Pricing


  Free and open-source.
