name: React File Upload
description: React File Upload is a drag-and-drop file upload component for
  React applications that provides an intuitive interface for users to select,
  preview, and upload files with real-time progress tracking. It supports
  multiple file selection, file type validation, and customizable UI components
  that integrate seamlessly with any design system. Key features include
  drag-and-drop zone with visual feedback, multiple file upload with individual
  progress bars, file type and size validation with rejection handling, custom
  upload endpoint configuration with fetch or XMLHttpRequest, thumbnail previews
  for images, and responsive design that works on mobile devices. Primary use
  cases include profile photo uploads, document submission forms, media gallery
  management, and any web application requiring user file uploads. Compared to
  raw HTML file input elements (limited UX) or Dropzone.js (vanilla JavaScript,
  not React-native), this component provides a React-first experience with
  built-in progress tracking and customizable rendering.
