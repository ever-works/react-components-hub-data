markdown: >-
  ## Overview


  React DayPicker is a flexible date picker component for React applications
  with excellent accessibility and customization options.


  ## Key Features


  - Single day selection

  - Date range selection

  - Multiple date selection

  - Custom date formatting

  - Keyboard navigation

  - Accessible (WCAG 2.1 AA)

  - Localization support

  - Mobile-friendly

  - Disabled dates support

  - Modifiers and styles

  - Event handlers


  ## Use Cases


  - Date input in forms

  - Event date selection

  - Reservation systems

  - Schedule planning

  - Date range filtering


  ## Pricing


  Free and open-source under the MIT license.
