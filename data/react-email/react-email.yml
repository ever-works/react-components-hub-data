markdown: >-
  ## Overview


  React Email is a collection of high-quality, unstyled components for creating
  beautiful emails using React and TypeScript. It provides a modern developer
  experience for building responsive email templates that work across all email
  clients.


  ## Features


  - Component-based email development

  - TypeScript support out of the box

  - Preview emails during development

  - Hot reload for rapid iteration

  - Inline CSS automatically

  - Supports Tailwind CSS

  - Production-ready templates

  - Compatible with all major email clients

  - Export to HTML

  - Integration with email services

  - Dark mode support


  ## Components


  - Html: Root component

  - Head: Email head section

  - Body: Email body container

  - Container: Centers content

  - Section: Layout sections

  - Row/Column: Grid layout

  - Text: Paragraph text

  - Heading: Title headings

  - Button: Call-to-action buttons

  - Link: Hyperlinks

  - Img: Images

  - Hr: Horizontal rules

  - Code: Code blocks

  - Preview: Preview text


  ## Use Cases


  - Transactional emails

  - Marketing campaigns

  - Newsletter systems

  - Notification emails

  - Welcome emails


  ## Pricing


  Free and open-source under the MIT license.
