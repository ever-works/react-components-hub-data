markdown: >-
  ## Overview


  React Scroll Components provides a collection of components that respond to
  page scroll events, enabling scroll-driven interactions.


  ## Features


  - Scroll-triggered component behavior

  - Page scroll tracking

  - Multiple scroll-based components

  - Configurable thresholds

  - Performance-optimized
