markdown: >-
  ## Overview


  React Modal Sheet provides a mobile-friendly bottom sheet component with
  smooth animations and gesture controls. It's designed for mobile-first
  experiences and works great in progressive web apps.


  ## Features


  - Smooth animations

  - Touch gestures (swipe to open/close)

  - Multiple snap points

  - Backdrop with custom opacity

  - Scrollable content

  - Fixed header and footer

  - Customizable heights

  - Keyboard accessible

  - Focus trap

  - Prevent scroll on body

  - Portal rendering

  - TypeScript support

  - CSS-in-JS styling

  - Spring-based physics


  ## Snap Points


  - Define multiple stop positions

  - Swipe between snap points

  - Programmatic snap control

  - Initial snap point

  - Default snap point


  ## Gestures


  - Swipe down to dismiss

  - Swipe up to expand

  - Drag to intermediate positions

  - Velocity-based animations

  - Rubber band effect

  - Touch momentum


  ## Content Management


  - Scrollable content area

  - Fixed header

  - Fixed footer

  - Dynamic height

  - Min/max heights

  - Nested scrolling


  ## Customization


  - Custom animations

  - Custom backdrop

  - Custom handle/grabber

  - Styling options

  - Theme support

  - CSS classes


  ## Mobile Optimization


  - Touch-optimized

  - Safe area insets

  - iOS specific handling

  - Android specific handling

  - Viewport height handling

  - Address bar compensation


  ## Use Cases


  - Mobile filters

  - Mobile menus

  - Action sheets

  - Mobile forms

  - Product details

  - Share sheets

  - Settings panels

  - Search interfaces


  ## Pricing


  Free and open-source under the MIT license.
