markdown: >-
  ## Overview


  Inferno is an extremely fast, React-like JavaScript library for building
  modern user interfaces, designed to provide the best possible rendering
  performance.


  ## Features


  - React-compatible API

  - Extremely fast rendering

  - Small bundle size

  - Server-side rendering

  - Component lifecycle hooks

  - Synthetic event system
