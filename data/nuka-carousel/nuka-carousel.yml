markdown: >-
  ## Overview


  Nuka Carousel is a React carousel library focused on being small, fast, and
  accessibility-first. Developed by Formidable Labs, it's written entirely in
  React with no external dependencies.


  ## Features


  - **Zero Dependencies**: Pure React implementation

  - **Accessibility-First**: WCAG compliant with keyboard support

  - **Small & Fast**: Optimized bundle size and performance

  - **Custom Animations**: Create your own animation effects

  - **Fully Responsive**: Adapts to any screen size

  - **External Controls**: Support for complex React applications

  - **Touch Support**: Swipe gestures on mobile

  - **Customizable UI**: Easily adapt to your brand


  ## Carousel Modes


  - Slide mode (default)

  - Fade mode

  - Wrap-around/infinite loop

  - Center mode

  - Auto-play

  - Variable widths


  ## Configuration Options


  - Slides to show

  - Slides to scroll

  - Animation speed

  - Easing functions

  - Cell spacing

  - Cell alignment

  - Height mode (auto, first, current, max)

  - Wrap around toggle

  - Frame overflow


  ## Control Options


  - Default controls (arrows, dots)

  - Custom controls

  - External controls via refs

  - Control positioning

  - Auto-generated pagination

  - Custom render controls


  ## Animation Customization


  Nuka Carousel allows you to define custom scroll, zoom, and fade animations,
  giving you complete control over transition effects.


  ## Accessibility Features


  - Keyboard navigation (arrow keys, tab)

  - ARIA labels and roles

  - Screen reader support

  - Focus management

  - Semantic HTML


  ## Use Cases


  - Image galleries

  - Product carousels

  - Hero sections

  - Testimonial rotators

  - Feature showcases

  - Content sliders

  - Portfolio displays


  ## Community


  Maintained by Formidable Labs with active community support and regular
  updates.


  ## Pricing


  Free and open-source under the MIT license.
