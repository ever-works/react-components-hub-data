markdown: >-
  ## Overview


  JSX Control Statements provides Babel transforms that add neater If and For
  control structures to React JSX, enabling declarative conditional rendering
  and iteration directly in JSX templates.


  ## Features


  - JSX-based If/Else rendering

  - JSX-based For loops

  - Babel transform integration

  - Cleaner template syntax

  - Type definition support

  - Choose/When/Otherwise patterns
