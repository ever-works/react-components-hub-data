name: React SaaS Template
description: Complete SaaS starter kit combining a marketing landing page, blog
  system, user account management, subscription/pricing pages, and admin
  dashboard under a single consistent Material UI design system.
source_url: https://reactsaastemplate.com
category: UI Component Libraries
