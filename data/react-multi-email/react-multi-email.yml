markdown: >-
  ## Overview


  A React input component designed for entering multiple email addresses,
  formatting each address as a visual tag as the user types.


  ## Features


  - Formats multiple email addresses as visual tags

  - Real-time formatting as the user types

  - Email validation support

  - Touch-friendly input interface

  - Customizable styling

  - Demo available on Vercel


  ## Pricing


  Free and open-source.
