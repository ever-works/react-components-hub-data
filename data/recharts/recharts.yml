markdown: >-
  ## Overview


  Recharts is a composable charting library built on React components. It's
  built with React, so your charts are components too.


  ## Key Features


  - Line charts

  - Bar charts

  - Pie charts

  - Area charts

  - Scatter charts

  - Composed charts

  - Responsive design

  - Tooltips and legends

  - Customizable styling

  - Animation support

  - Accessibility

  - TypeScript support


  ## Core Components


  - LineChart, BarChart, PieChart, AreaChart

  - CartesianGrid, XAxis, YAxis

  - Tooltip, Legend, Label

  - Line, Bar, Area, Scatter

  - ResponsiveContainer


  ## Pricing


  Free and open-source under the MIT license.
