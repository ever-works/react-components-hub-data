markdown: >-
  ## Overview


  @szhsin/react-menu is a lightweight, flexible React menu library with built-in
  accessibility features. It provides components for creating dropdown menus,
  context menus, and submenus with full keyboard and screen reader support.


  ## Features


  - Lightweight and minimal dependencies

  - Full keyboard navigation (arrow keys, Enter, Escape)

  - Screen reader support with ARIA attributes

  - Unlimited submenu nesting

  - Click, hover, and focus triggers

  - Customizable positioning

  - Portal support

  - Mobile friendly

  - TypeScript support

  - Easy styling customization


  ## Components Included


  - Menu (container)

  - MenuItem (individual menu item)

  - MenuHeader (section header)

  - MenuDivider (visual separator)

  - FocusableItem (custom focusable items)


  ## Installation


  ```bash

  npm install @szhsin/react-menu

  ```


  ## Pricing


  Free and open source under the MIT license.
