markdown: >-
  ## Overview


  React TSParticles is a lightweight wrapper for the tsparticles library,
  enabling developers to add interactive particle animations to React
  applications. It supports various shapes, colors, and interaction modes.


  ## Features


  - Interactive particle systems

  - Multiple particle shapes and styles

  - Mouse/touch interaction support

  - Configurable particle behavior and movement

  - Background and foreground particle modes

  - Preset configurations for common patterns

  - Lightweight bundle size
