name: Better Auth
description: Better Auth is a modern, framework-agnostic, type-safe
  authentication library designed for full-stack JavaScript and TypeScript
  applications. It provides a comprehensive authentication solution with support
  for OAuth providers, email/password authentication, magic links, multi-factor
  authentication, and session management with a developer-first API. Key
  features include full type safety with TypeScript inference,
  framework-agnostic design working with React, Next.js, SvelteKit, and others,
  database adapters for multiple backends, email verification, password reset
  flows, and built-in security protections including CSRF and rate limiting.
  Primary use cases include SaaS applications, membership platforms, internal
  tools, and any full-stack app needing production-ready authentication.
  Compared to Auth.js (formerly NextAuth.js, which is Next.js-centric) or
  proprietary solutions like Auth0 (hosted, per-user pricing), Better Auth
  offers open-source self-hosted authentication with broader framework support
  and more granular control over auth flows.
