markdown: >-
  ## Overview


  Better Auth is an emerging authentication library designed for modern
  JavaScript applications. It provides a type-safe, framework-agnostic approach
  to authentication with a focus on developer experience and comprehensive
  feature coverage.


  ## Features


  - Framework-agnostic design

  - Full type safety with TypeScript

  - Support for multiple OAuth providers

  - Email and password authentication

  - Session management

  - Works with React and other frameworks


  ## Pricing


  Free and open-source.
