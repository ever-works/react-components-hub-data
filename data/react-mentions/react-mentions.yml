name: React Mentions
description: Mention/tagging component for React supporting @mentions in text
  input. Enables user mentions with customizable suggestions and autocomplete
  behavior.
source_url: https://github.com/signalwerk/react-mentions
category: Form Components
tags:
  - mentions
  - tagging
  - autocomplete
featured: false
markdown: >-
  ## Overview


  React Mentions is a component that enables @mention and #tag functionality in
  text inputs, with customizable suggestions and autocomplete behavior similar
  to social media platforms.


  ## Key Features


  - **@Mention Support**: Tag users or items

  - **#Tag Support**: Add hashtags

  - **Autocomplete**: Suggest as you type

  - **Custom Triggers**: Use different triggers

  - **Customizable Rendering**: Custom suggestion UI

  - **Multiple Mentions**: Support multiple types

  - **Search Filtering**: Filter suggestions

  - **Keyboard Navigation**: Arrow key support

  - **TypeScript**: Type support


  ## Features


  - @mention detection

  - Hashtag support

  - Custom triggers

  - Mention highlighting

  - Suggestion list

  - Autocomplete

  - Search filtering

  - Selection from list

  - Keyboard navigation

  - Mobile support


  ## Configuration


  - trigger: Trigger character (@, #, etc.)

  - data: Suggestion data

  - displayTransform: Display format

  - regex: Custom pattern

  - placement: Suggestion placement

  - className: Custom styling

  - markup: Custom mention markup

  - renderSuggestion: Custom rendering


  ## Components


  - MentionsInput: Main input component

  - Mention: Mention trigger configuration


  ## Methods


  - getValue(): Get text value

  - setValue(): Set text value

  - getMentions(): Get mentions


  ## Use Cases


  - Social Media Posts

  - Comments with Mentions

  - Team Collaboration

  - Issue Tracking

  - Chat Applications

  - Feedback Forms

  - Task Assignment


  ## Output Format


  - Plain text with markers

  - Custom formatted output

  - Mention array extraction


  ## Pricing


  Free and open-source under the MIT license.
