markdown: >-
  ## Overview


  React Mentions enables Facebook/Twitter-style @mentions in textarea inputs.
  The main MentionsInput component can handle multiple Mention data sources for
  users, issues, template variables, and more.


  ## Features


  - Multiple mention triggers (@, #, custom)

  - Multiple data sources

  - Async data loading

  - Custom styling

  - Markup output

  - Keyboard navigation

  - Custom display transforms

  - Regex-based triggers

  - Suggestion rendering customization

  - Loading states

  - Accessibility support

  - TypeScript definitions

  - Mobile support

  - Controlled component


  ## Components


  - MentionsInput: Main textarea wrapper

  - Mention: Data source configuration


  ## Configuration


  - trigger: Character to trigger (@, #, etc.)

  - data: Array or function for suggestions

  - renderSuggestion: Custom rendering

  - displayTransform: Text display format

  - markup: Output format

  - regex: Pattern matching


  ## Data Sources


  - Static arrays

  - Async functions

  - API endpoints

  - Filtered results

  - Dynamic loading


  ## Styling


  - Custom CSS classes

  - Inline styles

  - Styled components

  - CSS modules

  - Tailwind CSS


  ## Use Cases


  - Social media comments

  - Chat applications

  - Issue tracking systems

  - Collaboration tools

  - Documentation platforms

  - Email composition

  - Team communication


  ## Pricing


  Free and open-source under the MIT license.
