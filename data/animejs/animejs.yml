featured: false
markdown: >-
  ## Overview


  Anime.js is a lightweight JavaScript animation library with a simple yet
  powerful API. It works seamlessly with CSS properties, SVG, DOM attributes,
  and JavaScript objects.


  ## Features


  - Lightweight (~9KB gzipped)

  - Works with CSS, SVG, DOM, and JS objects

  - Timeline controls

  - Keyframes support

  - Stagger animations

  - Property-based animations

  - Easing functions

  - Callback system

  - Playback controls

  - Smooth animations

  - SVG morphing

  - Path animations

  - Framework agnostic

  - TypeScript definitions


  ## Animation Targets


  - CSS properties

  - Individual transforms

  - SVG attributes

  - DOM attributes

  - JavaScript objects


  ## Use Cases


  - UI animations

  - SVG motion graphics

  - Interactive illustrations

  - Logo animations

  - Loading animations

  - Micro-interactions


  ## Pricing


  Free and open-source under the MIT license.
