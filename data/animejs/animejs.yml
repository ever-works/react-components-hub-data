name: Anime.js
description: Anime.js is a lightweight (~9KB gzipped) JavaScript animation
  library with a simple yet powerful API for animating CSS properties, SVG, DOM
  attributes, and JavaScript objects. It features timeline controls, keyframe
  support, stagger animations, and smooth easing functions. Primary use cases
  include UI micro-interactions, SVG motion graphics, loading animations, and
  interactive illustrations. Compared to GSAP (more feature-rich but larger),
  Anime.js offers a smaller footprint while still supporting complex
  multi-property animations and timeline sequencing.
source_url: https://animejs.com/
category: UI Animation
tags:
