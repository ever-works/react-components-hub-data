markdown: >-
  ## Overview


  React Best Gradient Color Picker is a comprehensive color picker component
  that supports both solid colors and gradients. It offers linear and radial
  gradient types with full customization of gradient properties.


  ## Features


  - Solid color selection (hex, rgba)

  - Linear gradient support

  - Radial gradient support

  - Customizable gradient degrees

  - Hex color input

  - RGBA color controls

  - Opacity slider

  - Hue slider

  - Gradient stop management

  - Add/remove gradient stops

  - CSS string output

  - Parsed object output

  - Preview panel

  - Copy to clipboard

  - Color format conversion

  - TypeScript support


  ## Gradient Types


  - Linear: Directional gradients with angle control

  - Radial: Circular gradients with position


  ## Output Formats


  - CSS gradient strings

  - Parsed gradient objects

  - Hex color values

  - RGBA values


  ## Customization


  - Custom color stops

  - Gradient angle/direction

  - Stop position control

  - Opacity per stop


  ## Use Cases


  - Design tools

  - Theme builders

  - Background generators

  - UI customization panels

  - Brand color selection

  - Marketing materials


  ## Pricing


  Free and open-source under the MIT license.
