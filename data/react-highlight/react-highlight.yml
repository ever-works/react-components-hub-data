featured: false
markdown: >-
  ## Overview


  React Highlight is a React wrapper around Highlight.js providing automatic
  syntax highlighting for code blocks with support for 180+ languages and
  multiple color themes.


  ## Key Features


  - **180+ Languages**: Broad language support

  - **Multiple Themes**: 100+ color themes

  - **Auto Detection**: Detect language automatically

  - **Line Numbers**: Optional line numbering

  - **Copy Button**: Copy code functionality

  - **Dark Mode**: Theme switching

  - **Performance**: Efficient highlighting

  - **TypeScript**: Type support


  ## Features


  - Language detection

  - Manual language specification

  - Theme selection

  - Line highlighting

  - Inline code highlighting

  - Language tabs

  - Copy to clipboard

  - Download code

  - Full-screen mode

  - Diff highlighting


  ## Configuration


  - language: Code language

  - highlightLines: Highlight specific lines

  - showLineNumbers: Show line numbers

  - theme: Color theme selection

  - startingLineNumber: Custom line start

  - wrapLines: Wrap long lines

  - className: Custom CSS class


  ## Supported Languages


  - JavaScript, TypeScript

  - Python, Java, C++, C#

  - HTML, CSS, XML

  - SQL, Bash, Shell

  - JSON, YAML, TOML

  - Markdown, LaTeX

  - And 150+ more


  ## Themes


  - Light themes: atom-one-light, github, etc.

  - Dark themes: atom-one-dark, monokai, etc.

  - High contrast themes

  - Solarized themes


  ## Use Cases


  - Documentation

  - Blog Posts

  - Tutorial Websites

  - Code Repositories

  - Technical Writing

  - API Documentation

  - Code Snippets


  ## Pricing


  Free and open-source under the BSD 3-Clause license.
