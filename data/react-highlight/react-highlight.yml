name: React Highlight
description: Code syntax highlighting component for React with support for
  multiple languages and themes. Integrates with Highlight.js for comprehensive
  language support.
source_url: https://github.com/highlightjs/highlight.js
category: Text Editors
tags:
  - syntax-highlighting
