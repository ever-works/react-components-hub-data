markdown: >-
  ## Overview


  React Stepper provides a multi-step wizard interface for React applications to
  guide users through complex workflows.


  ## Features


  - Customizable step indicators

  - Support for vertical/horizontal layouts

  - Accessibility attributes

  - Keyboard navigation

  - Validation state tracking


  ## Installation


  `npm install @basalt/react-stepper`


