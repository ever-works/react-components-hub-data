markdown: >-
  ## Overview


  React Device Frameset provides React components that wrap content in device
  mockups (iPhone, Android, etc.) for presentations and documentation.


  ## Features


  - Multiple device frames

  - Device rotation support

  - Customizable colors

  - Screenshot-ready rendering
