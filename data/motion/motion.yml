markdown: >-
  ## Overview


  Motion is a JavaScript and React animation library that combines the best of
  Web Animations API with the flexibility of JavaScript. It provides a simple
  yet powerful way to add animations to your React applications.


  ## Key Features


  - 120fps animations

  - Hybrid engine (Web Animations API + JavaScript)

  - Gesture animations (hover, tap, focus, drag)

  - Layout animations

  - Variant system for choreography

  - AnimatePresence for exit animations

  - TypeScript support

  - Server-side rendering support

  - React 18+ support


  ## Core Components


  - motion.{element}: Animated versions of HTML/SVG elements

  - AnimatePresence: Manage enter/exit animations

  - Variants: Orchestrate animations

  - Gestures: Hover, tap, focus interactions


  ## Pricing


  Free and open-source.
