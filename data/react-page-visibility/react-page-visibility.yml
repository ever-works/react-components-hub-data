markdown: >-
  ## Overview


  React Page Visibility provides a simple way to detect when a page or tab
  becomes visible or hidden in the browser. This is useful for pausing
  animations, stopping timers, or optimizing resource usage when the page is not
  visible.


  ## Features


  - Page visibility detection

  - Hook-based API

  - Component-based API

  - Cross-browser support

  - TypeScript support

  - SSR compatible

  - Lightweight

  - No dependencies


  ## API


  - usePageVisibility() hook

  - PageVisibility component

  - Boolean visibility state

  - Visibility change callbacks


  ## Use Cases


  ### Performance Optimization

  - Pause animations when hidden

  - Stop video/audio playback

  - Pause timers and intervals

  - Reduce API polling

  - Suspend heavy computations

  - Pause canvas rendering


  ### Resource Management

  - Reduce network requests

  - Suspend WebSocket connections

  - Pause file uploads

  - Stop data streaming

  - Reduce CPU usage


  ### User Experience

  - Resume notifications when visible

  - Show "You're back!" messages

  - Refresh stale data on return

  - Auto-pause games

  - Stop auto-advancing slides


  ### Analytics

  - Track time spent on page

  - Measure engagement

  - Record focus/blur events

  - Session duration tracking


  ## Browser Support


  - Chrome

  - Firefox

  - Safari

  - Edge

  - Opera

  - Mobile browsers

  - IE11 (with polyfill)


  ## Integration Examples


  - Animation libraries

  - Video players

  - Real-time dashboards

  - Chat applications

  - Live feeds

  - Polling mechanisms

  - Game loops


  ## Implementation


  Uses the Page Visibility API:

  - document.hidden

  - document.visibilityState

  - visibilitychange event


  ## Pricing


  Free and open-source under the MIT license.
