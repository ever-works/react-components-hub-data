markdown: >-
  ## Overview


  Bytescale Upload Widget is a complete file upload solution that includes cloud
  storage out of the box. It handles everything from upload to storage to
  delivery, making it perfect for production applications.


  ## Features


  - Built-in cloud storage (storage included)

  - Image cropping and editing

  - Video previews and thumbnails

  - Document previews (PDF, Office files)

  - Drag and drop upload

  - Multi-file uploads

  - Direct browser-to-cloud uploads

  - Image optimization and resizing

  - Automatic format conversion (WebP, AVIF)

  - CDN delivery included

  - File validation and virus scanning

  - Upload progress tracking

  - Folder organization

  - Public and private files

  - Expiring URLs

  - Custom branding

  - Mobile optimized

  - Accessibility compliant


  ## Supported File Types


  - Images (JPEG, PNG, GIF, WebP, SVG, etc.)

  - Videos (MP4, MOV, AVI, WebM, etc.)

  - Documents (PDF, DOC, XLS, PPT, etc.)

  - Audio files

  - Archives (ZIP, RAR, etc.)

  - Raw files


  ## Processing Features


  - Automatic image optimization

  - Smart format detection

  - Thumbnail generation

  - Video transcoding

  - Document preview generation

  - Watermarking

  - Face detection


  ## Security


  - Virus scanning

  - File type validation

  - Size limits

  - Rate limiting

  - Private file access

  - Signed URLs

  - GDPR compliant


  ## Use Cases


  - User-generated content

  - Profile pictures

  - Product images

  - Document uploads

  - Media libraries

  - File sharing


  ## Pricing


  Free tier available. Paid plans start at $19/month including storage and
  bandwidth.
