markdown: >-
  ## Overview


  Formily is a high-performance, extensible, and TypeScript-friendly form
  solution developed by Alibaba. It provides a schema-driven approach to
  building complex, dynamic forms.


  ## Features


  - Schema-driven form definition

  - High performance with large forms

  - Extensible plugin system

  - Full TypeScript support

  - Framework-agnostic core

  - Multiple UI adapter support
