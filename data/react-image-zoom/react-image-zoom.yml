markdown: >-
  ## Overview


  React Image Zoom provides a simple way to add magnification capabilities to
  images in React applications.


  ## Features


  - Zoom on hover or click

  - Customizable zoom factor

  - Smooth transition animations

  - Responsive zoom area

  - Touch support for mobile


  ## Installation


  `npm install react-image-zoom`


