markdown: >-
  ## Overview


  React Dev Utils is a collection of utilities and helpers used by Create React
  App and other development tools to enhance the React development experience.


  ## Key Features


  - **Error Overlay**: Custom error display

  - **Build Scripts**: Build command utilities

  - **Webpack Config**: Webpack helpers

  - **Module Resolution**: Module finding utilities

  - **Browser Launching**: Auto-open browser

  - **Polling**: Build file watching

  - **ForkTsCheckerWebpackPlugin**: TypeScript checking

  - **TypeScript Support**: Type checking utilities


  ## Utilities Included


  - ErrorOverlayPlugin: Webpack plugin for errors

  - WebpackDevServerUtils: Development server helpers

  - WatchMissingNodeModulesPlugin: Watch dependencies

  - InterpolateHtmlPlugin: HTML interpolation

  - ModuleScopePlugin: Module scope validation

  - FileSizeReporter: Bundle size reporting

  - printBuildError: Error formatting

  - clearConsole: Terminal clearing


  ## Features


  - Runtime error overlay

  - Build error reporting

  - Module resolution

  - TypeScript integration

  - File watching

  - Browser auto-opening

  - Port finding

  - Process forking

  - Plugin system


  ## Configuration


  - Webpack integration

  - Dev server setup

  - TypeScript configuration

  - Custom error handling

  - Logging options


  ## Use Cases


  - Development Tools

  - Build Tooling

  - Create React App

  - Custom Builders

  - CLI Tools

  - Development Experience


  ## Pricing


  Free and open-source under the MIT license.
