markdown: >-
  ## Overview


  Data Driven Motion is an animation library focused on animating data changes
  in React applications. It simplifies the process of creating smooth
  transitions when data updates.


  ## Features


  - Data-driven animation triggers

  - Smooth transitions for dataset changes

  - Declarative animation API

  - Integrates with data visualization components

  - Lightweight and focused
