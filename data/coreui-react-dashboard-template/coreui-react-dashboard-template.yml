markdown: >-
  ## Overview


  CoreUI is a long-standing and very comprehensive open-source admin dashboard
  template. It uses its own unique design system, which is highly functional but
  can feel generic and Bootstrap-like. It's known for having a huge number of
  free components. The CoreUI component library is available for React, Angular,
  and Vue.


  ## Key Features


  - **Based on CoreUI:** Uses the CoreUI component library, available for React,
  Angular, and Vue

  - **Large collection of UI components:** Includes a large number of UI
  components, charts, forms, and widgets

  - **Figma UI kit (paid only):** A Figma UI kit is only available for paying
  users

  - **Mature and stable:** A well-established project that has been around for
  years


  ## Pros


  - Comprehensive and feature-rich for a free template

  - Mature, stable, and well-documented library

  - Large number of free components available


  ## Cons


  - UI lacks a modern or unique aesthetic and can feel dated

  - Figma UI kit design file locked behind the paid version

  - Design can feel generic and Bootstrap-like


  ## Pricing


  - Free version available

  - Paid versions from $49
