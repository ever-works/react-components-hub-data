markdown: >-
  ## Overview


  Plate is a headless, open-source rich-text editor framework for React
  applications, built to help developers create highly customizable editors. It
  uses a modular, plugin-driven architecture based on Slate.js.


  ## Features


  - Modular, plugin-driven architecture built on Slate.js

  - AI-powered content generation support

  - Collaborative editing capabilities

  - Rich media embedding

  - Headless design for full UI customization

  - Extensible plugin system for custom features


  ## Pricing


  Free and open-source.
