markdown: >-
  ## Overview


  Embla Carousel is a lightweight carousel library that emphasizes fluid motion
  and precise interactions. It provides a minimalist core with an extensive
  plugin system for adding features as needed.


  ## Features


  - Lightweight core (~3KB)

  - Fluid motion physics

  - Touch/swipe gestures

  - Mouse dragging

  - Wheel scrolling support

  - Infinite loop

  - Multiple slides per view

  - Variable slide widths

  - Align slides (start, center, end)

  - RTL support

  - Vertical orientation

  - Snap to slides

  - Skip snaps

  - TypeScript support

  - Plugin architecture


  ## Core Behavior


  - Natural scrolling physics

  - Momentum-based motion

  - Precise drag interactions

  - Smooth animations

  - Customizable friction

  - Spring animations


  ## React Integration


  - useEmblaCarousel hook

  - Declarative API

  - Ref-based control

  - Plugin hooks

  - Event callbacks

  - State management


  ## Plugins


  - Autoplay

  - Autoheight

  - Class names

  - Wheel gestures

  - Lazy loading

  - Parallax

  - Progress

  - Thumbnail navigation

  - Video integration

  - Custom plugins


  ## Navigation


  - Previous/next buttons

  - Dot indicators

  - Thumbnails

  - Progress bar

  - Custom navigation


  ## Alignment


  - Start alignment

  - Center alignment

  - End alignment

  - Mixed alignment

  - Per-slide alignment


  ## Loop Mode


  - Infinite scrolling

  - Seamless transitions

  - Duplicate handling

  - Edge detection


  ## Customization


  - Motion physics

  - Drag behavior

  - Slide spacing

  - Container options

  - Slide options

  - Event handlers


  ## Performance


  - Minimal core size

  - Tree-shakeable plugins

  - Efficient rendering

  - GPU acceleration

  - Optimized calculations


  ## Use Cases


  - Product galleries

  - Image sliders

  - Content carousels

  - Media browsers

  - Portfolio showcases

  - Feature highlights

  - Mobile-like navigation


  ## Pricing


  Free and open-source under the MIT license.
