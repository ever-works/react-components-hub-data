featured: true
markdown: >-
  ## Overview


  AriaKit is a low-level UI library for building accessible interactive
  components with React and JavaScript. It empowers developers to create
  WCAG-compliant applications by providing unstyled, accessible component
  primitives.


  ## Features


  - WCAG 2.1 AAA compliance

  - Automatic keyboard navigation and focus management

  - Complete ARIA attribute handling

  - Full TypeScript support

  - Zero CSS dependencies

  - Composable component API

  - Built-in animation support

  - Extensive test coverage

  - Comprehensive documentation


  ## Components Included


  - Button

  - Checkbox

  - Combobox

  - Dialog

  - Disclosure

  - Menu

  - Popover

  - Radio

  - Select

  - Tab

  - Tooltip

  - And more


  ## Installation


  ```bash

  npm install ariakit

  ```


  ## Pricing


  Free and open source under the MIT license.
