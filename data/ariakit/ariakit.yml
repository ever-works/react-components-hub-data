name: AriaKit
description: AriaKit is an open-source library of unstyled, accessible React
  component primitives that handle complex accessibility concerns like keyboard
  navigation, focus management, and WAI-ARIA attributes automatically. With over
  20 components including buttons, dialogs, comboboxes, menus, tabs, and
  tooltips, it provides the behavioral foundation for building custom-styled
  interactive UIs. Primary use cases include building design systems, accessible
  enterprise applications, and custom component libraries. Compared to Radix UI
  (a direct competitor with similar headless approach), AriaKit offers more
  components including comboboxes and tables, while also supporting server
  components and providing built-in animation utilities.
