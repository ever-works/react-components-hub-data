markdown: >-
  ## Overview


  React Markdown Renderer converts Markdown text to React components. It
  supports syntax highlighting and custom element rendering.


  ## Features


  - CommonMark and GitHub-flavored Markdown

  - Syntax highlighting with Prism.js

  - Custom component rendering

  - Auto-escaping HTML

  - Async image loading


  ## Installation


  `npm install react-markdown`


