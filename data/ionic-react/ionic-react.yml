markdown: >-
  ## Overview


  Ionic React brings the Ionic framework to React, enabling cross-platform
  mobile, desktop, and web app development using familiar React patterns and
  components.


  ## Features


  - Cross-platform mobile development

  - Progressive Web App support

  - Native device API access via Capacitor

  - Pre-built UI components

  - React Native rendering option

  - Desktop app support

  - Single codebase deployment

  - Extensive component library
