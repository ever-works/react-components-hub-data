name: why-did-you-render
description: Notifies you about potentially avoidable re-renders in React
  applications. Helps identify performance issues by detecting unnecessary
  renders caused by unchanged props or state. Essential tool for optimizing
  React component performance.
source_url: https://github.com/welldone-software/why-did-you-render
category: Performance
tags:
