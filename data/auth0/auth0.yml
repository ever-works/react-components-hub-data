name: Auth0
description: Auth0 (now part of Okta) is an enterprise-grade authentication and
  identity management platform that provides drop-in authentication for web and
  mobile applications through Universal Login, Social Identity Providers, and
  enterprise protocols including OAuth 2.0, OIDC, and SAML. It handles complex
  authentication flows, MFA, passwordless login, and user management. Key
  features include customizable Universal Login with hosted pages, 100+ social
  and enterprise identity providers, Multi-Factor Authentication with push, SMS,
  and authenticator apps, role-based access control with custom claims and
  rules, advanced threat detection with anomaly alerts, and SDKs for every major
  platform including React. Primary use cases include enterprise applications,
  SaaS platforms, B2B products requiring SSO, and any application requiring
  secure, production-ready authentication without building it from scratch.
  Compared to open-source alternatives like Auth.js (self-hosted, more limited
  features), Auth0 provides managed security compliance, SOC 2 certification,
  and enterprise features at the cost of usage-based pricing.
