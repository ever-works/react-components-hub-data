markdown: >-
  ## Overview


  Auth0 is a comprehensive authentication and identity management platform by
  Okta. It provides Universal Login, social identity providers, and advanced
  security features for React applications with extensive protocol support.


  ## Features


  - Universal Login with customizable login pages

  - Social identity providers (Google, Facebook, GitHub, etc.)

  - OAuth 2.0, OpenID Connect, and SAML support

  - Multi-factor authentication (MFA)

  - Passwordless authentication

  - Role-based access control (RBAC)

  - User management dashboard

  - Extensive SDK and React integration


  ## Pricing


  Free tier with up to 7,500 active users. Paid plans start at $35/month for
  production use.
