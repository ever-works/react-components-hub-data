markdown: >-
  ## Overview


  Heroicons is a curated set of SVG icons created by the makers of Tailwind CSS.
  With over 2 million weekly npm downloads, it's highly stable and perfectly
  integrated with Tailwind-based projects.


  ## Features


  - **Two Styles**: Outline and solid variants for each icon

  - **Hand-Crafted**: Carefully designed by professional designers

  - **Tailwind Integration**: Seamless integration with Tailwind CSS

  - **React Components**: Native React components for each icon

  - **TypeScript**: Full TypeScript support

  - **24px Grid**: All icons designed on a 24×24 grid

  - **MIT Licensed**: Free for commercial and personal use

  - **Consistent Style**: Unified design language across all icons


  ## Icon Styles


  ### Outline

  - Stroked icons with 1.5px stroke width

  - Clean, minimal aesthetic

  - Best for light backgrounds

  - More breathing room in designs


  ### Solid

  - Filled icons with solid shapes

  - Bold, prominent appearance

  - Great for emphasis and active states

  - Higher visual weight


  ## Icon Categories


  - Actions & Controls

  - Communication

  - Media & Entertainment

  - Devices & Technology

  - Weather & Nature

  - Business & Finance

  - E-commerce & Shopping

  - Education & Science

  - Social & Community

  - Navigation & Maps


  ## Usage with Tailwind


  Heroicons are designed to work seamlessly with Tailwind CSS utility classes
  for sizing, coloring, and positioning. The icons accept className props and
  can be styled using Tailwind utilities.


  ## Performance


  With a Delta/Source(gzip) ratio close to 1.0x–1.2x, Heroicons deliver
  excellent bundle performance with minimal overhead, making them one of the
  most efficient icon libraries available.


  ## Sizing


  Heroicons come in three standard sizes:

  - 16px (Mini): For smaller UI elements

  - 20px (Small): For compact interfaces

  - 24px (Default): Standard size for most use cases


  ## Pricing


  Free and open-source under the MIT license.
