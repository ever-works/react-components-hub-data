name: Heroicons
description: "Heroicons is a beautiful, hand-crafted set of over 290 SVG icon
  components created by the makers of Tailwind CSS, available in both outline
  and solid styles with full TypeScript support and native React integration.
  Designed on a 24x24 pixel grid with meticulous attention to visual
  consistency, it delivers icons that integrate seamlessly into any
  Tailwind-based or standalone React application. Key features include dual
  style variants (outline and solid) for every icon, native React components
  with full TypeScript definitions, three sizing options (16px, 20px, 24px),
  seamless integration with Tailwind CSS utility classes for coloring and
  sizing, MIT licensing for unrestricted commercial use, and exceptional bundle
  performance with a Delta/Source(gzip) ratio close to 1.0xâ1.2x. Primary use
  cases include navigation icons, button icons, status indicators, form field
  icons, and any React application requiring polished, consistent iconography.
  Compared to larger icon libraries like FontAwesome (heavier, less consistent
  with Tailwind aesthetics) or Material Icons (Google-specific design language),
  Heroicons offers the best visual match for Tailwind-based projects with
  minimal overhead."
