markdown: "## Overview


  Heroicons is a curated set of SVG icon components created by the makers of
  Tailwind CSS. With over 2 million weekly npm downloads, it's highly stable and
  perfectly integrated with Tailwind-based projects.


  ## Features


  - **Two Styles**: Outline and solid variants for each icon

  - **Hand-Crafted**: Carefully designed by professional designers for visual
  consistency

  - **Tailwind Integration**: Seamless integration with Tailwind CSS utility
  classes

  - **React Components**: Native React components for each icon with full
  TypeScript support

  - **TypeScript**: Full TypeScript support with proper type definitions

  - **24px Grid**: All icons designed on a 24Ã24 pixel grid

  - **MIT Licensed**: Free for both commercial and personal use

  - **Consistent Style**: Unified design language across all 290+ icons


  ## Icon Styles


  ### Outline

  Stroked icons with 1.5px stroke width designed with clean, minimal aesthetic
  best suited for light backgrounds with more breathing room.


  ### Solid

  Filled icons with solid shapes providing a bold, prominent appearance ideal
  for emphasis, active states, and higher visual weight.


  ## Performance


  With a Delta/Source(gzip) ratio close to 1.0xâ1.2x, Heroicons deliver
  excellent bundle performance with minimal overhead, making them one of the
  most efficient icon libraries available.


  ## Pricing


  Free and open-source under the MIT license."
