markdown: >-
  ## Overview


  An emoji picker component for React built as part of the Interweave library
  ecosystem, powered by Emojibase data.


  ## Features


  - Comprehensive emoji selection interface

  - Emoji search functionality

  - Categorized emoji organization

  - Powered by Emojibase data

  - Integrates with Interweave rendering

  - Customizable appearance


  ## Pricing


  Free and open-source.
