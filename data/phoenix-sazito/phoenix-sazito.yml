markdown: >-
  ## Overview


  Phoenix is a boilerplate designed to help build React applications with Server
  Side Rendering and Localization support out of the box.


  ## Features


  - Server Side Rendering (SSR) support

  - Built-in localization/i18n

  - Pre-configured React setup

  - Simplified project structure


  ## Pricing


  Free and open-source.
