markdown: >-
  ## Overview


  LinguiJS is a readable, automated, and optimized (5 kb) internationalization
  library for JavaScript applications.


  ## Features


  - Tiny bundle size (5 kb)

  - Readable syntax

  - Automated extraction

  - Plural support

  - Date and number formatting

  - Message formatting

  - TypeScript support


