name: Create React Dependency
description: >-
  Create React Dependency is a zero-configuration scaffolding tool that
  bootstraps reusable React component libraries with minimal setup. It generates
  a complete project structure with build configuration, testing setup, and
  publishing workflows, allowing developers to focus on writing components
  rather than configuring tooling.


  **Key Features:**

  - Zero build configuration required

  - Automated project scaffolding for React component libraries

  - Pre-configured bundling with Rollup or similar

  - Testing setup included

  - Ready for npm publishing


  **Primary Use Cases:** Teams creating internal component libraries,
  open-source React component projects, and developers who want to package React
  components as standalone npm packages.


  **Compared to Alternatives:** Unlike manual setup (configuring Webpack/Rollup,
  Jest, TypeScript) or create-react-library (more opinionated), this tool offers
  a minimalist approach with less boilerplate and faster setup time.
