markdown: >-
  ## Overview


  Hypernova is a service for server-side rendering JavaScript views, developed
  by Airbnb. It provides a simple approach to universal rendering through a
  microservice architecture.


  ## Features


  - HTTP-based SSR service

  - Framework agnostic

  - Supports multiple view types

  - Error handling and fallback

  - Caching support

  - Developed by Airbnb
