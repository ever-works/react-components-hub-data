markdown: >-
  ## Overview


  Core UI is a customizable enterprise UI library that leads in open-source
  admin dashboard templates. It provides dozens of admin templates and supports
  cross-browser compatibility. The library has over 600 GitHub stars and
  approximately 73k weekly NPM downloads.


  ## Key Features


  - **SASS Support**: Built using SASS (Syntactically Awesome Style Sheets) for
  cleaner and more maintainable CSS code

  - **Icons**: Includes an icon library importable via `@coreui/icons`

  - **Data Visualization**: Supports data visualization through Charts, suitable
  for admin dashboard applications

  - **Theming**: Theme support with easy customization options

  - **Navigation**: Built-in routing and navigation components for multi-page
  web applications


  ## Benefits


  - **Highly Customizable**: Developers can modify the appearance and behavior
  of elements, components, and templates

  - **Responsive Design**: Designed to work and function well across different
  screen sizes

  - **Active Community**: Ongoing support, updates, and bug fixes from an active
  community

  - **Comprehensive Documentation**: Well-structured docs with effective
  explanations of concepts and usage

  - **Cross-Browser Compatibility**: Works consistently across different
  browsers


  ## Pricing


  Open-source; additional admin templates available for purchase.
