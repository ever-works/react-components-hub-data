name: Auto Size Transition
description: "Auto Size Transition is a React component library that dynamically
  measures and smoothly transitions containers to fit their content size,
  solving the common problem of animating height and width changes that browsers
  typically can't handle with CSS alone. It uses requestAnimationFrame-based
  measurement and interpolation for butter-smooth animations. Key features
  include zero-layout-thrashing measurement, support for nested animated
  transitions, configurable durations and easing functions, and support for both
  open/close and arbitrary content resize scenarios. Primary use cases include
  collapsible panels, expandable accordions, dropdown menus, and any UI where
  content height changes dynamically. Compared to CSS-only height: 0 → height:
  auto workarounds (which are limited and often buggy) or general-purpose
  animation libraries like Framer Motion (which don't specifically optimize for
  content-aware sizing), this component is purpose-built for this single task
  with optimized performance."
source_url: https://github.com/renators/auto-size-transition
category: UI Animation
