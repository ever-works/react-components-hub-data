markdown: >-
  ## Overview


  FullCalendar is one of the most popular and well-developed calendar components
  available for React. It is a powerhouse capable of handling everything from
  simple date views to complex event scheduling, with drag-and-drop support,
  external event integration, and multiple view modes.


  ## Features


  - Multiple view modes: month, week, day, list, and timeline views

  - Drag-and-drop event creation and management

  - Event resizing support

  - External event dragging into the calendar

  - Recurring event support

  - Google Calendar, iCal, and CalDAV integration

  - JSON/ICS feed support for event data

  - Plugin-based extensible architecture

  - Resource/timeline view for resource scheduling

  - Keyboard navigation

  - Mobile-responsive design

  - Themable with CSS variables and custom styles

  - Official React wrapper component (@fullcalendar/react)

  - Works with vanilla JavaScript, Angular, Vue, and React


  ## Pricing


  - **Standard Edition**: Free under the MIT license, suitable for most use
  cases

  - **Premium Edition**: Paid license required for premium plugins including
  advanced timeline view and resource management features
