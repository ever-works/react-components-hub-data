markdown: >-
  ## Overview


  Tabler React bridges Tabler's 40k-star HTML UI kit into the React ecosystem.
  The templates have been refined over years of community feedback.


  ## Features


  - Charts and maps components

  - Forms and pricing cards

  - E-commerce elements

  - Gallery pages

  - Bootstrap foundation with minimal learning curve

  - Clean component wrappers following React conventions

  - Professional design


  ## Pricing


  Free and open-source under the MIT license.
