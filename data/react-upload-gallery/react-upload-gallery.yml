markdown: >-
  ## Overview


  A React component specifically designed for managing image uploads and gallery
  display with drag-and-drop support.


  ## Features


  - Image upload functionality

  - Drag-and-drop uploads

  - Sortable gallery items

  - Customizable appearance

  - Multiple image management

  - Simple integration with React applications


  ## Pricing


  Free and open-source.
