markdown: >-
  ## Overview


  React Refetch provides a simple, declarative, and composable way to fetch data
  for React components. It uses higher-order components to connect data fetching
  to component props.


  ## Features


  - Declarative data fetching

  - Composable HOC pattern

  - Promise-based API

  - Automatic loading states

  - Caching support

  - Refresh mechanism

  - Works with any fetch-compatible client
