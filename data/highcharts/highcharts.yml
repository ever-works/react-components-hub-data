markdown: >-
  ## Overview


  Highcharts is a modern SVG-based charting library that provides a wide range
  of interactive chart types for web and mobile applications. Known for its ease
  of use, extensive documentation, and excellent cross-browser compatibility, it
  is widely adopted in enterprise applications. The library includes built-in
  accessibility features and supports React, Angular, Vue, and vanilla
  JavaScript/TypeScript.


  ## Features


  - 15+ core chart types and numerous specialized series

  - SVG-based rendering for crisp, scalable visuals

  - Interactive features: tooltips, zooming, panning, drilldown, and point
  selection

  - Responsive design with automatic resizing

  - Built-in accessibility for screen readers

  - Export as PNG, JPEG, PDF, or SVG

  - Theming and styling customization

  - Annotations and labeling

  - Stock charts, maps, and Gantt charts modules

  - TypeScript definitions included

  - Works with React, Angular, Vue, and vanilla JS


  ## Pricing


  Free for personal, educational, and non-profit use. Commercial license
  required for business applications.
