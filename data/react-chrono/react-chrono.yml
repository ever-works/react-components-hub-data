markdown: >-
  ## Overview


  React Chrono is an open-source React component for creating beautiful,
  interactive timelines. It offers three rendering modes and extensive
  customization options for displaying chronological data.


  ## Features


  - Three display modes: Horizontal, Vertical, and Vertical Alternating

  - Auto-play slideshow functionality

  - Keyboard navigation support

  - Nested timeline support

  - Custom icons for timeline items

  - Media support (images and videos)

  - Slideshow controls

  - Responsive design

  - Custom content rendering

  - Customizable colors and styling

  - TypeScript support

  - Accessibility features

  - Smooth animations and transitions

  - Timeline item click handlers

  - Progress indicators

  - Active item highlighting


  ## Display Modes


  - **Horizontal**: Timeline flows left to right

  - **Vertical**: Timeline flows top to bottom on one side

  - **Vertical Alternating**: Timeline items alternate sides


  ## Use Cases


  - Company history pages

  - Project timelines

  - Event chronologies

  - Educational content

  - Portfolio showcases

  - Product roadmaps


  ## Pricing


  Free and open-source under the MIT license.
