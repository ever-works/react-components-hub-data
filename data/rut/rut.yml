markdown: >-
  ## Overview


  RUT (React Unit Test) is a testing library built on react-test-renderer that
  provides a clean and flexible API for testing React components, supporting
  both DOM and custom renderers.


  ## Features


  - Built on react-test-renderer

  - Support for DOM and custom renderers

  - Chain-friendly API

  - Snapshot testing helpers


  ## Pricing


  Free and open-source under the MIT license.
