name: Vue Toastification
description: Simple and highly customizable JavaScript notification library
  built for Vue apps, offering toast notifications with deep customization
  options for type, position, content, duration, and icons.
source_url: https://vue-toastification.maronato.dev/
category: UI Components
tags:
  - vue
  - toast
  - notifications
markdown: >-
  ## Overview


  Vue Toastification is a lightweight, highly customizable toast notification
  library for Vue.js applications. It provides a seamless way to display
  notification toasts within Vue projects with extensive configuration options.


  ## Features


  - Multiple notification types (success, error, info, warning)

  - Customizable toast positioning

  - Configurable duration per toast

  - Support for custom icons

  - Highly customizable themes and animations

  - Lifecycle hooks for toast events

  - Content customization with Vue components

  - Support for multiple toasts simultaneously

  - RTL (right-to-left) support

  - Touch-friendly swipe-to-dismiss


  ## Installation


  ```bash

  # Using NPM

  npm i vue-toastification

  # Using Yarn

  yarn add vue-toastification

  ```


  ## Use Cases


  - Vue and Nuxt applications needing deep toast customization

  - Projects requiring rich notification behavior with theme flexibility

  - Applications needing lifecycle hooks for toast event handling


  ## Pricing


  Free and open-source. Has over 3,400 GitHub stars and more than 100,000 weekly
  NPM downloads.
