name: React Masked Input
description: React Masked Input (part of the Text Mask project) is a form input
  component that provides real-time input masking to enforce specific formatting
  patterns as users type, ensuring consistent data entry for phone numbers,
  dates, credit cards, and custom formats. It guides users through input
  patterns visually, reducing errors and improving form completion rates. Key
  features include pre-built masks for currency, phone numbers, dates, and
  credit cards, custom regex-based pattern matching, real-time validation
  feedback, keyboard navigation support, accessibility attributes for screen
  readers, and seamless integration with popular form libraries including Formik
  and React Hook Form. Primary use cases include registration and checkout
  forms, payment processing interfaces, contact information collection, and any
  application requiring standardized data entry formats. Compared to building
  custom input handlers with onChange listeners (error-prone and repetitive),
  this library provides reliable, well-tested masking patterns out-of-the-box.
