markdown: >-
  ## Overview


  Phormal is a modern form library for React that provides responsive,
  multilingual forms with built-in validation, dark mode support and
  right-to-left language support.


  ## Features


  - Responsive form layouts

  - Built-in form validation

  - Right-to-left language support

  - Dark mode

  - Multilingual

  - Accessible


