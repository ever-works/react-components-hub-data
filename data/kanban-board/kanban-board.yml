name: React Beautiful DnD Kanban
description: >-
  This is a Kanban board component built on top of Atlassian's
  react-beautiful-dnd library, providing drag-and-drop task management with
  card-based layouts across columns. It implements the classic Kanban pattern
  for visual workflow management with smooth, accessible drag interactions.


  **Key Features:**

  - Drag cards between and within columns

  - Smooth, physics-based drag animations via react-beautiful-dnd

  - Column management (add, remove, reorder)

  - Card CRUD operations within the board

  - Keyboard-accessible drag and drop

  - Responsive column layout


  **Primary Use Cases:** Project management tools, task tracking dashboards,
  agile workflow boards, content management pipelines, and any application
  requiring visual task organization.


  **Compared to Alternatives:** This is a higher-level component built on
  react-beautiful-dnd rather than a standalone library. For a more
  feature-complete Kanban solution, alternatives like react-trello or @dnd-kit
  provide more built-in functionality out of the box.
