markdown: >-
  ## Overview


  Canban board component built with React Beautiful DnD for managing tasks with
  drag-and-drop functionality across columns.


  ## Features


  - Drag between columns

  - Drag within columns

  - Reorder cards

  - Add/remove cards

  - Column management


  ## Pricing


  Free and open-source.
