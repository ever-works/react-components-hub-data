markdown: >-
  ## Overview


  React Simple Animate is a lightweight animation library (~3KB) that provides
  an easy way to create keyframe animations in React using hooks. It focuses on
  simplicity while maintaining flexibility for common animation scenarios.


  ## Features


  - Lightweight (~3KB)

  - CSS keyframe animations

  - Hook-based API

  - Play/pause/reverse control

  - Delay configuration

  - Duration control

  - Easing functions

  - Iteration count

  - Direction control

  - Fill mode

  - Sequence animations

  - TypeScript support

  - Zero dependencies


  ## Hooks


  - useAnimate - basic animation

  - useAnimateGroup - group animations

  - useAnimateKeyframes - custom keyframes


  ## Animation Control


  - Play/pause

  - Reverse

  - Reset

  - Update keyframes

  - Change duration

  - Change easing

  - Iteration control


  ## Keyframes


  - Object-based keyframes

  - CSS string keyframes

  - Multiple properties

  - Transform animations

  - Opacity animations

  - Custom properties


  ## Easing Functions


  - Linear

  - Ease, ease-in, ease-out, ease-in-out

  - Cubic-bezier

  - Steps

  - Custom easing


  ## Sequencing


  - Chain animations

  - Delay between animations

  - Group animations

  - Parallel animations

  - Sequential animations


  ## Configuration


  - start - auto-start

  - duration - animation duration

  - delay - start delay

  - easeType - easing function

  - direction - normal, reverse, alternate

  - iterations - repeat count

  - fillMode - fill mode

  - render - render function


  ## Use Cases


  - UI micro-interactions

  - Loading animations

  - Page transitions

  - Button effects

  - Card animations

  - List animations

  - Form feedback

  - Toast notifications


  ## Performance


  - CSS animations (GPU)

  - Minimal JavaScript

  - Small bundle size

  - Efficient re-renders

  - No animation library bloat


  ## Pricing


  Free and open-source under the MIT license.
