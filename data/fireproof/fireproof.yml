markdown: >-
  ## Overview


  Fireproof is a pure JavaScript, zero-dependency CRDT (Conflict-free Replicated
  Data Type) database designed for React applications. It runs entirely in the
  browser and can connect to any cloud or backend for synchronization.


  ## Features


  - Pure JavaScript with zero dependencies

  - CRDT-based for automatic conflict resolution

  - Runs in the browser

  - Connects to any cloud or backend

  - Real-time synchronization

  - Offline support

  - React integration


  ## Links


  - [Demo](https://fireproof.storage/try-free/)

  - [Documentation](https://use-fireproof.com/docs/welcome)
