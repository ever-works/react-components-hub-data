markdown: >-
  ## Overview


  React Unit is a lightweight unit test library for ReactJS that allows testing
  React components without requiring a DOM environment.


  ## Features


  - Lightweight testing utilities

  - No DOM required

  - Fast test execution

  - Component rendering

  - Event simulation

  - State testing

  - Simple API
