markdown: >-
  ## Overview


  React Materialize adapts the MaterializeCSS framework for React applications,
  providing Material Design components as React wrappers around Materialize's
  JavaScript and CSS.


  ## Features


  - MaterializeCSS components as React wrappers

  - Material Design styling

  - Responsive grid system

  - Form and input components

  - Navigation components
