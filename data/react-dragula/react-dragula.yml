markdown: >-
  ## Overview


  A React wrapper for the Dragula library, offering straightforward
  drag-and-drop capabilities for lists and containers in React applications.


  ## Features


  - Simple and intuitive drag-and-drop API

  - Wraps the popular Dragula library

  - Supports drag between containers

  - Touch support

  - Minimal footprint

  - Easy integration with existing React components


  ## Pricing


  Free and open-source under the MIT license.
