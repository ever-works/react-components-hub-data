markdown: >-
  ## Overview


  React Hook Form DevTools is a companion development tool for React Hook Form
  that provides a visual interface for inspecting and debugging form state
  during development.


  ## Features


  - Real-time form state visualization

  - Field values display

  - Validation errors display

  - Dirty fields tracking

  - Touched fields tracking

  - Form submission state

  - Field registration status

  - Re-render count tracking

  - Performance monitoring

  - Collapsible interface

  - Draggable position

  - Dark theme support

  - TypeScript support


  ## Display Information


  ### Form State

  - isDirty

  - isValid

  - isSubmitting

  - isSubmitted

  - isSubmitSuccessful

  - submitCount

  - touchedFields

  - dirtyFields


  ### Field Information

  - Field names

  - Current values

  - Default values

  - Validation rules

  - Error messages

  - Field status (touched, dirty, valid)


  ### Performance Metrics

  - Component re-render count

  - Field-level re-renders

  - Validation timing


  ## Interface Features


  - Expandable/collapsible panel

  - Drag to reposition

  - JSON view of form data

  - Expandable nested objects

  - Color-coded status indicators

  - Search/filter fields

  - Copy state to clipboard


  ## Usage


  - Simple drop-in component

  - Only included in development

  - Automatically hidden in production

  - No configuration needed

  - Works with all React Hook Form features


  ## Integration


  ```javascript

  import { useForm } from 'react-hook-form';

  import { DevTool } from '@hookform/devtools';


  function App() {
    const { control } = useForm();
    return (
      <>
        <MyForm />
        <DevTool control={control} />
      </>
    );
  }

  ```


  ## Benefits


  - Faster debugging

  - Visual form state inspection

  - Understanding re-render behavior

  - Identifying performance issues

  - Learning React Hook Form

  - Development productivity


  ## Use Cases


  - Form development

  - Debugging validation issues

  - Performance optimization

  - Learning and training

  - Complex form debugging

  - Nested form inspection


  ## Requirements


  - React Hook Form v7+

  - React 16.8+

  - Development environment


  ## Pricing


  Free and open-source under the MIT license.
