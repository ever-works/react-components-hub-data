markdown: >-
  ## Overview


  Refine is a headless React framework for building enterprise-grade CRUD
  applications. It eliminates repetitive tasks demanded by CRUD operations and
  provides industry standard solutions for critical project requirements like
  authentication, access control, routing, networking, state management, and
  i18n.


  ## Features


  - Truly headless - works with any UI framework or custom design

  - Built-in support for 15+ backend services (REST, GraphQL, Supabase,
  Firebase, etc.)

  - Authentication and authorization out of the box

  - Advanced routing with React Router, Next.js, or Remix

  - Automatic form generation and validation

  - i18n support with multiple languages

  - Real-time and offline-first capabilities

  - Audit log functionality

  - Built-in data providers for popular backends

  - Integration with Material UI, Ant Design, Mantine, Chakra UI

  - TypeScript support

  - SSR support with Next.js

  - Developer-friendly CLI tools

  - Extensive documentation and examples


  ## Use Cases


  - Admin panels

  - B2B applications

  - Internal tools

  - Dashboards

  - CRUD-heavy applications


  ## Pricing


  Free and open-source under the MIT license.
