markdown: >-
  ## Overview


  React Window is a small library for rendering large lists efficiently. By
  automatically scrolling and rendering only visible elements, it dramatically
  improves performance when dealing with large datasets.


  ## Key Features


  - **Virtualization**: Only render visible items

  - **Performance**: Handle millions of items smoothly

  - **Small Size**: Minimal bundle impact

  - **Simple API**: Easy to use interface

  - **TypeScript**: Full type support

  - **Horizontal & Vertical**: Support for both orientations

  - **Variable Sizes**: Items with different heights/widths

  - **Fixed Size**: Optimized for uniform item sizes


  ## Components


  - **FixedSizeList**: Lists with uniform item height

  - **FixedSizeGrid**: Grids with uniform cell size

  - **VariableSizeList**: Lists with variable item heights

  - **VariableSizeGrid**: Grids with variable cell sizes


  ## Use Cases


  - Large Data Tables

  - Long Lists

  - Chat Message History

  - Photo Galleries

  - Timeline Events

  - Search Results

  - Infinite Scroll Lists

  - Data-Heavy Applications


  ## Performance Benefits


  - Scroll 1 million rows smoothly

  - Minimal memory usage

  - Reduced CPU overhead

  - Better battery life on mobile

  - Consistent 60fps scrolling


  ## Integration


  - Works with other libraries

  - Customizable styling

  - Custom item rendering

  - Scroll event callbacks


  ## Pricing


  Free and open-source under the MIT license.
