markdown: >-
  ## Overview


  A collection of React components that add enhanced behaviors to standard HTML
  input controls.


  ## Features


  - Autocomplete suggestions for input fields

  - Input masking support

  - Enhanced cursor and selection handling

  - Composable component design

  - Works with standard input elements

  - Lightweight and modular


  ## Pricing


  Free and open-source.
