  - countdown
markdown: >-
  ## Overview


  React Transitive Number animates changes to numeric values with smooth
  transitions. It is useful for counters, timers, and any UI where numbers
  change dynamically.


  ## Features


  - Animated number transitions

  - Flip-card style digit animation

  - Customizable transition duration

  - Supports decimal values

  - Compact component API
