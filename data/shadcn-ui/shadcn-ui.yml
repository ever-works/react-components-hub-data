name: shadcn-ui
description: "shadcn/ui is a collection of beautifully designed, accessible
  React components built with Radix UI primitives and Tailwind CSS that can be
  copied and pasted directly into projects. Rather than a traditional npm
  dependency, it works as a code registry where developers install and own the
  component code. Key features include: fully accessible components powered by
  Radix UI, customizable through Tailwind CSS utility classes, a robust theming
  system via CSS variables, and comprehensive component coverage for common UI
  patterns. Primary use cases are building modern web applications, dashboards,
  SaaS products, and design systems that need a polished, consistent UI.
  Compared to Material UI (which is heavier and more opinionated) or traditional
  component libraries, shadcn/ui gives developers full ownership of their
  component code with zero runtime dependencies and seamless integration into
  any React/Next.js project."
source_url: https://github.com/shadcn-ui/ui
