markdown: >-
  ## Overview


  shadcn-ui provides a collection of beautifully designed, customizable React
  components built with Radix UI and Tailwind CSS. The library focuses on
  accessibility and developer experience.


  ## Key Features


  - Built with Radix UI for accessible primitives

  - Styled using Tailwind CSS

  - Fully customizable design system

  - Opinionated directory structure

  - Ready-to-use components for common UI patterns
