markdown: >-
  ## Overview


  Vercel is a cloud platform optimized for frontend deployment, particularly for
  Next.js applications. It provides a seamless developer experience with
  automatic deployments from Git, serverless functions, edge networking, and
  global CDN distribution.


  ## Features


  - Zero-configuration deployments from Git repositories

  - Automatic preview deployments for every commit

  - Serverless functions and Edge Functions

  - Global CDN with automatic edge caching

  - Built-in analytics and performance monitoring

  - Automatic HTTPS and custom domains

  - Built-in image optimization

  - Supports all major frontend frameworks


  ## Pricing


  Free tier for personal and hobby projects. Pro plans start at $20/month per
  member. Enterprise pricing available.
