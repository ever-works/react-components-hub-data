markdown: >-
  ## Overview


  React Alice Carousel is a lightweight, beginner-friendly carousel library
  designed for smooth animations and easy integration. Unlike basic sliders, it
  focuses on fluid transitions and touch-friendly interactions, making it an
  ideal choice for modern web applications.


  ## Key Features


  - Built-in fade and slide transitions

  - Auto-play, infinite loop, and keyboard navigation support

  - Customizable animation easing and durations

  - Server-side rendering (SSR) support

  - Renders non-image components (buttons, videos, cards) as slides

  - Written in TypeScript for autocomplete and type safety


  ## When to Use


  - Image galleries, portfolios, and e-commerce sites where smooth scrolling and
  image presentation matter

  - MVPs or prototypes for fast demos

  - Small teams with limited budgets


  ## Pricing


  Free and open-source under the MIT license.
