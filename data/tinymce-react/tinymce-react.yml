markdown: >-
  ## Overview


  TinyMCE is one of the most popular and feature-rich WYSIWYG HTML editors
  available. The official React component provides seamless integration with
  React applications while maintaining all the powerful editing features TinyMCE
  is known for.


  ## Features


  - Advanced WYSIWYG editing

  - 50+ plugins available

  - Inline and distraction-free modes

  - Customizable toolbar

  - Skin and theme support

  - Spell checking

  - Word count

  - Character map

  - Emoticons

  - Insert/edit images

  - Responsive image handling

  - Table creation and editing

  - Advanced table operations

  - Insert media (video, audio)

  - Code view with syntax highlighting

  - Full screen mode

  - Preview mode

  - Print functionality


  ## Premium Plugins


  - PowerPaste (paste from Word/Excel)

  - Spell Checker Pro

  - Advanced Code Editor

  - Enhanced Media Embed

  - Image Tools (crop, resize, rotate)

  - MoxieManager (file management)

  - Export to PDF

  - Real-time collaboration

  - Comments and annotations

  - Track changes

  - Accessibility Checker

  - Advanced templates


  ## Customization


  - Custom plugins

  - Custom buttons

  - Custom toolbar layout

  - Custom themes

  - Custom content styles

  - Menu customization

  - Context toolbars

  - Quick toolbars


  ## Content Management


  - Clean HTML output

  - Content filtering

  - URL handling

  - Image upload

  - Drag and drop

  - Auto-save

  - Version control


  ## Integration Features


  - React Hooks support

  - Controlled/uncontrolled modes

  - Event handling

  - API access

  - Cloud deployment

  - Self-hosted option


  ## Use Cases


  - CMS platforms

  - Blog editors

  - Email composers

  - Documentation tools

  - Knowledge bases

  - Support ticket systems


  ## Pricing


  Core editor is free for self-hosting under GPL-2.0. Cloud-hosted starting at
  $49/month. Premium plugins require separate licensing.
