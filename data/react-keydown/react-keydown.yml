markdown: >-
  ## Overview


  React Keydown provides a lightweight approach to keyboard event handling in
  React applications through decorators and mixins.


  ## Features


  - Decorator and mixin patterns

  - Lightweight implementation

  - Multiple keyboard shortcuts

  - Efficient event handling

  - Compatible with various React versions
