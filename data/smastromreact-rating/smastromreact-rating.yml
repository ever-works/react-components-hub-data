markdown: >-
  ## Overview


  Zero-dependency, highly customizable rating component for React. Pick and
  customize one of the 6 built-in rating shapes or create your own.


  ## Key Features


  - Zero dependencies

  - 6 built-in shapes

  - Custom shapes support

  - Smooth transitions

  - Keyboard accessible

  - Mobile-friendly

  - Touch support

  - Multiple sizes

  - TypeScript support

  - SSR compatible


  ## Built-in Shapes


  - Star

  - ThinStar

  - RoundedStar

  - ThinRoundedStar

  - StickerStar

  - Heart


  ## Pricing


  Free and open-source under the MIT license.
