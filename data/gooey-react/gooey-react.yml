name: Gooey React
description: >-
  Gooey React is a React component library that implements the gooey/blob effect
  using SVG filters, enabling organic, fluid-like metaball animations between
  elements. It creates visually striking shape-merging effects where nearby
  blobs appear to connect and flow together, commonly seen in creative websites
  and interactive art pieces.


  **Key Features:**

  - SVG filter-based gooey/blob effects for performance

  - Metaball-style shape merging between nearby elements

  - Smooth organic animations with CSS transitions

  - Responsive design support

  - Composable React components for easy integration

  - Customizable blur and threshold values


  **Primary Use Cases:** Creative landing pages, interactive art installations,
  animated logos, organic UI effects, and visually distinctive web experiences.


  **Compared to Alternatives:** Unlike CSS-only blob effects (limited animation)
  or Canvas/WebGL approaches (complex setup), Gooey React provides a
  ready-to-use SVG filter solution that works declaratively within React's
  component model with minimal configuration.
