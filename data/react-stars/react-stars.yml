name: React Stars
description: React Stars is a lightweight, customizable star rating component
  for React applications that provides an intuitive visual rating interface with
  smooth hover effects and keyboard accessibility. At only 2.1KB gzipped, it
  adds interactive star-based ratings to any form or content. Key features
  include customizable star colors, sizes, and custom character support, hover
  preview showing tentative rating, smooth half-star selection for granular
  feedback, keyboard navigation with arrow keys for accessibility, onChange and
  onHover callbacks for integration with form state, and minimal bundle
  footprint. Primary use cases include product review systems, content rating
  displays, feedback forms, user satisfaction surveys, and any application
  needing a visual rating interface. Compared to more comprehensive rating
  libraries like react-rating-stars or custom-built solutions, React Stars
  offers the simplest API with the smallest bundle size, though it lacks
  half-star display by default.
