markdown: >-
  ## Overview


  React Stars is a minimalistic star rating component for React applications. It
  supports customizable star colors, hover interactions, and accessible keyboard
  navigation.


  ## Features


  - Customizable star fill color and size

  - Hover preview of rating

  - Keyboard navigation support

  - Callbacks for rating changes

  - Lightweight (2.1KB gzipped)


  ## Installation


  `npm install react-stars`


