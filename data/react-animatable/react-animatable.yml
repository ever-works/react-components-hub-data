markdown: >-
  ## Overview


  React Animatable wraps the Web Animations API for use in React components,
  providing a native browser-based animation solution that is performant and
  well-integrated with the rendering pipeline.


  ## Features


  - Built on the Web Animations API

  - Native browser performance

  - Declarative animation configuration

  - Supports keyframe animations

  - No external animation runtime dependency
