markdown: >-
  ## Overview


  A React component that enables drag-to-resize behavior for elements in React
  applications.


  ## Features


  - Drag-to-resize functionality for React components

  - Supports edge and corner dragging

  - Configurable resize constraints

  - Lightweight implementation


  ## Pricing


  Free and open-source.
